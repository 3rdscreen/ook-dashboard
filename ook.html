let _ahcChart = null;

function getAdDailyData(baseName, geo='', platform=''){
  // Strip geo suffix appended by makeTTDn/makeDN e.g. " [UAE]", " [KSA]", " [GCC]", " [Ku & Qa]"
  baseName = baseName.replace(/\s*\[[^\]]+\]\s*$/, '').trim();
  // ── Normalize helper — strips date/version suffixes
  const normalize = n => n
    .replace(/\s*\[[^\]]+\]\s*$/, '')
    .replace(/_mar\d+(_v\d+)?$/i,'')
    .replace(/_apr\d+(_v\d+)?$/i,'')
    .replace(/_v\d+$/i,'')
    .replace(/\s*[-–]\s*Copy\s*\d*$/i,'')
    .replace(/[_ ]Prospecting[_ ]Catalogue$/i,'')
    .replace(/[_ ]Prospecting$/i,'')
    .replace(/[_ ]Catalogue$/i,'')
    .replace(/_En_GLO.*$/i,'')
    .trim();

  // ── Geo pattern matching for filtering keys to correct geo
  const geoPatterns = {
    'UAE':        k => /_UAE_/i.test(k),
    'KSA':        k => /_KSA_/i.test(k),
    'KU / QA / BH': k => /Ku[_&\s]|Ku\s*&\s*Qa|Ku&Qat|KUW|KWT/i.test(k),
    'Catalogue':  k => /^EN_|Catalogue|Retarget/i.test(k),
    'GCC / Retargeting': k => /GCC|Retarget/i.test(k),
  };
  const geoFilter = geo && geoPatterns[geo] ? geoPatterns[geo] : null;

  // ── Google campaign: build daily from D.google geo data
  const googleCampsObj = GRANULAR.google?.campaigns || {};
  const gCampEntry = Object.entries(googleCampsObj).find(([name]) => name === baseName || normalize(name) === baseName);
  if (gCampEntry) {
    const [,gCamp] = gCampEntry;
    const geo = gCamp.geo || 'uae';
    // Build daily data directly from stored days array
    return ALL_DATES.map(d => {
      const dayRec = (gCamp.days||[]).find(r => r.d === d);
      if (dayRec && dayRec.spend > 0) {
        return { d, spend: dayRec.spend, sv: dayRec.sv||0, conv: dayRec.conv||0, roas: dayRec.roas||0, cpo: dayRec.cpo||0, atc: 0 };
      }
      // Fallback: use D.google geo data if no daily record stored
      const r = (D.google||[]).find(x => x.d === d);
      if (!r) return null;
      const g = r[geo] || {};
      if (!g.spend || g.spend <= 0) return null;
      return { d, spend: Math.round(g.spend*100)/100, sv: Math.round((g.sv||0)*100)/100, conv: g.conv||0, roas: g.roas||0, cpo: g.cpo||0, atc: 0 };
    });
  }

  // ── Search across platform ad granular data (ads + adsets)
  // If platform is specified, only search that platform to avoid cross-platform bleed
  const allSources = {};
  const platformsToSearch = platform ? [platform] : ['meta','tiktok','snap','google'];
  platformsToSearch.forEach(pk => {
    const ads = GRANULAR[pk]?.ads || {};
    Object.entries(ads).forEach(([k,v]) => { allSources[k] = v; });
    // Also add adsets so adset-level data shows in chart
    const adsets = GRANULAR[pk]?.adsets || {};
    Object.entries(adsets).forEach(([k,v]) => { allSources[k] = v; });
  });

  const dayMap = {};
  const mtdMap = {}; // for MTD-snapshot entries
  const metaSeenDates = {}; // dedup: prevent _marXX variant keys from double-counting same date

  Object.entries(allSources).forEach(([name, arr]) => {
    const normName = normalize(name);
    const normBase = normalize(baseName);
    // Match: exact, normalized-exact, startsWith (handles 45-char truncated display names)
    const matches = normName === baseName
      || name === baseName
      || normName === normBase
      || (normBase.length >= 25 && normName.startsWith(normBase))
      || (normBase.length >= 25 && normalize(name).startsWith(normBase))
      || (baseName.length >= 30 && name.startsWith(baseName));
    if(!matches) return;
    // ── Geo filter: if geo is known, only include keys matching that geo
    if(geoFilter && !geoFilter(name)) return;
    // Dedup: for Meta, each date should only be counted once across all _marXX variant keys
    const _nameParts = name.split('_'); const seenKey = `${_nameParts[0]==='EN'?_nameParts[0]+'_'+(_nameParts[1]||''):_nameParts[0]}||${geo}`;
    if(!metaSeenDates[seenKey]) metaSeenDates[seenKey] = new Set();
    arr.forEach(r => {
      if(!r || !r.d) return;
      const isDaily = r.d.startsWith('Mar ') || r.d.startsWith('Apr ');
      // Skip if we've already counted this date from another variant key
      if(isDaily && metaSeenDates[seenKey].has(r.d)) return;
      if(isDaily) metaSeenDates[seenKey].add(r.d);
      const target = isDaily ? dayMap : mtdMap;
      const key = r.d;
      if(!target[key]) target[key] = {spend:0,sv:0,conv:0,atc:0,wR:0};
      const e = target[key];
      e.spend += r.spend||0;
      e.sv    += r.sv||0;
      e.conv  += r.conv||0;
      e.atc   += (r.atc||0);
      e.wR    += (r.roas||0)*(r.spend||0);
    });
  });

  // Finalize roas for dayMap entries
  Object.values(dayMap).forEach(e => { e.roas = e.spend>0 ? e.wR/e.spend : 0; e.cpo = e.conv>0 ? e.spend/e.conv : 0; });

  // If we have daily Mar data, return it directly
  if(Object.keys(dayMap).length > 0){
    return ALL_DATES.map(d => {
      const e = dayMap[d];
      if(!e || e.spend<=0) return null;
      return { d, spend:Math.round(e.spend*100)/100, sv:Math.round(e.sv*100)/100, conv:e.conv, atc:e.atc, roas:Math.round(e.roas*100)/100, cpo:Math.round(e.cpo*100)/100 };
    });
  }

  // MTD-only data: distribute proportionally using platform daily totals
  if(Object.keys(mtdMap).length > 0){
    const mtd = Object.values(mtdMap).reduce((acc,e)=>{
      acc.spend+=e.spend; acc.sv+=e.sv; acc.conv+=e.conv; acc.atc+=e.atc; acc.wR+=e.wR; return acc;
    },{spend:0,sv:0,conv:0,atc:0,wR:0});
    const mtdRoas = mtd.spend>0 ? mtd.wR/mtd.spend : 0;

    // Detect which platform this ad belongs to for proportional daily scaling
    let platKey = null;
    ['tiktok','snap','meta','google'].forEach(pk => {
      const ads = {...(GRANULAR[pk]?.ads||{}), ...(GRANULAR[pk]?.adsets||{})};
      if(Object.keys(ads).some(k => normalize(k)===baseName || k===baseName)) platKey = pk;
    });

    // Get platform daily spend totals for proportional distribution
    const platDaily = ALL_DATES.map(d => {
      if(!platKey) return 1;
      const r = (D[platKey]||[]).find(x=>x.d===d);
      return r && r.spend>0 ? r.spend : 0;
    });
    const platTotal = platDaily.reduce((s,v)=>s+v, 0);

    return ALL_DATES.map((d,i) => {
      if(platTotal<=0) return null;
      const prop = platDaily[i] / platTotal;
      const sp = Math.round(mtd.spend * prop * 100) / 100;
      if(sp <= 0) return null;
      const sv = Math.round(mtd.sv * prop * 100) / 100;
      const conv = Math.round(mtd.conv * prop);
      const roas = sp>0 ? sv/sp : mtdRoas;
      const cpo  = conv>0 ? sp/conv : 0;
      return { d, spend:sp, sv, conv, atc:Math.round(mtd.atc*prop), roas:Math.round(roas*100)/100, cpo:Math.round(cpo*100)/100 };
    });
  }

  return ALL_DATES.map(() => null);
}

function showAdHoverChartByEl(event, el){
  const baseName = el.getAttribute('data-adname') || '';
  const platform = el.getAttribute('data-platform') || '';
  const geo      = el.getAttribute('data-geo') || '';
  // Resolve the active period for this platform's ad table
  let period = null;
  if(platform === 'meta')   period = metaAdsPeriod;
  else if(platform === 'tiktok') period = ttAdsPeriod;
  else if(platform === 'snap')   period = snapAdsPeriod;
  else period = _topAdsState.period !== 'all' ? _topAdsState.period : null;
  showAdHoverChart(event, baseName, period, geo, platform);
}

function showAdHoverChart(event, baseName, period, geo='', platform=''){
  period = period || null;
  const popup    = document.getElementById('ad-hover-chart');
  const titleEl  = document.getElementById('ahc-title');
  const canvas   = document.getElementById('ahc-canvas');
  const verdictEl= document.getElementById('ahc-verdict');
  const kpisEl   = document.getElementById('ahc-kpis');
  const insightEl= document.getElementById('ahc-insight');

  // Collect per-day data (indexed by ALL_DATES)
  // ── Use breakdown cache for TikTok and Snap (same data as table rows)
  let dailyData;
  let _snapTotalOverride = false;
  let totSpend=0, totSV=0, totConv=0, totAtc=0, wR=0;
  const _cache = platform === 'tiktok' ? window.TT_AD_DAILY_CACHE :
                 platform === 'snap'   ? window.SNAP_AD_DAILY_CACHE : null;
  if(_cache) {
    const cacheKey = `${geo}||${baseName}`;
    const cached = _cache[cacheKey];
    if(cached) {
      dailyData = ALL_DATES.map(d => {
        const e = cached[d];
        if(!e || !e.spend) return null;
        return { d, spend:e.spend, sv:e.sv, conv:e.conv, atc:e.atc, roas:e.roas, cpo:e.cpo };
      });
      // For snap: use exact period total stored in cache to avoid rounding errors
      if(platform==='snap' && cached['_total']) {
        const t=cached['_total'];
        totSpend=t.spend; totSV=t.sv; totConv=t.conv; totAtc=t.atc;
        wR=t.roas*t.spend;
        _snapTotalOverride=true;
      }
    }
  }
  if(!dailyData) dailyData = getAdDailyData(baseName, geo, platform);

  // ── Determine which dates to aggregate for KPIs
  let activeDates;
  if (period === '3d') {
    activeDates = ALL_DATES.slice(-3);
  } else if (period === '1d') {
    activeDates = ALL_DATES.slice(-1);
  } else if (period === 'all') {
    activeDates = ALL_DATES.slice();
  } else {
    // Default: always last 7 days (gives enough data for meaningful recommendation)
    activeDates = ALL_DATES.slice(-7);
  }
  const periodDates = new Set(activeDates);

  // ── Aggregate totals over the selected period
  dailyData.forEach((r, i) => {
    if(_snapTotalOverride) return;
    if(!r || r.spend<=0) return;
    if(!periodDates.has(ALL_DATES[i])) return;
    totSpend += r.spend;
    totSV    += (r.sv && r.sv>0) ? r.sv : (r.roas>0 ? r.spend*r.roas : 0);
    totConv  += r.conv||0;
    totAtc   += typeof r.atc==='number' ? r.atc : 0;
    wR       += (r.roas||0)*r.spend;
  });
  const avgRoas = totSpend>0 ? wR/totSpend : 0;
  const cpo     = totConv>0  ? totSpend/totConv : 0;
  const avgPV   = totConv>0  ? totSV/totConv : 0;
  const ctr     = totAtc>0 && totConv>0 ? (totConv/totAtc)*100 : 0;

  // ── Last 3 days trend (recent momentum within the active window)
  const windowDates = activeDates.slice(-3);
  const windowSet = new Set(windowDates);
  const last3 = dailyData.filter((r,i) => r && r.spend>0 && windowSet.has(ALL_DATES[i]));
  let r3Spend=0,r3SV=0,r3wR=0;
  last3.forEach(r=>{ r3Spend+=r.spend; r3SV+=(r.sv&&r.sv>0)?r.sv:(r.roas>0?r.spend*r.roas:0); r3wR+=(r.roas||0)*r.spend; });
  const recentRoas = r3Spend>0 ? r3wR/r3Spend : 0;

  // ── Decision logic
  // Benchmark: blended account ROAS target ~3x, CPO target ~$60
  const ROAS_TARGET = 3.0;
  const CPO_TARGET  = 60;
  let verdict, verdictClass, insight;

  const roasTrend = avgRoas > 0 ? (recentRoas - avgRoas) / avgRoas : 0; // % change recent vs avg
  const noConv    = totConv === 0;
  const lowSpend  = totSpend < 50;

  if(noConv && totSpend > 100){
    verdict      = '🔴 Consider Turning Off';
    verdictClass = 'ahc-off';
    insight      = `$${totSpend.toFixed(0)} spent with 0 purchases. High ATC (${totAtc}) but no conversions — checkout friction or audience mismatch.`;
  } else if(avgRoas >= ROAS_TARGET * 1.5 && recentRoas >= ROAS_TARGET){
    verdict      = '🟢 Keep Running — Strong';
    verdictClass = 'ahc-keep';
    insight      = `${avgRoas.toFixed(1)}x ROAS (${roasTrend>=0?'+':''}${(roasTrend*100).toFixed(0)}% recent trend). Scale budget or test new creatives.`;
  } else if(avgRoas >= ROAS_TARGET){
    verdict      = '🟢 Keep Running';
    verdictClass = 'ahc-keep';
    insight      = `${avgRoas.toFixed(1)}x ROAS above target. ${recentRoas < avgRoas ? 'Recent days slightly weaker — monitor.' : 'Momentum holding.'}`;
  } else if(avgRoas >= ROAS_TARGET * 0.6 && recentRoas >= ROAS_TARGET){
    verdict      = '🟡 Watch — Recovering';
    verdictClass = 'ahc-watch';
    insight      = `Overall ${avgRoas.toFixed(1)}x but recent 3 days hit ${recentRoas.toFixed(1)}x. Give it 2–3 more days before deciding.`;
  } else if(avgRoas < ROAS_TARGET * 0.5 && totSpend > 150){
    verdict      = '🔴 Turn Off / Pause';
    verdictClass = 'ahc-off';
    insight      = `${avgRoas.toFixed(1)}x ROAS well below ${ROAS_TARGET}x target. CPO $${cpo.toFixed(0)} vs $${CPO_TARGET} target. Redirect budget to top performers.`;
  } else if(lowSpend){
    verdict      = '⚪ Too Early to Judge';
    verdictClass = 'ahc-watch';
    insight      = `Only $${totSpend.toFixed(0)} spent. Need more data — check back after $100+ spend.`;
  } else {
    verdict      = '🟡 Watch Closely';
    verdictClass = 'ahc-watch';
    insight      = `${avgRoas.toFixed(1)}x ROAS below ${ROAS_TARGET}x target. CPO $${cpo.toFixed(0)}. ${recentRoas<avgRoas?'Declining recently.':'No recent improvement.'} Consider creative refresh.`;
  }

  // ── KPI colors
  const roasColor = avgRoas >= ROAS_TARGET ? 'good' : avgRoas >= ROAS_TARGET*0.6 ? 'warn' : 'bad';
  const cpoColor  = cpo === 0 ? '' : cpo <= CPO_TARGET ? 'good' : cpo <= CPO_TARGET*1.5 ? 'warn' : 'bad';

  // ── Render verdict + KPIs
  verdictEl.className = verdictClass;
  verdictEl.textContent = verdict;
  titleEl.textContent = baseName.length > 48 ? baseName.substring(0,48)+'…' : baseName;

  kpisEl.innerHTML = [
    ['ROAS', avgRoas>0 ? avgRoas.toFixed(1)+'x' : '—', roasColor],
    ['SPEND', '$'+Math.round(totSpend).toLocaleString(), ''],
    ['CPO', cpo>0 ? '$'+cpo.toFixed(0) : '—', cpoColor],
    ['SALES', totConv||'0', totConv>0?'good':'bad'],
  ].map(([l,v,cls]) => `<div class="ahc-kpi"><span class="ahc-kpi-label">${l}</span><span class="ahc-kpi-val ${cls}">${v}</span></div>`).join('');

  insightEl.textContent = insight;

  // ── Chart: daily ROAS trend (last 7 days only)
  if(_ahcChart){ _ahcChart.destroy(); _ahcChart = null; }

  const highlightSet = new Set(activeDates);
  const chartDates = activeDates;
  const chartIndices = chartDates.map(d => ALL_DATES.indexOf(d));

  const roasData = chartDates.map((d, ci) => {
    const i = chartIndices[ci];
    const r = i >= 0 ? dailyData[i] : null;
    return (r && r.spend > 0) ? +(r.roas||0).toFixed(2) : null;
  });

  // Draw target line
  const targetLine = chartDates.map(() => ROAS_TARGET);

  _ahcChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels: chartDates.map(d => d.replace('Mar ','').replace('Apr ','')),
      datasets: [
        {
          label: 'ROAS',
          data: roasData,
          borderColor: '#1877F2',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: roasData.map(v => v !== null ? 4 : 0),
          pointBackgroundColor: '#1877F2',
          tension: 0.3, spanGaps: false, yAxisID: 'y',
        },
        {
          label: 'Target',
          data: targetLine,
          borderColor: '#ef4444',
          borderWidth: 1.5,
          borderDash: [4,3],
          pointRadius: 0,
          fill: false, yAxisID: 'y',
          tension: 0
        }
      ]
    },
    options: {
      responsive: false,
      animation: false,
      plugins: {
        legend: { position:'top', labels:{ boxWidth:7, font:{size:8}, padding:6,
          filter: item => item.text !== '' }},
        tooltip: { callbacks: { label: c => c.datasetIndex===0 ? `ROAS: ${c.parsed.y!=null?c.parsed.y.toFixed(2)+'x':'—'}` : `Target: ${ROAS_TARGET}x` }}
      },
      scales: {
        x: { ticks:{ font:{size:8}, maxTicksLimit:8 }, grid:{display:false} },
        y: { position:'left', ticks:{ font:{size:8}, callback:v=>v+'x' }, grid:{color:'#f8f8f4'}, min:0 }
      }
    }
  });

  popup.style.display = 'block';
  positionAdHoverChart(event);
}


function positionAdHoverChart(event){
  const popup = document.getElementById('ad-hover-chart');
  if(!popup || popup.style.display === 'none') return;
  const pw = 340, ph = 320;
  let x = event.clientX + 18;
  let y = event.clientY - 80;
  if(x + pw > window.innerWidth - 10) x = event.clientX - pw - 18;
  if(y + ph > window.innerHeight - 10) y = window.innerHeight - ph - 10;
  if(y < 10) y = 10;
  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
}

function hideAdHoverChart(){
  const popup = document.getElementById('ad-hover-chart');
  if(popup) popup.style.display = 'none';
  if(_ahcChart){ _ahcChart.destroy(); _ahcChart = null; }
}

document.addEventListener('mousemove', e => {
  const popup = document.getElementById('ad-hover-chart');
  if(popup && popup.style.display !== 'none'){
    positionAdHoverChart(e);
  }
});
