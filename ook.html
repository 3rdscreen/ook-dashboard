<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OOK Dashboard v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:#f4f4ef;color:#1a1a1a;min-height:100vh}

/* ── Header */
.hdr{background:#fff;border-bottom:1px solid #e6e6e0;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr img{height:55px;object-fit:contain}
.badge{background:#1a1a1a;color:#fff;font-size:10px;font-weight:600;letter-spacing:.06em;padding:4px 10px;border-radius:20px}

/* ── Controls */
.ctrl{padding:16px 24px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ctrl select{font-family:inherit;font-size:13px;font-weight:500;background:#fff;border:1px solid #e0e0d8;border-radius:8px;padding:7px 12px;cursor:pointer;color:#1a1a1a;outline:none}
.mtd-btn{font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.04em;padding:7px 16px;border-radius:20px;border:1.5px solid #1a1a1a;background:transparent;cursor:pointer;color:#1a1a1a;transition:all .15s}
.mtd-btn.on{background:#1a1a1a;color:#fff}
.mtd-pill{background:#1a1a1a;color:#fff;font-size:11px;font-weight:600;padding:5px 14px;border-radius:20px;letter-spacing:.04em}

/* ── Tabs */
.tabs{padding:16px 24px 0;display:flex;gap:6px;flex-wrap:wrap}
.tab{font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.05em;padding:6px 16px;border-radius:20px;border:1.5px solid #e0e0d8;background:#fff;cursor:pointer;color:#888;transition:all .15s}
.tab.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

/* ── Layout */
.view{padding:20px 24px 60px}

/* ── Cards */
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}.g6{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px}
.card{background:#fff;border-radius:12px;padding:18px;border:1px solid #ebebeb}
.klbl{font-size:10px;font-weight:700;letter-spacing:.1em;color:#aaa;margin-bottom:12px}
.kval{font-family:'DM Mono',monospace;font-size:24px;font-weight:700;color:#1a1a1a}
.kval.sm{font-size:18px}

/* ── Section card */
.cc{background:#fff;border-radius:12px;padding:18px;margin-bottom:12px;border:1px solid #ebebeb}
.clbl{font-size:11px;font-weight:700;letter-spacing:.07em;color:#aaa;margin-bottom:14px;text-transform:uppercase}
.clbl .cperiod{color:#0a0a0a;font-weight:900;font-size:13px;letter-spacing:.04em}

/* ── Geo table */
.gtbl{width:100%;border-collapse:collapse;font-size:13px}
.gtbl th{text-align:left;font-size:10px;font-weight:700;letter-spacing:.06em;color:#aaa;padding:0 0 10px;border-bottom:1px solid #f0f0ea}
.gtbl th:not(:first-child){text-align:right}
.gtbl td{padding:9px 0;border-bottom:1px solid #f8f8f4;vertical-align:middle}
.gtbl td:not(:first-child){text-align:right;font-family:'DM Mono',monospace;font-size:12px}
.gtbl tr:last-child td{border-bottom:none}
.gn{display:flex;align-items:center;gap:7px;font-weight:500;font-size:13px}
.gs{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── Charts grid */
.gg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.cw{position:relative}

/* ── Platform summary cards */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.pcard{background:#fff;border-radius:12px;padding:16px;border:1px solid #ebebeb;cursor:pointer;transition:box-shadow .15s}
.pcard:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.pcard-name{font-size:11px;font-weight:700;letter-spacing:.07em;color:#aaa;margin-bottom:8px}
.pcard-row{display:flex;justify-content:space-between;font-size:12px;color:#888;padding:3px 0}
.pcard-val{font-family:'DM Mono',monospace;font-weight:600;color:#1a1a1a}

/* ── Overview list rows */
.orow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f4f4ef}
.orow:last-child{border-bottom:none}
.orow-lbl{display:flex;align-items:center;gap:6px;font-size:11px;color:#888}
.orow-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:#1a1a1a}

/* ── No data */
.nodata{text-align:center;padding:60px 20px;color:#aaa;font-size:14px}

/* ── Responsive breakpoints ───────────────────────────────────────────
   Desktop first. Adapts down through 3 tiers:
   - ≤600px: tablets / large phones (most phones landscape)
   - ≤480px: standard phones portrait
   - ≤380px: small phones */

/* Tables need horizontal scroll on mobile */
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* Tablet / large phone */
@media(max-width:600px){
  body{font-size:13px}
  .hdr{padding:10px 12px;flex-wrap:wrap;gap:8px}
  .hdr-title{font-size:16px}
  .ctrl{padding:10px 12px 0;flex-wrap:wrap}
  .tabs{padding:10px 12px 0;gap:4px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:6px 12px;font-size:11px;white-space:nowrap;flex-shrink:0}
  .view{padding:12px 12px 60px}
  .cc{padding:14px;margin-bottom:10px;border-radius:10px}
  .clbl{font-size:11px}

  /* Card grids collapse */
  .g6{grid-template-columns:repeat(3,1fr);gap:8px}
  .g5{grid-template-columns:repeat(2,1fr)}
  .g4{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:repeat(2,1fr)}
  .gg,.g2{grid-template-columns:1fr}

  .kval{font-size:17px}
  .kval.sm{font-size:14px}

  /* Tables: compact + horizontal scroll wrapper */
  .gtbl{font-size:11px}
  .gtbl th,.gtbl td{padding:5px 6px!important}
  table{font-size:11px}

  /* Budget trend chart: stack header controls vertically */
  .bt-controls{flex-direction:column;align-items:stretch!important;gap:8px!important}
  .bt-controls > div{justify-content:flex-start}
  .mbt-range-btn{font-size:10px;padding:3px 8px}
  .metric-toggle{width:100%}
  .mt-btn{flex:1;text-align:center}

  /* Chart heights tighter on mobile */
  .cw{min-height:0}
  .cw[style*="280px"]{height:220px!important}
  .cw[style*="220px"]{height:180px!important}
  .cw[style*="190px"]{height:170px!important}
  .cw[style*="160px"]{height:150px!important}

  /* Calendar dropdown fills screen */
  .cal-dropdown{min-width:calc(100vw - 24px);max-width:calc(100vw - 24px);left:0;right:0}
  .cal-btn{font-size:12px;padding:6px 10px}

  /* Hover charts */
  #ad-hover-chart{width:calc(100vw - 24px);left:12px!important;right:12px;max-width:none}
}

/* Standard phone portrait */
@media(max-width:480px){
  .g6{grid-template-columns:repeat(2,1fr)}
  .g5{grid-template-columns:1fr}
  .hdr-title{font-size:14px}
  .hdr-sub{font-size:10px}
  .tab{padding:5px 10px;font-size:10px}
  .cc{padding:12px}
  .clbl{font-size:10px;letter-spacing:.05em}
  .kval{font-size:15px}
  .kval.sm{font-size:13px}

  /* Budget trend controls: range buttons wrap, metric toggle full-width */
  .bt-range-wrap{flex-wrap:wrap;gap:3px!important}
  .mbt-range-btn{flex:0 0 auto;padding:3px 7px;font-size:10px}

  /* Chart legend crammed — let it wrap better by reducing font */
  .cw[style*="280px"]{height:200px!important}
  .cw[style*="220px"]{height:170px!important}
}

/* Small phone */
@media(max-width:380px){
  .g6,.g4,.g3,.g5{grid-template-columns:1fr}
  .kval{font-size:16px}
  .kval.sm{font-size:13px}
  .cc{padding:10px}
  .hdr{padding:8px 10px}
  .view{padding:10px 10px 40px}
  .tab{padding:4px 8px;font-size:10px}
  .cw[style*="280px"]{height:180px!important}
}

/* ── Calendar Picker */
.cal-wrap{position:relative;display:inline-block}
.cal-btn{font-family:inherit;font-size:13px;font-weight:600;background:#fff;border:1px solid #e0e0d8;border-radius:8px;padding:7px 14px;cursor:pointer;color:#1a1a1a;display:flex;align-items:center;gap:8px;white-space:nowrap;min-width:180px;justify-content:space-between}
.cal-btn:hover{border-color:#1a1a1a}
.cal-btn .cal-icon{opacity:.5;font-size:14px}
.cal-dropdown{position:absolute;top:calc(100% + 6px);left:0;background:#fff;border:1px solid #e0e0d8;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.12);z-index:999;display:none;min-width:760px;max-width:calc(100vw - 28px);overflow:hidden}
.cal-dropdown.open{display:flex}
.cal-presets{width:210px;border-right:1px solid #f0f0ea;padding:10px 0;flex-shrink:0;max-height:480px;overflow-y:auto}
.cal-presets-label{font-size:12px;font-weight:700;color:#1a1a1a;padding:6px 18px 10px}
.cal-presets-divider{height:1px;background:#f0f0ea;margin:6px 12px}
.cal-preset{font-family:inherit;font-size:13px;font-weight:400;padding:8px 16px 8px 18px;cursor:pointer;color:#1a1a1a;background:none;border:none;width:100%;text-align:left;transition:background .1s;display:flex;align-items:center;gap:10px}
.cal-preset:hover{background:#f8f8f4}
.cal-radio{width:14px;height:14px;border:1.5px solid #c8c8c0;border-radius:50%;flex-shrink:0;background:#fff;position:relative}
.cal-preset.active .cal-radio{border-color:#1877F2}
.cal-preset.active .cal-radio::after{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:#1877F2}
.cal-right{padding:18px 20px;flex:1;display:flex;flex-direction:column}
.cal-months{display:flex;gap:28px;flex:1}
.cal-month{flex:1;min-width:0}
.cal-month-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:6px}
.cal-month-nav{background:none;border:none;cursor:pointer;font-size:16px;color:#1a1a1a;padding:2px 6px;line-height:1;flex-shrink:0}
.cal-month-nav:hover{color:#1877F2}
.cal-month-nav.invisible{visibility:hidden}
.cal-month-title-wrap{display:flex;align-items:center;gap:10px;flex:1;justify-content:center}
.cal-month-title{font-size:13px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:4px;cursor:default}
.cal-month-title::after{content:"\25BE";font-size:10px;color:#1a1a1a;opacity:.6;margin-left:2px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{font-size:11px;font-weight:500;color:#888;text-align:center;padding:4px 0 8px}
.cal-day{font-size:13px;font-weight:400;text-align:center;padding:7px 2px;border-radius:6px;cursor:pointer;color:#1a1a1a;transition:all .1s;line-height:1}
.cal-day:hover:not(.empty):not(.disabled){background:#f0f0ea}
.cal-day.has-data{font-weight:500}
.cal-day.in-range{background:#dbeafe;border-radius:0;color:#1a1a1a}
.cal-day.range-start{background:#1877F2!important;color:#fff!important;border-radius:6px 0 0 6px!important}
.cal-day.range-end{background:#1877F2!important;color:#fff!important;border-radius:0 6px 6px 0!important}
.cal-day.range-start.range-end,.cal-day.selected{background:#1877F2!important;color:#fff!important;border-radius:6px!important}
.cal-day.today-marker:not(.selected):not(.range-start):not(.range-end){color:#1877F2;font-weight:600}
.cal-day.has-data:hover:not(.range-start):not(.range-end):not(.selected){background:#f0f0ea;color:#1a1a1a}
.cal-day.disabled{opacity:.3;cursor:default;pointer-events:none;color:#bbb}
.cal-day.empty{cursor:default}
.cal-footer{border-top:1px solid #f0f0ea;padding:14px 0 4px;display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.cal-footer-info{font-size:12px;color:#888}
.cal-footer-actions{display:flex;gap:10px}
.cal-cancel{font-family:inherit;font-size:13px;font-weight:500;background:#fff;color:#1a1a1a;border:1px solid #d0d0c8;border-radius:6px;padding:7px 18px;cursor:pointer}
.cal-cancel:hover{background:#f8f8f4}
.cal-apply{font-family:inherit;font-size:13px;font-weight:500;background:#1877F2;color:#fff;border:none;border-radius:6px;padding:7px 18px;cursor:pointer}
.cal-apply:hover{background:#1565c0}
.cal-apply:disabled{opacity:.4;cursor:default}.metric-toggle{display:inline-flex;background:#f0f0ea;border-radius:6px;padding:2px;gap:2px}.mt-btn{font-family:inherit;font-size:11px;font-weight:600;background:transparent;color:#888;border:none;border-radius:4px;padding:4px 12px;cursor:pointer;transition:all .15s;letter-spacing:.02em}.mt-btn:hover{color:#1a1a1a}.mt-btn.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 2px rgba(0,0,0,.08)}

/* ── Ad Hover Chart */
#ad-hover-chart{position:fixed;background:#fff;border:1px solid #e0e0d8;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.18);padding:0;z-index:9999;display:none;pointer-events:none;width:340px;overflow:hidden}
#ahc-verdict{font-size:11px;font-weight:700;letter-spacing:.06em;padding:8px 14px;display:flex;align-items:center;gap:7px}
.ahc-keep{background:#f0fdf4;color:#166534}
.ahc-watch{background:#fffbeb;color:#92400e}
.ahc-off{background:#fef2f2;color:#991b1b}
#ad-hover-chart .ahc-title{font-size:10px;font-weight:700;letter-spacing:.04em;color:#555;padding:0 14px 8px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:312px}
#ahc-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid #f4f4ef;border-bottom:1px solid #f4f4ef;margin-bottom:0}
.ahc-kpi{padding:8px 10px;text-align:center;border-right:1px solid #f4f4ef}
.ahc-kpi:last-child{border-right:none}
.ahc-kpi-label{font-size:9px;font-weight:700;letter-spacing:.05em;color:#aaa;display:block;margin-bottom:3px}
.ahc-kpi-val{font-size:13px;font-weight:700;font-family:monospace;color:#1a1a1a;display:block}
.ahc-kpi-val.good{color:#16a34a}
.ahc-kpi-val.warn{color:#d97706}
.ahc-kpi-val.bad{color:#dc2626}
#ad-hover-chart canvas{display:block;padding:10px 14px 4px}
#ahc-insight{font-size:10px;color:#666;padding:6px 14px 10px;line-height:1.5;border-top:1px solid #f8f8f4}

/* ── Meta budget trend range buttons ── */
.mbt-range-btn{
  font-size:11px;
  font-weight:500;
  padding:4px 10px;
  border-radius:14px;
  border:1px solid #d0d0c8;
  background:#fff;
  color:#666;
  cursor:pointer;
  transition:all .15s;
}
.mbt-range-btn:hover{ border-color:#999; color:#333 }
.mbt-range-btn.active{ background:#1a1a1a; color:#fff; border-color:#1a1a1a }

/* Auto-scroll any card holding a gtbl on narrow screens */
@media(max-width:600px){
  .cc{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .cc > table.gtbl,.cc > div > table.gtbl{min-width:480px}
}
</style>

  });
  return [...seen]; // ordered as they appear

const MONTH_NAMES=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

                  "Jul":"JULY","Aug":"AUGUST","Sep":"SEPTEMBER","Oct":"OCTOBER","Nov":"NOVEMBER","Dec":"DECEMBER"};
// Map month abbr → days in 2026
const DAYS_IN_MONTH_2026={"Jan":31,"Feb":28,"Mar":31,"Apr":30,"May":31,"Jun":30,"Jul":31,"Aug":31,"Sep":30,"Oct":31,"Nov":30,"Dec":31};
// Day-of-week for the 1st of each month in 2026 (0=Sun)
const FIRST_DOW_2026={"Jan":4,"Feb":0,"Mar":0,"Apr":3,"May":5,"Jun":1,"Jul":3,"Aug":6,"Sep":2,"Oct":4,"Nov":0,"Dec":2};

    calMonthIdx=months.indexOf(lastMonth);

function closeCal(){ calOpen=false; document.getElementById("cal-dropdown").classList.remove("open"); }

function renderCalGrid(){
  const months=calMonths();
  if(calMonthIdx===null) calMonthIdx=Math.max(0,months.length-2);
  // Clamp so we always show 2 months; left = calMonthIdx, right = calMonthIdx+1
  calMonthIdx=Math.max(0,Math.min(months.length-1,calMonthIdx));
  // If calMonthIdx is the last month, shift left so it stays on the right
  const leftIdx = months.length>=2 ? Math.min(calMonthIdx, months.length-2) : -1;
  const rightIdx = months.length>=2 ? leftIdx+1 : 0;
  const canPrev = leftIdx>0;
  const canNext = rightIdx<months.length-1;

  const dow=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  function monthHTML(monIdx, showPrevArrow, showNextArrow){
    if(monIdx<0) return '<div class="cal-month"></div>';
    const mon = months[monIdx];
    const dataSet=new Set(
      ALL_DATES.filter(d=>d.startsWith(mon+' ')).map(d=>+d.replace(mon+' ',''))
    );
    const daysInMonth=DAYS_IN_MONTH_2026[mon]||30;
    const firstDOW=FIRST_DOW_2026[mon]||0;
    const monAbbr = mon;

    let h = `<div class="cal-month">
      <div class="cal-month-hdr">
        ${showPrevArrow
            ? `<button class="cal-month-nav" data-dir="-1" ${canPrev?'':'disabled style="opacity:.2;cursor:default"'}>&#8249;</button>`
            : `<button class="cal-month-nav invisible">&#8249;</button>`}
        <div class="cal-month-title-wrap">
          <span class="cal-month-title">${monAbbr}</span>
          <span class="cal-month-title">2026</span>
        </div>
        ${showNextArrow
            ? `<button class="cal-month-nav" data-dir="1" ${canNext?'':'disabled style="opacity:.2;cursor:default"'}>&#8250;</button>`
            : `<button class="cal-month-nav invisible">&#8250;</button>`}
      </div>
      <div class="cal-grid">`;
    dow.forEach(d=>{ h += `<div class="cal-dow">${d}</div>`; });
    for(let i=0;i<firstDOW;i++) h += `<div class="cal-day empty"></div>`;
    for(let n=1;n<=daysInMonth;n++){
      const hasD = dataSet.has(n);
      const dateStr = mon+' '+n;
      const evts = hasD ? `data-d="${dateStr}" data-n="${n}"` : "";
      h += `<div class="cal-day${hasD?" has-data":" disabled"}" ${evts}>${n}</div>`;
    }
    h += `</div></div>`;
    return h;
  }

  const html = monthHTML(leftIdx, true, false) + monthHTML(rightIdx, false, true);
  const container = document.getElementById("cal-months");
  container.innerHTML = html;

  // Nav arrow delegation
  container.querySelectorAll(".cal-month-nav[data-dir]").forEach(btn=>{
    btn.addEventListener("click", e=>{
      e.stopPropagation();
      if(!btn.disabled) calNav(+btn.dataset.dir);
    });
  });

  // Range selection via delegation on the entire cal-months container
  container.addEventListener("mouseover", e=>{
    const el=e.target.closest("[data-d]");
    if(!el) return;
    if(calPickStart && !calPickEnd){
      calHoverD=el.dataset.d; applyDayClasses();
    }
  });
  container.addEventListener("mouseleave", ()=>{
    if(calPickStart && !calPickEnd){
      calHoverD=null; applyDayClasses();
    }
  });
  container.addEventListener("click", e=>{
    const el=e.target.closest("[data-d]");
    if(!el) return;
    const d=el.dataset.d;
    if(!calPickStart || (calPickStart && calPickEnd)){
      calPickStart=d; calPickEnd=null; calHoverD=null;
    } else {
      const si=dateIndex(calPickStart), ei=dateIndex(d);
      if(ei>=si){ calPickEnd=d; }
      else { calPickEnd=calPickStart; calPickStart=d; }
      calHoverD=null;
    }
    document.querySelectorAll(".cal-preset").forEach(b=>b.classList.remove("active"));
    applyDayClasses();
    updateCalFooter();
  });

  applyDayClasses();
  updateCalFooter();
}

function calNav(dir){
  const months=calMonths();
  calMonthIdx=Math.max(0,Math.min(months.length-1,(calMonthIdx||0)+dir));
  renderCalGrid();
}

// String-based pick state (works across months)

let calHoverD=null; // new string-based hover

function applyDayClasses(){
  const grid=document.getElementById("cal-months");
  if(!grid) return;
  const SI=calPickStart ? dateIndex(calPickStart) : null;
  const EI=calPickEnd   ? dateIndex(calPickEnd)   : null;
  const HI=calHoverD    ? dateIndex(calHoverD)    : null;

  // Effective range indices
  let rA=null, rB=null;
  if(SI!=null && EI!=null){ rA=Math.min(SI,EI); rB=Math.max(SI,EI); }
  else if(SI!=null && HI!=null){ rA=Math.min(SI,HI); rB=Math.max(SI,HI); }

  grid.querySelectorAll("[data-d]").forEach(el=>{
    const idx=dateIndex(el.dataset.d);
    el.classList.remove("selected","range-start","range-end","in-range","hover-preview");
    if(rA!==null && rB!==null){
      if(idx===rA && idx===rB)     el.classList.add("selected");
      else if(idx===rA)            el.classList.add("range-start");
      else if(idx===rB)            el.classList.add("range-end");
      else if(idx>rA && idx<rB)   el.classList.add("in-range");
    } else if(SI!=null && idx===SI){
      el.classList.add("selected");
    }
  });
}

    rangeMode=true; mtdMode=false;
    document.getElementById("mtd-pill").style.display="inline-block";
    document.getElementById("mtd-pill").textContent=`${selStart} – ${selEnd}`;
    document.getElementById("cal-label").textContent=`${selStart} – ${selEnd}`;
    renderRangeView();
  } else {
    sel=calPickStart; mtdMode=false; rangeMode=false;
    document.getElementById("mtd-pill").style.display="none";
    document.getElementById("cal-label").textContent=sel;
    render();
  }
}

function applyPreset(p, ev){
  const ds=ALL_DATES;
  const last=ds[ds.length-1];
  document.querySelectorAll(".cal-preset").forEach(b=>b.classList.remove("active"));
  const target = (ev && ev.target) ? ev.target.closest('.cal-preset') : null;
  if(target) target.classList.add("active");

  // Helper: get all dates belonging to a month abbr
  function datesInMonth(mon){ return ds.filter(d=>d.startsWith(mon+' ')); }

  function applyRange(start, end, label){
    calPickStart=start; calPickEnd=end; calHoverD=null;
    // Navigate calendar to the month of the start date
    const startMon=start.replace(/ \d+$/,'');
    const months=calMonths();
    calMonthIdx=months.indexOf(startMon);
    if(calMonthIdx<0) calMonthIdx=0;
    renderCalGrid();
    selStart=start; selEnd=end;
    rangeMode=true; mtdMode=false;
    document.getElementById("mtd-pill").style.display="inline-block";
    document.getElementById("mtd-pill").textContent=`${start} – ${end}`;
    document.getElementById("cal-label").textContent=label||`${start} – ${end}`;
    closeCal();
    renderRangeView();
  }

  // ── This month (MTD) — current month from its 1st to latest date
  if(p==="mtd"){
    const lastMon=last.replace(/ \d+$/,'');           // e.g. "Apr"
    const monthDates=datesInMonth(lastMon);
    const start=monthDates[0]; const end=monthDates[monthDates.length-1];
    calPickStart=start; calPickEnd=end; calHoverD=null;
    const months=calMonths(); calMonthIdx=months.indexOf(lastMon);
    renderCalGrid(); closeCal();
    mtdMode=true; rangeMode=false; sel=end;
    document.getElementById("mtd-pill").style.display="inline-block";
    document.getElementById("mtd-pill").textContent=`MTD ${start} – ${end}`;
    document.getElementById("cal-label").textContent=`${start} – ${end}`;
    render(); return;
  }

  // ── Last month — full previous month
  if(p==="lastmonth"){
    const months=calMonths();
    if(months.length<2){ applyRange(ds[0], last, "Last month"); return; }
    const prevMon=months[months.length-2];
    const prevDates=datesInMonth(prevMon);
    if(!prevDates.length){ applyRange(ds[0], last, "Last month"); return; }
    applyRange(prevDates[0], prevDates[prevDates.length-1], `Last month`);
    return;
  }

  if(p==="yesterday"){ applyRange(last, last, "Yesterday"); return; }
  if(p==="last7"){   applyRange(ds[Math.max(0,ds.length-7)], last, "Last 7 days");   return; }
  if(p==="last28"){  applyRange(ds[Math.max(0,ds.length-28)], last, "Last 28 days");  return; }
  if(p==="last14"){  applyRange(ds[Math.max(0,ds.length-14)], last, "Last 14 days");  return; }
  if(p==="last30"){  applyRange(ds[Math.max(0,ds.length-30)], last, "Last 30 days");  return; }

  if(p==="thisweek"){
    // Mon–Sun of the current calendar week
    const today = new Date();
    const dow = today.getDay(); // 0=Sun
    const diffToMon = dow===0 ? 6 : dow-1;
    const monDate = new Date(today); monDate.setDate(today.getDate()-diffToMon);
    const sunDate = new Date(monDate); sunDate.setDate(monDate.getDate()+6);
    function fmtD(dt){ const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return months[dt.getMonth()]+' '+dt.getDate(); }
    const twStart = ds.find(d=>d===fmtD(monDate)) || ds[Math.max(0,ds.length-7)];
    const twEnd   = ds.find(d=>d===fmtD(sunDate))  || last;
    applyRange(twStart, twEnd, "This week"); return;
  }
  if(p==="lastweek"){
    // Mon–Sun of the previous calendar week
    const today = new Date();
    const dow = today.getDay();
    const diffToMon = dow===0 ? 6 : dow-1;
    const thisMonDate = new Date(today); thisMonDate.setDate(today.getDate()-diffToMon);
    const lwMon = new Date(thisMonDate); lwMon.setDate(thisMonDate.getDate()-7);
    const lwSun = new Date(lwMon); lwSun.setDate(lwMon.getDate()+6);
    function fmtD(dt){ const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return months[dt.getMonth()]+' '+dt.getDate(); }
    const lwStart = ds.find(d=>d===fmtD(lwMon)) || ds[Math.max(0,ds.length-14)];
    const lwEnd   = ds.find(d=>d===fmtD(lwSun)) || ds[Math.max(0,ds.length-8)];
    applyRange(lwStart, lwEnd, "Last week"); return;
  }
}

function buildGoogleCampsHTML(camps, ds, periodOverride){
  // camps = GRANULAR.google.campaigns = { campName: {geo, days:[{d,spend,sv,conv,roas,cpo}]} }
  // ds = array of date strings to filter, or null for all-time

  // Aggregate each campaign over the requested dates
  const campNames = Object.keys(camps);
  const rows = campNames.map(name => {
    const c = camps[name];
    const days = c.days || [];
    let sp=0, sv=0, conv=0;
    if(ds && ds.length) {
      // Sum only days that match selected dates
      days.forEach(r => { if(ds.includes(r.d)){ sp+=r.spend||0; sv+=r.sv||0; conv+=r.conv||0; } });
    } else {
      // All-time: sum all days
      days.forEach(r => { sp+=r.spend||0; sv+=r.sv||0; conv+=r.conv||0; });
    }
    sp = Math.round(sp*100)/100;
    sv = Math.round(sv*100)/100;
    if(sp===0) return null;
    const roas = sp>0&&sv>0 ? Math.round(sv/sp*100)/100 : 0;
    const cpo  = conv>0 ? Math.round(sp/conv*100)/100 : 0;
    return {name, geo:c.geo, spend:sp, sv, conv, roas, cpo, days};
  }).filter(c=>c&&c.spend>0);

  if(!rows||!rows.length) return '<tr><td colspan="6" style="text-align:center;padding:14px;color:#aaa;font-size:12px">No data for this period</td></tr>';

  const showDayBreakdownG = (periodOverride==='7d' || periodOverride==='3d') && ds && ds.length > 1;

  if(showDayBreakdownG){
    return rows.sort((a,b)=>b.spend-a.spend).map(c => {
      const sig = _SIG[_adSig({spend:c.spend,sv:c.sv,conv:c.conv,roas:c.roas,cpo:c.cpo})];
      const tag = sig.tag ? `<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;background:${sig.tb};color:${sig.tc};margin-left:6px;white-space:nowrap">${sig.tag}</span>` : '';
      let html = `<tr style="background:${sig.bg};border-left:3px solid ${sig.border}">
        <td style="font-size:11px;font-weight:700;color:#222;padding:6px 8px 6px 6px">${c.name}${tag}</td>
        <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;padding:6px 8px">${fR(c.roas)}</td>
        <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;padding:6px 8px">${fS(c.spend)}</td>
        <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;padding:6px 8px">${c.sv>0?fSV(c.sv):'—'}</td>
        <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;padding:6px 8px">${c.conv>0?fC(c.conv):'—'}</td>
        <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;padding:6px 8px">${c.cpo>0?fCPO(c.cpo):'—'}</td>
      </tr>`;
      // Day sub-rows latest first
      [...(c.days||[])].reverse().forEach(r => {
        if(!ds.includes(r.d)) return;
        if(!r.spend) return;
        html+=`<tr><td style="font-size:11px;color:#888;padding:3px 8px 3px 24px">↳ ${r.d}</td>
          <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:#888;padding:3px 8px">${fR(r.roas)}</td>
          <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:#888;padding:3px 8px">${fS(r.spend)}</td>
          <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:#888;padding:3px 8px">${r.sv>0?fSV(r.sv):'—'}</td>
          <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:#888;padding:3px 8px">${r.conv>0?fC(r.conv):'—'}</td>
          <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:#888;padding:3px 8px">${r.cpo>0?fCPO(r.cpo):'—'}</td>
        </tr>`;
      });
      return html;
    }).join('');
  }

  return rows.sort((a,b)=>b.spend-a.spend).map(c => {
    const sig = _SIG[_adSig({spend:c.spend,sv:c.sv,conv:c.conv,roas:c.roas,cpo:c.cpo})];
    const tag = sig.tag ? `<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;background:${sig.tb};color:${sig.tc};margin-left:6px;white-space:nowrap">${sig.tag}</span>` : '';
    return `<tr style="background:${sig.bg};border-left:3px solid ${sig.border}">
      <td style="font-size:11px;color:#444;max-width:220px;word-break:break-word;padding-left:6px;cursor:pointer" data-adname="${c.name.replace(/"/g,'&#39;')}" data-platform="google" onmouseenter="showAdHoverChartByEl(event,this)" onmouseleave="hideAdHoverChart()"><span style="border-bottom:1px dashed #ccc">${c.name}</span>${tag}</td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;padding:8px">${fR(c.roas)}</td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;padding:8px">${fS(c.spend)}</td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;padding:8px">${c.sv>0?fSV(c.sv):'—'}</td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;padding:8px">${c.conv>0?fC(c.conv):'—'}</td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;padding:8px">${c.cpo>0?fCPO(c.cpo):'—'}</td>
    </tr>`;
  }).join('');
}

function buildSnapAdsHTML(ads, adNames, ds, label, periodOverride){
  // Reset cache every render so hover always matches current period
  window.SNAP_AD_DAILY_CACHE = {};
  const SNAP_GEO = [
    { label:'UAE',               pattern:/Snap_UAE|Snapchat_UAE|UAE_Snap/i },
    { label:'KSA',               pattern:/Snap_KSA|Snapchat_KSA/i },
    { label:'KU / QA / BH',     pattern:/Snap_KU|Snap_KW/i },
    { label:'GCC / Retargeting', pattern:/Snap_GCC|GCC_Ret/i },
  ];
  const SNAP_GEO_KEY = {'UAE':'uae','KSA':'ksa','KU / QA / BH':'ku','GCC / Retargeting':'cat'};
  function detectSnapGeo(n){ for(const g of SNAP_GEO){ if(g.pattern.test(n)) return g.label; } return null; }

  // Compute period geo spend from D.snap daily data for scaling
  // All-time geo totals (from full daily array) used as baseline
  const allDays = D.snap || [];
  const geoAllTime = {uae:{spend:0,sv:0,conv:0}, ksa:{spend:0,sv:0,conv:0}, ku:{spend:0,sv:0,conv:0}};
  const geoPeriod  = {uae:{spend:0,sv:0,conv:0}, ksa:{spend:0,sv:0,conv:0}, ku:{spend:0,sv:0,conv:0}};
  allDays.forEach(r => {
    ['uae','ksa','ku'].forEach(gk => {
      const g = r[gk]||{};
      if(!g.spend) return;
      geoAllTime[gk].spend += g.spend||0;
      geoAllTime[gk].sv    += g.sv||0;
      geoAllTime[gk].conv  += g.conv||0;
      if(ds.includes(r.d)){
        geoPeriod[gk].spend += g.spend||0;
        geoPeriod[gk].sv    += g.sv||0;
        geoPeriod[gk].conv  += g.conv||0;
      }
    });
  });
  // Scale ratios per geo
  const scaleRatio = {};
  ['uae','ksa','ku'].forEach(gk => {
    scaleRatio[gk] = geoAllTime[gk].spend > 0 ? geoPeriod[gk].spend / geoAllTime[gk].spend : 1;
  });

  // Geo-aware display name for Snap (same logic as TikTok)
  function makeSnapDn(n) {
    let d = n
      .replace(/_mar\d+(_v\d+)?$/i,'')
      .replace(/_apr\d+(_v\d+)?$/i,'')
      .replace(/_v\d+$/i,'')
      .replace(/\s*[-–]\s*Copy\s*\d*$/i,'').trim();
    // Handle UAE_Snap / UAE_Snapchat pattern (geo before platform)
    const uaeSnap = d.match(/_UAE_(?:Snap|Snapchat)_/i);
    if(uaeSnap) { d = d.replace(/_UAE_(?:Snap|Snapchat)_.*$/i,''); return d.replace(/[\s_]*En[\s_]+GLO.*/i,'').trim() + ' [UAE]'; }
    const gm = d.match(/_(?:Snapchat|Snap)_([^_]+(?:[_/][^_]+)*?)(?:_Sales|_Retarge|_Ret|_ASC|$)/i);
    let geoLbl = '';
    if (gm) {
      let g = gm[1].replace(/(?:_Sales|_Retarge|_Ret|_ASC).*/i,'').replace(/_/g,' ').trim();
      g = g.replace(/Ku\s*&\s*Qa/i,'Ku/Qa')
           .replace(/Ku[\s/_]*Qa[\s/_]*Bh.*/i,'KU/QA/BH')
           .replace(/Ku[\s/_]*Qa.*/i,'KU/QA')
           .replace(/GCC.*/i,'GCC');
      geoLbl = ` [${g}]`;
    }
    d = d.replace(/[\s_]*En[\s_]+GLO.*/i,'').trim();
    return d + geoLbl;
  }

  const merged = {};
  // Active check using SNAP_AD_STATUS
  function isSnapAdActive(name) {
    // Strip _marXX/_aprXX/_vN suffixes to get base key
    const baseName = name
      .replace(/_mar\d+(_v\d+)?$/i,'')
      .replace(/_apr\d+(_v\d+)?$/i,'')
      .replace(/_v\d+$/i,'').trim();
    const s = SNAP_AD_STATUS[baseName];
    if (s) return s !== 'inactive';
    // Geo-aware ad-number prefix match
    const numMatch = baseName.match(/^(\d+)_/);
    if (numMatch) {
      const num = numMatch[1];
      const n = baseName.toUpperCase();
      let geo = null;
      if (/SNAPCHAT_UAE|_UAE_/.test(n)) geo = 'UAE';
      else if (/SNAPCHAT_KSA|_KSA_/.test(n)) geo = 'KSA';
      else if (/SNAPCHAT_KU|KW\/QA|KWT|QAT|KUW/.test(n)) geo = 'KU';
      const candidates = Object.keys(SNAP_AD_STATUS).filter(k => k.startsWith(num + '_'));
      if (candidates.length) {
        if (geo) {
          const geoKey = candidates.find(k => {
            const ku = k.toUpperCase();
            if (geo === 'UAE') return /UAE/.test(ku);
            if (geo === 'KSA') return /KSA/.test(ku);
            if (geo === 'KU')  return /KW\/QA|KWT|QAT|KUW/.test(ku);
            return false;
          });
          if (geoKey) return SNAP_AD_STATUS[geoKey] !== 'inactive';
        }
        const bareKey = candidates.find(k => !/_(UAE|KSA|KU|KW|QA|GCC)/i.test(k.replace(num+'_','')));
        if (bareKey) return SNAP_AD_STATUS[bareKey] !== 'inactive';
      }
    }
    // Unknown = inactive (don't show retired ads)
    return false;
  }

  SNAP_GEO.forEach(g => merged[g.label] = {});

  // Track seen dates per dn to prevent double-counting duplicate keys
  const isSnapPermanentKey = name => !/_(?:mar|apr)\d+/i.test(name);
  const snapSeenDates = {};

  adNames.forEach(name => {
    if (!isSnapAdActive(name)) return;
    const geoLabel = detectSnapGeo(name);
    if (!geoLabel) return;
    const dn = makeSnapDn(name);
    const seenKey = `${geoLabel}||${dn}`;
    if (!snapSeenDates[seenKey]) snapSeenDates[seenKey] = new Set();
    const dailyRecs = ds.map(d => {
      if (snapSeenDates[seenKey].has(d)) return null;
      return (ads[name]||[]).find(x=>x.d===d)||null;
    }).filter(Boolean);
    let agg;
    if (dailyRecs.length > 0) {
      dailyRecs.forEach(r => snapSeenDates[seenKey].add(r.d));
      const a = aggRecords(dailyRecs);
      agg = a;
      // Populate hover cache with actual per-day data (same source as table)
      if(!window.SNAP_AD_DAILY_CACHE) window.SNAP_AD_DAILY_CACHE={};
      if(!window.SNAP_AD_DAILY_CACHE[seenKey]) window.SNAP_AD_DAILY_CACHE[seenKey]={};
      dailyRecs.forEach(r => {
        const sp=r.spend||0; const sv=r.sv||0; const conv=r.conv||0; const atc=r.atc||0;
        const roas=sp>0&&sv>0?Math.round(sv/sp*100)/100:0;
        const cpo=conv>0?Math.round(sp/conv*100)/100:0;
        // Accumulate in case multiple keys contribute to same day
        const ex=window.SNAP_AD_DAILY_CACHE[seenKey][r.d];
        if(ex){ ex.spend+=sp; ex.sv+=sv; ex.conv+=conv; ex.atc+=atc; ex.roas=ex.spend>0&&ex.sv>0?Math.round(ex.sv/ex.spend*100)/100:0; ex.cpo=ex.conv>0?Math.round(ex.spend/ex.conv*100)/100:0; }
        else { window.SNAP_AD_DAILY_CACHE[seenKey][r.d]={spend:sp,sv,conv,atc,roas,cpo}; }
      });
    } else {
      const mtdRecs = (ads[name]||[]).filter(r=>r&&r.spend>0);
      if(!mtdRecs.length) return;
      const mtdAgg = aggRecords(mtdRecs);
      if(!mtdAgg.spend) return;
      const gk = SNAP_GEO_KEY[geoLabel] || 'uae';
      const ratio = scaleRatio[gk] !== undefined ? scaleRatio[gk] : 1;
      agg = {
        spend: Math.round(mtdAgg.spend * ratio * 100) / 100,
        sv:    Math.round((mtdAgg.sv||0) * ratio * 100) / 100,
        conv:  Math.round((mtdAgg.conv||0) * ratio),
        atc:   Math.round((mtdAgg.atc||0) * ratio),
        roas:  mtdAgg.roas || 0,
        cpo:   0,
      };
      if(!agg.spend) return;
      agg.cpo = agg.conv > 0 ? Math.round(agg.spend / agg.conv * 100) / 100 : 0;
    }
    if (!merged[geoLabel][dn]) merged[geoLabel][dn]={spend:0,sv:0,conv:0,atc:0,wR:0};
    const m=merged[geoLabel][dn];
    m.spend+=agg.spend||0; m.sv+=agg.sv||0; m.conv+=agg.conv||0;
    m.atc+=agg.atc||0; m.wR+=(agg.roas||0)*(agg.spend||0);
  });

  // Ensure every active ad has all ds days in cache — fill gaps using table total + D.snap ratio
  if(!window.SNAP_AD_DAILY_CACHE) window.SNAP_AD_DAILY_CACHE={};
  SNAP_GEO.forEach(g => {
    const gk = SNAP_GEO_KEY[g.label]||'uae';
    const geoPeriodSpend = ds.reduce((s,d)=>{ const row=(D.snap||[]).find(x=>x.d===d); return s+(row?.[gk]?.spend||0); },0);
    Object.entries(merged[g.label]).forEach(([dn,m])=>{
      const ck=`${g.label}||${dn}`;
      if(!window.SNAP_AD_DAILY_CACHE[ck]) window.SNAP_AD_DAILY_CACHE[ck]={};
      const roas=m.spend>0?Math.round(m.wR/m.spend*100)/100:0;
      const _totalEntry={spend:m.spend,sv:m.sv,conv:m.conv,atc:m.atc,roas,cpo:m.conv>0?Math.round(m.spend/m.conv*100)/100:0};
      const coveredDays=Object.keys(window.SNAP_AD_DAILY_CACHE[ck]).filter(k=>k!=='_total');
      const missingDays=ds.filter(d=>!coveredDays.includes(d));
      if(missingDays.length===0){
        window.SNAP_AD_DAILY_CACHE[ck]['_total']=_totalEntry;
        return;
      }
      // Rebuild entire cache from table total (m) distributed by D.snap daily ratio
      if(geoPeriodSpend<=0||!m.spend){ window.SNAP_AD_DAILY_CACHE[ck]['_total']=_totalEntry; return; }
      window.SNAP_AD_DAILY_CACHE[ck]={};
      const totSpend=m.spend,totSv=m.sv,totConv=m.conv,totAtc=m.atc;
      ds.forEach(day=>{
        const geoDay=(D.snap||[]).find(x=>x.d===day)?.[gk]||{};
        if(!geoDay.spend) return;
        const ratio=geoDay.spend/geoPeriodSpend;
        const sp=Math.round(totSpend*ratio*100)/100;
        const sv=Math.round(totSv*ratio*100)/100;
        const conv=Math.round(totConv*ratio);
        const atc=Math.round(totAtc*ratio);
        window.SNAP_AD_DAILY_CACHE[ck][day]={spend:sp,sv,conv,atc,
          roas:sp>0&&sv>0?Math.round(sv/sp*100)/100:0,
          cpo:conv>0?Math.round(sp/conv*100)/100:0};
      });
      window.SNAP_AD_DAILY_CACHE[ck]['_total']=_totalEntry;
    });
  });

  const showDayBreakdownSnap = periodOverride==='7d' || periodOverride==='3d';

  let html='';

  SNAP_GEO.forEach(g => {

function buildTTAdsHTML(ads, adNames, ds, label, periodOverride){
  // Reset cache every render so hover always matches current period
  window.TT_AD_DAILY_CACHE = {};
  const TT_GEO = [
    { label:'UAE',               pattern:/Tiktok_UAE/i },
    { label:'KSA',               pattern:/Tiktok_KSA/i },
    { label:'KU / QA / BH',     pattern:/Tiktok_Ku|Tiktok_KW|Tiktok_Ku\s*[/&]/i },
    { label:'GCC / Retargeting', pattern:/Tiktok_GCC|Retargeting/i },
  ];
  function detectTTGeo(n){ for(const g of TT_GEO){ if(g.pattern.test(n)) return g.label; } return null; }

  // Merged map per geo
  const merged = {};
  TT_GEO.forEach(g => merged[g.label] = {});

  // Geo-aware display name: strips date/version/copy, extracts geo from key, strips _En_GLO
  function makeTTDn(n) {
    let d = n
      .replace(/_mar\d+(_v\d+)?$/i,'')
      .replace(/_v\d+$/i,'')
      .replace(/\s*[-–]\s*Copy\s*\d*$/i,'').trim();
    const gm = d.match(/_(?:Tiktok|Tikotk|Snapchat|Snap)_([^_]+(?:[_/][^_]+)*?)(?:_Sales|_Retarge|_Ret|_ASC|$)/i);
    let geoLbl = '';
    if (gm) {
      let g = gm[1].replace(/(?:_Sales|_Retarge|_Ret|_ASC).*/i,'').replace(/_/g,' ').trim();
      g = g.replace(/Ku\s*&\s*Qa/i,'Ku/Qa')
           .replace(/Ku[\s/_]*Qa[\s/_]*Bh.*/i,'KU/QA/BH')
           .replace(/Ku[\s/_]*Qa.*/i,'KU/QA')
           .replace(/GCC.*/i,'GCC');
      geoLbl = ` [${g}]`;
    }
    d = d.replace(/[\s_]*En[\s_]+GLO.*/i,'').trim();
    return d + geoLbl;
  }

  // Compute period scale ratios from D.tiktok daily data
  const ttAllDays = D.tiktok || [];
  const ttGeoKeys = {uae:'uae',ksa:'ksa',ku:'ku',cat:'cat'};
  const ttGeoAllTime = {uae:{spend:0}, ksa:{spend:0}, ku:{spend:0}, cat:{spend:0}};
  const ttGeoPeriod  = {uae:{spend:0}, ksa:{spend:0}, ku:{spend:0}, cat:{spend:0}};
  ttAllDays.forEach(r => {
    ['uae','ksa','ku','cat'].forEach(gk => {
      const g=r[gk]||{}; if(!g.spend) return;
      ttGeoAllTime[gk].spend += g.spend||0;
      if(ds.includes(r.d)) ttGeoPeriod[gk].spend += g.spend||0;
    });
  });
  const ttScaleRatio = {};
  ['uae','ksa','ku','cat'].forEach(gk => {
    ttScaleRatio[gk] = ttGeoAllTime[gk].spend > 0 ? ttGeoPeriod[gk].spend / ttGeoAllTime[gk].spend : 1;
  });
  const TT_GEO_KEY = {'UAE':'uae','KSA':'ksa','KU / QA / BH':'ku','GCC / Retargeting':'cat'};

  // TikTok ad status — infer from Meta status map where ad numbers match, 
  // or treat all as active since we have no separate TikTok status export yet
  function isTTAdActive(name) {
    // Use TikTok-specific status map built from TikTok export — independent of Meta
    const baseName = name.replace(/_mar\d+(_v\d+)?$/i,'').replace(/_v\d+$/i,'').trim();
    if (TIKTOK_AD_STATUS.hasOwnProperty(baseName)) {
      return TIKTOK_AD_STATUS[baseName] === 'active';
    }
    // Not in status map = old retired ad, hide
    return false;
  }

  // Build merged totals using seenDates dedup — works for both permanent and dated keys
  const isPermanentKey = name => !/_(?:mar|apr)\d+/i.test(name);
  const ttSeenDates = {};

  adNames.forEach(name => {
    if(!isTTAdActive(name)) return;
    const geo = detectTTGeo(name);
    if(!geo) return;
    const dn = makeTTDn(name);
    const seenKey = `${geo}||${dn}`;
    if(!ttSeenDates[seenKey]) ttSeenDates[seenKey] = new Set();
    const dailyRecs = ds.map(d => {
      if(ttSeenDates[seenKey].has(d)) return null;
      return (ads[name]||[]).find(x=>x.d===d)||null;
    }).filter(Boolean);
    if(dailyRecs.length > 0) {
      dailyRecs.forEach(r => ttSeenDates[seenKey].add(r.d));
      const a = aggRecords(dailyRecs);
      if(!merged[geo][dn]) merged[geo][dn]={spend:0,sv:0,conv:0,atc:0,wR:0};
      const m=merged[geo][dn];
      m.spend+=a.spend||0; m.sv+=a.sv||0; m.conv+=a.conv||0;
      m.atc+=a.atc||0; m.wR+=(a.roas||0)*(a.spend||0);
    }
  });

  const showDayBreakdownTT = periodOverride==='7d' || periodOverride==='3d';

  let html='';
  TT_GEO.forEach(g => {
    const rows = Object.entries(merged[g.label]).map(([dn,m])=>{
      const roas=m.spend>0?Math.round(m.sv/m.spend*100)/100:0;
      const cpo=m.conv>0?Math.round(m.spend/m.conv*100)/100:0;
      return {displayName:dn, agg:{spend:m.spend,sv:m.sv,conv:m.conv,atc:m.atc,roas,cpo}};
    }).sort((a,b)=>b.agg.spend-a.agg.spend);
    if (!rows.length) return;

    // Populate hover cache from breakdown data (same seenDates logic as table)
    rows.forEach(r => {
      if(!window.TT_AD_DAILY_CACHE) window.TT_AD_DAILY_CACHE = {};
      const _ck = `${g.label}||${r.displayName}`;
      window.TT_AD_DAILY_CACHE[_ck] = {};
      const seenCacheDates = new Set();
      adNames.forEach(name => {
        if(!isTTAdActive(name)) return;
        if(detectTTGeo(name) !== g.label || makeTTDn(name) !== r.displayName) return;
        ds.forEach(day => {
          if(seenCacheDates.has(day)) return;
          const rec = (ads[name]||[]).find(x => x.d === day);
          if(!rec || !rec.spend) return;
          seenCacheDates.add(day);
          window.TT_AD_DAILY_CACHE[_ck][day] = {spend:rec.spend||0,sv:rec.sv||0,conv:rec.conv||0,atc:rec.atc||0,roas:rec.roas||0,cpo:rec.cpo||0};
        });
      });
    });

    if(showDayBreakdownTT){
      let tbodyRows='';
      rows.forEach(r=>{
        // Total row (bold)
        tbodyRows+=`<tr style="background:#f8f8f4"><td style="font-size:11px;font-weight:700;color:#222;padding:6px 8px">${r.displayName}</td>${['roas','conv','spend','atc','cpo','sv'].map(k=>{
          const v=r.agg[k]||0;
          const fmt=k==='roas'?fR(v):k==='spend'?fS(v):k==='sv'?fSV(v):k==='conv'?fC(v):k==='atc'?(v>0?fC(v):'—'):fCPO(v);
          return `<td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;padding:6px 8px">${fmt}</td>`;
        }).join('')}</tr>`;
        // Day sub-rows (latest first)
        [...ds].reverse().forEach(day=>{
          // Find matching raw ad keys for this display name
          const dayRecs = adNames.filter(name=>{
            const dn2=makeTTDn(name);
            return dn2===r.displayName && detectTTGeo(name)===g.label;
          }).map(name=>(ads[name]||[]).find(x=>x.d===day)).filter(Boolean);
          if(!dayRecs.length){
            // No ad-level data for this day — skip it
            return;
          }
          const dayAgg=aggRecords(dayRecs);
          if(!dayAgg.spend) return;
          tbodyRows+=`<tr><td style="font-size:11px;color:#888;padding:3px 8px 3px 24px">↳ ${day}</td>${['roas','conv','spend','atc','cpo','sv'].map(k=>{
            const v=dayAgg[k]||0;
            const fmt=k==='roas'?fR(v):k==='spend'?fS(v):k==='sv'?fSV(v):k==='conv'?fC(v):k==='atc'?(v>0?fC(v):'—'):fCPO(v);
            return `<td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:#888;padding:3px 8px">${fmt}</td>`;
          }).join('')}</tr>`;
        });
      });
      html+=`<div style="margin-bottom:14px">
        <div style="font-size:12px;font-weight:700;letter-spacing:.06em;color:#1a1a1a;margin-bottom:8px;padding:4px 8px;background:#f0ede8;border-radius:6px">${g.label}</div>
        <table class="gtbl"><thead><tr><th>Ad</th>${PERF_HDR.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
        <tbody>${tbodyRows}</tbody></table>
      </div>`;
    } else {
      html+=`<div style="margin-bottom:14px">
        <div style="font-size:12px;font-weight:700;letter-spacing:.06em;color:#1a1a1a;margin-bottom:8px;padding:4px 8px;background:#f0ede8;border-radius:6px">${g.label}</div>
        <table class="gtbl"><thead><tr><th>Ad</th>${PERF_HDR.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
        <tbody>${rows.map(r=>perfRowSignalOther(r.displayName,r.agg,true,'tiktok',g.label)).join('')}</tbody></table>
      </div>`;
    }
  });
  return html;
}

function reRenderMetaAds(){
  const card = document.getElementById('meta-ads-card');
  if(!card) return;
  // Determine which dates to use
  const allDs = dates();
  let adsDates;
  if(metaAdsPeriod==='7d')      adsDates = allDs.slice(-7);
  else if(metaAdsPeriod==='3d') adsDates = allDs.slice(-3);
  else {
    // Default: always last 7 days to match hover card
    adsDates = allDs.slice(-7);
  }
  // Rebuild ads inner HTML
  const gran = GRANULAR.meta; if(!gran) return;
  const ads = gran.ads || {};
  const GEO_GROUPS2 = [
    { label:'UAE',          pattern:/_UAE_/i },
    { label:'KSA',          pattern:/_KSA_/i },
    { label:'KU / QA / BH',pattern:/_Ku[_&\s]|Ku\s*&\s*Qa|Ku\s*&\s*Q/i },
    { label:'Catalogue',    pattern:/^EN_|^en_/ },
  ];
  // Detect campaign type: Pyjama, Abaya, or Catalogue
  function detectCampType(n){
    if(/^EN_|^en_/.test(n)) return 'Catalogue';
    if(/Mask|Pyjama|pyjama/i.test(n)) return 'Pyjama';
    return 'Abaya';
  }
  function detectGeo2(n, adset){ for(const g of GEO_GROUPS2){ if(g.pattern.test(n)) return g.label; } if(adset){ for(const g of GEO_GROUPS2){ if(g.pattern.test(adset)) return g.label; } } return null; }

  // Build 3-level map: geo → campType → displayName → merged stats
  const byGeoCamp = {};
  GEO_GROUPS2.forEach(g=>{ byGeoCamp[g.label]={}; });

  // Track seen dates per geo/ct/displayName to prevent double-counting from duplicate keys
  const seenDates = {}; // key: `${geo}||${ct}||${dn}` → Set of dates already counted

  Object.keys(ads).forEach(name=>{
    // Skip inactive ads using status from last export
    const baseName=name.replace(/_(?:jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\d+(_v\d+)?$/i,'').replace(/_v\d+$/i,'').replace(/\s*[-–]\s*Copy\s*\d*$/i,'').trim();
    if(!isAdActive(baseName)) return;
    const geo=detectGeo2(name); if(!geo) return;
    const ct = (geo==='Catalogue') ? 'Catalogue' : detectCampType(name);
    // Build display name: strip date suffix, version, copy, then strip _Meta_GEO_Sales_ASC
    // This makes 499_..._Meta_KSA_Sales_ASC and 499_..._Meta_KSA_Sales_ASC_v1 → same dn
    // while 499_..._Meta_KSA and 499_..._Meta_Ku&Qat remain DIFFERENT (handled by geo grouping)
    let dn = name
      .replace(/_(?:jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\d+(_v\d+)?$/i,'')
      .replace(/_v\d+$/i,'')
      .replace(/\s*[-–]\s*Copy\s*\d*$/i,'')
      .trim();
    // Strip _Meta_GEO_Sales_ASC suffix to get the clean creative name
    dn = dn.replace(/_Meta_(UAE|KSA|Ku[^_]*|GCC[^_]*)_Sales_ASC.*$/i,'').trim();
    dn = dn.replace(/_Sales_ASC.*$/i,'').trim();
    dn = dn.replace(/[_ ]Prospecting[_ ]Catalogue$/i,'').replace(/_Catalogue$/i,'').replace(/[_ ]Catalogue$/i,'').replace(/[_ ]Prospecting$/i,'').trim();
    const seenKey=`${geo}||${ct}||${dn}`;
    if(!seenDates[seenKey]) seenDates[seenKey]=new Set();
    // Only use dates not yet seen for this display name
    const recs=adsDates.map(d=>{
      if(seenDates[seenKey].has(d)) return null;
      return (ads[name]||[]).find(x=>x.d===d)||null;
    }).filter(Boolean);
    // Mark these dates as seen
    recs.forEach(r=>seenDates[seenKey].add(r.d));
    const agg=aggRecords(recs);
    // Allow active ads with zero spend in period to still appear (new/paused ads)
    if(!byGeoCamp[geo][ct]) byGeoCamp[geo][ct]={};
    if(!byGeoCamp[geo][ct][dn]) byGeoCamp[geo][ct][dn]={spend:0,sv:0,conv:0,atc:0,wR:0};
    const m=byGeoCamp[geo][ct][dn];
    m.spend+=agg.spend||0; m.sv+=agg.sv||0; m.conv+=agg.conv||0;
    m.atc+=agg.atc||0; m.wR+=(agg.roas||0)*(agg.spend||0);
  });

  function campRows(ctMap){
    return Object.entries(ctMap).map(([dn,m])=>{
      const roas=m.spend>0?Math.round(m.sv/m.spend*100)/100:0;
      const cpo=m.conv>0?Math.round(m.spend/m.conv*100)/100:0;
      return {displayName:dn, agg:{spend:m.spend,sv:m.sv,conv:m.conv,atc:m.atc,roas,cpo}};
    }).sort((a,b)=>b.agg.spend-a.agg.spend);
  }

  const showDayBreakdown = metaAdsPeriod==='7d' || metaAdsPeriod==='3d';

  // Sub-group label style
  function subGrpHdr(label){
    return `<tr><td colspan="${PERF_HDR.length+1}" style="font-size:10px;font-weight:700;letter-spacing:.07em;color:#1a1a1a;padding:8px 8px 3px 16px;text-transform:uppercase">${label}</td></tr>`;
  }

  let adsHTML2='';
  GEO_GROUPS2.forEach(g=>{
    const gData=byGeoCamp[g.label]||{};
    // Determine which camp types are present, in order
    const campOrder = g.label==='Catalogue' ? ['Catalogue'] : ['Abaya','Pyjama','Catalogue'];
    const presentTypes = campOrder.filter(ct=>gData[ct] && Object.keys(gData[ct]).length>0);
    if(!presentTypes.length) return;

    // Count total geo spend to skip empty geos
    let geoSpend=0;
    presentTypes.forEach(ct=>campRows(gData[ct]).forEach(r=>geoSpend+=r.agg.spend));
    if(!geoSpend) return;

    const multiType = g.label !== 'Catalogue';

    if(showDayBreakdown){
      let tbodyRows='';
      presentTypes.forEach(ct=>{
        const rows=campRows(gData[ct]);
        if(!rows.length) return;
        if(multiType) tbodyRows+=subGrpHdr(ct);
        rows.forEach(r=>{
          tbodyRows+=`<tr style="background:#f8f8f4"><td style="font-size:11px;font-weight:700;color:#222;padding:6px 8px${multiType?' padding-left:24px':''}">${r.displayName}</td>${['roas','conv','spend','atc','cpo','sv'].map(k=>{
            const v=r.agg[k]||0;
            const fmt=k==='roas'?fR(v):k==='spend'?fS(v):k==='sv'?fSV(v):k==='conv'?fC(v):k==='atc'?(v>0?fC(v):'—'):fCPO(v);
            return `<td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;padding:6px 8px">${fmt}</td>`;
          }).join('')}</tr>`;
          // Day sub-rows
          [...adsDates].reverse().forEach(day=>{
            const dayRecs=Object.keys(ads).filter(name=>{
              let dn=name.replace(/_(?:jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\d+(_v\d+)?$/i,'').replace(/_v\d+$/i,'').replace(/\s*[-–]\s*Copy\s*\d*$/i,'').trim();
              dn=dn.replace(/_Meta_(UAE|KSA|Ku[^_]*|GCC[^_]*)_Sales_ASC.*$/i,'').trim();
              dn=dn.replace(/_Sales_ASC.*$/i,'').trim();
              dn=dn.replace(/[_ ]Prospecting[_ ]Catalogue$/i,'').replace(/_Catalogue$/i,'').replace(/[_ ]Catalogue$/i,'').replace(/[_ ]Prospecting$/i,'').trim();
              const nameCT=(detectGeo2(name)==='Catalogue')?'Catalogue':detectCampType(name);
              return dn===r.displayName && detectGeo2(name)===g.label && nameCT===ct;
            }).map(name=>(ads[name]||[]).find(x=>x.d===day)).filter(Boolean);
            if(!dayRecs.length) return;
            const dayAgg=aggRecords(dayRecs);
            if(!dayAgg.spend) return;
            tbodyRows+=`<tr><td style="font-size:11px;color:#888;padding:3px 8px 3px ${multiType?'40px':'24px'}">↳ ${day}</td>${['roas','conv','spend','atc','cpo','sv'].map(k=>{
              const v=dayAgg[k]||0;

    return{...p,a:{spend,sv,conv,atc,roas:spend>0?wR/spend:0,cpo:conv>0?spend/conv:0}};
  });
  let totSpend=0,totSV=0,totConv=0,totAtc=0,wR=0;
  rws.forEach(p=>{totSpend+=p.a.spend;totSV+=p.a.sv;totConv+=p.a.conv;totAtc+=(p.a.atc||0);wR+=p.a.roas*p.a.spend;});
  const blended=totSpend>0?wR/totSpend:0;
  const totCPO=totConv>0?totSpend/totConv:0;
  const sorted=(fn)=>[...rws].sort((a,b)=>fn(b.a)-fn(a.a));

    {lbl:"CPO",sub:"BLENDED",val:fCPO(totCPO),rows:bySpend,fn:a=>fCPO(a.cpo)},

  const trendDS=PL.map(p=>{
    const arr=D[p.key]||[];
    return{label:p.label,data:rd.map(d=>{const r=arr.find(x=>x.d===d);return r&&r.spend>0?+(r.roas||0).toFixed(2):null;}),
      borderColor:p.color,backgroundColor:p.color+"22",borderWidth:2.5,
      pointRadius:4,pointBackgroundColor:p.color,tension:0.3,spanGaps:false};
  });
  _atcDates = rd;
  document.getElementById("view").innerHTML=`<div class="g6">${cardHTML}</div>${buildSpendChart()}${buildCampaignTable(rd, selStart+" – "+selEnd)}${buildAdsetTable(rd, selStart+" – "+selEnd)}${buildMarketTable(rd, selStart+" – "+selEnd)}`;
