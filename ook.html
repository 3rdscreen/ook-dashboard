// ── Platform Performance Table helper
function buildPlatformTable(rws, label){
  // rws: array of {key, label, color, r (day data) OR a (agg data)}
  const tdS = "text-align:center;padding:8px;border-bottom:1px solid #f4f4ef;font-family:monospace;font-size:12px";

  // Collect per-platform data for totals
  const platData = rws.map(p => {
    const d = p.r || p.a;
    const h = d && d.spend > 0;
    return { p, d, h, atcVal: getAtcForPlatform(p.key) };
  });

  const rows = platData.map(({p, d, h, atcVal}) => {
    const avgPV = (h && d.conv > 0) ? fSV((d.sv||0) / d.conv) : "—";
    return `<tr>
      <td style="font-size:12px;font-weight:600;color:#1a1a1a;padding:8px 12px;border-bottom:1px solid #f4f4ef"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${p.color};margin-right:7px;vertical-align:middle;flex-shrink:0"></span>${p.label}</td>
      <td style="${tdS}">${h ? fC(d.conv) : "—"}</td>
      <td style="${tdS}">${h ? fR(d.roas) : "—"}</td>
      <td style="${tdS}">${h ? fS(d.spend) : "—"}</td>
      <td style="${tdS}">${atcVal !== null ? fC(atcVal) : "—"}</td>
      <td style="${tdS}">${h ? fCPO(d.cpo) : "—"}</td>
      <td style="${tdS}">${avgPV}</td>
      <td style="${tdS}">${h ? fSV(d.sv||0) : "—"}</td>
    </tr>`;
  }).join("");

  // ── TOTALS row
  let totSpend=0, totSV=0, totConv=0, totAtc=0, wR=0, hasAtc=false;
  platData.forEach(({d,h,atcVal}) => {
    if(!h) return;
    totSpend += d.spend||0;
    totSV    += d.sv||0;
    totConv  += d.conv||0;
    wR       += (d.roas||0)*(d.spend||0);
    if(atcVal !== null){ totAtc += atcVal; hasAtc = true; }
  });
  const totRoas  = totSpend > 0 ? wR / totSpend : 0;           // weighted avg
  const totCPO   = totConv  > 0 ? totSpend / totConv : 0;      // blended CPO
  const totAvgPV = totConv  > 0 ? totSV / totConv : 0;         // avg purchase value
  const totTdS   = "text-align:center;padding:9px 8px;font-family:monospace;font-size:12px;font-weight:700;background:#f4f4ef";
  const totRow   = `<tr style="border-top:2px solid #1a1a1a">
    <td style="font-size:12px;font-weight:700;color:#1a1a1a;padding:9px 12px;background:#f4f4ef">Total</td>
    <td style="${totTdS}">${totConv > 0 ? fC(totConv) : "—"}</td>
    <td style="${totTdS}">${totRoas > 0 ? fR(totRoas) : "—"}</td>
    <td style="${totTdS}">${totSpend > 0 ? fS(totSpend) : "—"}</td>
    <td style="${totTdS}">${hasAtc ? fC(totAtc) : "—"}</td>
    <td style="${totTdS}">${totCPO > 0 ? fCPO(totCPO) : "—"}</td>
    <td style="${totTdS}">${totAvgPV > 0 ? fSV(totAvgPV) : "—"}</td>
    <td style="${totTdS}">${totSV > 0 ? fSV(totSV) : "—"}</td>
  </tr>`;

  const cols = ["Platform","Purchases","ROAS","Spent","ATC","CPO","Avg Purchase Value","Conversion Value"];
  const hdr = `<tr style="background:#f8f8f4">${cols.map((c,i)=>
    `<th style="padding:8px ${i===0?12:8}px;text-align:${i===0?"left":"center"};font-size:10px;font-weight:700;letter-spacing:.06em;color:#888;border-bottom:2px solid #ebebeb;white-space:nowrap">${c}</th>`
  ).join("")}</tr>`;
  return `<div class="cc" style="margin-bottom:16px">
    <div class="clbl">OVERALL PERFORMANCE BY PLATFORM — ${label}</div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-family:'DM Mono',monospace;font-size:12px">
      <thead>${hdr}</thead>
      <tbody style="color:#1a1a1a">${rows}${totRow}</tbody>
    </table>
    </div>
  </div>`;
}

// ── Campaign Performance Table
function buildCampaignTable(datesArr, label){
  const ds = Array.isArray(datesArr) ? datesArr : [datesArr];

  function aggRecs(recs){
    let spend=0,sv=0,conv=0,atc=0,wR=0,hasAtc=false;
    recs.forEach(r=>{
      if(!r||r.spend<=0) return;
      spend+=r.spend; sv+=r.sv||0; conv+=r.conv||0; wR+=(r.roas||0)*r.spend;
      if(r.atc!=null){atc+=r.atc; hasAtc=true;}
    });
    const roas=spend>0?wR/spend:0, cpo=conv>0?spend/conv:0, avgPV=conv>0?sv/conv:0;
    return {spend,sv,conv,atc,hasAtc,roas,cpo,avgPV};
  }

  const tdC = "padding:7px 8px;border-bottom:1px solid #f4f4ef;font-family:monospace;font-size:11px;text-align:center";
  const tdL = "padding:7px 8px 7px 14px;border-bottom:1px solid #f4f4ef;font-size:11px;color:#444;max-width:220px;word-break:break-word";

  function dataCell(h, val){ return `<td style="${tdC}">${h ? val : "—"}</td>`; }

  const gran = GRANULAR;

  // Build groups: [{platLabel, platColor, campaigns:[{name, agg}]}]
  const metaColor  = PL.find(p=>p.key==='meta')?.color    || '#1877F2';
  const ttColor    = PL.find(p=>p.key==='tiktok')?.color  || '#010101';
  const snapColor  = PL.find(p=>p.key==='snap')?.color    || '#FFFC00';
  const gColor     = PL.find(p=>p.key==='google')?.color  || '#4285F4';

  // ── META — Abaya campaign per geo (matches Market Breakdown)
  function aggMetaGeo(keys) {
    return aggRecs(keys.flatMap(k => ds.map(d=>(gran.meta?.adsets?.[k]||[]).find(r=>r.d===d)).filter(Boolean)));
  }
  const metaAdsets = [
    { name:'UAE Sales - ASC',        agg: aggMetaGeo(['UAE Abaya - ASC','UAE Pyjama - ASC']) },
    { name:'KSA Sales - ASC',        agg: aggMetaGeo(['KSA Abaya - ASC','KSA Pyjama - ASC']) },
    { name:'KUW-QAT-BH Sales - ASC', agg: aggMetaGeo(['KU Abaya - ASC','KU Pyjama - ASC']) },
    { name:'Catalogue Sales - GCC',  agg: aggMetaGeo(['Catalogue Retargeting / Prospecting - GCC']) },
    { name:'Followers - GCC Brand',  agg: aggRecs(ds.map(d=>(gran.meta?.adsets?.[META_FOLLOWERS_KEY]||[]).find(r=>r.d===d)).filter(Boolean)), isFollowers: true },
  ];
  const metaCamps = metaAdsets.map(({name, agg, isFollowers}) => {
    if(isFollowers) return { name, agg:{ spend:agg.spend, sv:0, conv:0, atc:0, hasAtc:false, roas:0, cpo:0, avgPV:0 }};
    return { name, agg };
  }).filter(c => c.agg.spend > 0);
  // ── TIKTOK
  const ttData = D.tiktok || [];
  const ttRet = aggRecs(ds.map(d=>{
    const r=ttData.find(x=>x.d===d);
    if(!r||!r.cat||!r.cat.spend) return null;
    const catShare = r.spend>0 ? (r.cat.spend||0)/r.spend : 0;
    const atcRet = r.atc!=null ? Math.round((r.atc||0)*catShare) : null;
    return {spend:r.cat.spend||0, sv:r.cat.sv||0, conv:r.cat.conv||0, roas:r.cat.roas||0, atc:atcRet};
  }).filter(Boolean));
  const ttPros = aggRecs(ds.map(d=>{
    const r=ttData.find(x=>x.d===d);
    if(!r) return null;
    const s=(r.uae?.spend||0)+(r.ksa?.spend||0)+(r.ku?.spend||0);
    const sv=(r.uae?.sv||0)+(r.ksa?.sv||0)+(r.ku?.sv||0);
    const cv=(r.uae?.conv||0)+(r.ksa?.conv||0)+(r.ku?.conv||0);
    const wR=(r.uae?.roas||0)*(r.uae?.spend||0)+(r.ksa?.roas||0)*(r.ksa?.spend||0)+(r.ku?.roas||0)*(r.ku?.spend||0);
    const catShare2 = r.spend>0 ? (r.cat?.spend||0)/r.spend : 0;
    const atcPros = r.atc!=null ? Math.round((r.atc||0)*(1-catShare2)) : null;
    return {spend:s, sv, conv:cv, roas:s>0?wR/s:0, atc:atcPros};
  }).filter(Boolean));
  const ttCamps = [
    {name:'GCC - Sales (Retargeting)',  agg:ttRet},
    {name:'GCC - Sales (Prospecting)', agg:ttPros},
  ].filter(c=>c.agg.spend>0);

  // ── SNAPCHAT
  const snapData = D.snap || [];
  const snapAgg = aggRecs(ds.map(d=>snapData.find(x=>x.d===d)).filter(r=>r&&r.spend>0));
  const snapCamps = snapAgg.spend > 0
    ? [{name:'GCC - Sales (Retargeting + ASC)', agg:snapAgg}]
    : [];

  // ── GOOGLE — sum per-campaign daily records for selected dates
  const gCamps = Object.entries(gran.google?.campaigns||{}).map(([name,c]) => {
    let sp=0,sv=0,conv=0;
    (c.days||[]).forEach(r=>{ if(ds.includes(r.d)){ sp+=r.spend||0; sv+=r.sv||0; conv+=r.conv||0; } });
    sp=Math.round(sp*100)/100; sv=Math.round(sv*100)/100;
    if(sp===0) return null;
    const roas=sp>0&&sv>0?Math.round(sv/sp*100)/100:0;
    return { name, agg: { spend:sp, sv, conv, roas, cpo:conv>0?Math.round(sp/conv*100)/100:0, avgPV:conv>0?Math.round(sv/conv*100)/100:0, atc:null, hasAtc:false } };
  }).filter(c=>c&&c.agg.spend>0);

  // ── Build HTML — group per platform with colored left border + header row
  const groups = [
    { label:'META',     color:metaColor,  camps:metaCamps  },
    { label:'TIKTOK',   color:ttColor,    camps:ttCamps    },
    { label:'SNAPCHAT', color:snapColor,  camps:snapCamps  },
    { label:'GOOGLE',   color:gColor,     camps:gCamps     },
  ];

  let tbody = '';
  groups.forEach(g => {
    if(!g.camps.length) return;
    // Platform header row spanning all columns
    tbody += `<tr>
      <td colspan="9" style="padding:6px 12px;background:${g.color}15;border-left:3px solid ${g.color};border-bottom:1px solid ${g.color}30;font-size:11px;font-weight:700;letter-spacing:.06em;color:#1a1a1a"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${g.color};margin-right:7px;vertical-align:middle"></span>${g.label}</td>
    </tr>`;
    // Campaign rows
    g.camps.forEach(c => {
      const a = c.agg, h = a.spend > 0;
      tbody += `<tr style="border-left:3px solid ${g.color}40">
        <td style="padding:7px 12px 7px 20px;border-bottom:1px solid #f4f4ef;font-size:11px;color:#333;font-weight:500">${c.name}</td>
        ${dataCell(h, fC(a.conv))}
        ${dataCell(h, fR(a.roas))}
        ${dataCell(h, fS(a.spend))}
        ${dataCell(a.hasAtc, fC(a.atc))}
        ${dataCell(h&&a.cpo>0, fCPO(a.cpo))}
        ${dataCell(h&&a.avgPV>0, fSV(a.avgPV))}
        ${dataCell(h, fSV(a.sv))}
      </tr>`;
    });
  });

  const cols = ["Campaign","Purchases","ROAS","Spent","ATC","CPO","AOV","Conversion Value"];
  const hdr = `<tr style="background:#f8f8f4">${cols.map((c,i)=>
    `<th style="padding:9px ${i===0?14:8}px;text-align:${i===0?"left":"center"};font-size:10px;font-weight:700;letter-spacing:.06em;color:#888;border-bottom:2px solid #ebebeb;white-space:nowrap">${c}</th>`
  ).join("")}</tr>`;

  return `<div class="cc" style="margin-bottom:16px">
    <div class="clbl">OVERALL PERFORMANCE BY CAMPAIGN — ${label}</div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-family:'DM Mono',monospace;font-size:12px">
      <thead>${hdr}</thead>
      <tbody style="color:#1a1a1a">${tbody}</tbody>
    </table>
    </div>
  </div>`;
}

// ── AdSet Performance Table
function buildAdsetTable(datesArr, label){
  const ds = Array.isArray(datesArr) ? datesArr : [datesArr];
  const gran = GRANULAR;

  function aggRecs(recs){
    let spend=0,sv=0,conv=0,atc=0,wR=0,hasAtc=false;
    recs.forEach(r=>{
      if(!r||r.spend<=0) return;
      spend+=r.spend; sv+=r.sv||0; conv+=r.conv||0; wR+=(r.roas||0)*r.spend;
      if(r.atc!=null){atc+=r.atc; hasAtc=true;}
    });
    const roas=spend>0?wR/spend:0, cpo=conv>0?spend/conv:0, avgPV=conv>0?sv/conv:0;
    return {spend,sv,conv,atc,hasAtc,roas,cpo,avgPV};
  }
  function getAdset(pk, key){ return ds.map(d=>(gran[pk]?.adsets?.[key]||[]).find(r=>r.d===d)).filter(Boolean); }
  function aggAdset(pk, keys){ return aggRecs(keys.flatMap(k=>getAdset(pk,k))); }

  const metaColor = PL.find(p=>p.key==='meta')?.color   || '#1877F2';
  const ttColor   = PL.find(p=>p.key==='tiktok')?.color || '#010101';
  const snapColor = PL.find(p=>p.key==='snap')?.color   || '#FFFC00';
  const gColor    = PL.find(p=>p.key==='google')?.color || '#4285F4';

  const tdC = "padding:7px 8px;border-bottom:1px solid #f4f4ef;font-family:monospace;font-size:11px;text-align:center";
  const tdL = "padding:7px 8px 7px 14px;border-bottom:1px solid #f4f4ef;font-size:11px;color:#444";
  function dataCell(h, val){ return `<td style="${tdC}">${h ? val : '—'}</td>`; }
  function geoLabel(geo){ return `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#9ca3af;margin-right:6px;vertical-align:middle"></span>${geo}`; }

  // ── META adsets — UAE/KSA/KU split into Abaya + Pyjama sub-rows
  const metaAdsets = [
    { geo:'UAE', isGeoHeader:true, agg: aggAdset('meta',['UAE Abaya - ASC','UAE Pyjama - ASC']) },
    { geo:'↳ Abaya',   indent:true, agg: aggAdset('meta',['UAE Abaya - ASC']) },
    { geo:'↳ Pyjama',  indent:true, agg: aggAdset('meta',['UAE Pyjama - ASC']) },
    { geo:'KSA', isGeoHeader:true, agg: aggAdset('meta',['KSA Abaya - ASC','KSA Pyjama - ASC']) },
    { geo:'↳ Abaya',   indent:true, agg: aggAdset('meta',['KSA Abaya - ASC']) },
    { geo:'↳ Pyjama',  indent:true, agg: aggAdset('meta',['KSA Pyjama - ASC']) },
    { geo:'KU / QA / BH', isGeoHeader:true, agg: aggAdset('meta',['KU Abaya - ASC','KU Pyjama - ASC']) },
    { geo:'↳ Abaya',   indent:true, agg: aggAdset('meta',['KU Abaya - ASC']) },
    { geo:'↳ Pyjama',  indent:true, agg: aggAdset('meta',['KU Pyjama - ASC']) },
    { geo:'Catalogue / Retargeting',agg: aggAdset('meta',['Catalogue Retargeting / Prospecting - GCC']) },
    { geo:'Followers – Brand GCC',  agg: aggRecs(getAdset('meta', META_FOLLOWERS_KEY)), isFollowers:true },
  ].filter(a => a.agg.spend > 0 || a.isFollowers);

  // ── TIKTOK adsets
  const ttAdsets = [
    { geo:'GCC Sales - All',      agg: aggAdset('tiktok',['GCC Sales - All']) },
    { geo:'UAE Interest - IOS',   agg: aggAdset('tiktok',['UAE Interest - IOS']) },
    { geo:'KSA Interest - IOS',   agg: aggAdset('tiktok',['KSA Interest - IOS']) },
  ].filter(a => a.agg.spend > 0);
  // Fallback: if tiktok GRANULAR adsets empty (dates beyond Mar 16), use D geo breakdown
  if(!ttAdsets.length){
    const ttD = D.tiktok || [];
    ['uae','ksa','ku','cat'].forEach(g => {
      const agg = aggRecs(ds.map(d=>{const r=ttD.find(x=>x.d===d);if(!r||!r[g]) return null; const gShare=r.spend>0?(r[g].spend||0)/r.spend:0; const atcG=r.atc!=null?Math.round((r.atc||0)*gShare):null; return {spend:r[g].spend||0,sv:r[g].sv||0,conv:r[g].conv||0,roas:r[g].roas||0,atc:atcG};}).filter(Boolean));
      if(agg.spend>0) ttAdsets.push({geo:GL[g], agg});
    });
  }

  // ── SNAP adsets — always use D geo breakdown (GRANULAR only has KSA/KU, missing UAE)
  const snapAdsets = [];
  const snapD = D.snap || [];
  ['uae','ksa','ku'].forEach(g => {
    const agg = aggRecs(ds.map(d=>{const r=snapD.find(x=>x.d===d);return r&&r[g]?{spend:r[g].spend||0,sv:r[g].sv||0,conv:r[g].conv||0,roas:r[g].roas||0,atc:r[g].atc??null}:null;}).filter(Boolean));
    if(agg.spend>0) snapAdsets.push({geo:GL[g], agg});
  });

  // ── GOOGLE — sum per-campaign daily records for selected dates, group by geo
  const geoMap = {};
  Object.entries(gran.google?.campaigns||{}).forEach(([_gn,c]) => {
    const geo = c.geo; if(!geo) return;
    if(!geoMap[geo]) geoMap[geo] = {spend:0,sv:0,conv:0,wR:0};
    (c.days||[]).forEach(r => {
      if(!ds.includes(r.d)) return;
      const sp=r.spend||0, sv=r.sv||0, conv=r.conv||0;
      geoMap[geo].spend += sp;
      geoMap[geo].sv    += sv;
      geoMap[geo].conv  += conv;
      geoMap[geo].wR    += sp>0 ? (sv/sp)*sp : 0;
    });
  });
  const gAdsets = Object.entries(geoMap).map(([geo,v]) => ({
    geo: GL[geo]||geo.toUpperCase(),
    agg: { spend:Math.round(v.spend*100)/100, sv:Math.round(v.sv*100)/100, conv:v.conv, roas:v.spend>0?Math.round(v.wR/v.spend*100)/100:0, cpo:v.conv>0?Math.round(v.spend/v.conv*100)/100:0, avgPV:v.conv>0?Math.round(v.sv/v.conv*100)/100:0, atc:null, hasAtc:false }
  })).filter(a=>a.agg.spend>0);

  // ── Build rows grouped by platform
  const groups = [
    { label:'META',     color:metaColor, adsets:metaAdsets  },
    { label:'TIKTOK',   color:ttColor,   adsets:ttAdsets    },
    { label:'SNAPCHAT', color:snapColor, adsets:snapAdsets  },
    { label:'GOOGLE',   color:gColor,    adsets:gAdsets     },
  ];

  let tbody = '';
  groups.forEach(g => {
    if(!g.adsets.length) return;
    tbody += `<tr>
      <td colspan="9" style="padding:6px 12px;background:${g.color}15;border-left:3px solid ${g.color};border-bottom:1px solid ${g.color}30;font-size:11px;font-weight:700;letter-spacing:.06em;color:#1a1a1a">
        <span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${g.color};margin-right:7px;vertical-align:middle"></span>${g.label}
      </td>
    </tr>`;
    g.adsets.forEach(a => {
      const ag = a.agg, h = ag.spend > 0;
      const isFollowers = a.isFollowers;
      const isHeader = a.isGeoHeader;
      const isIndent = a.indent;
      // Style variations: geo header = bold, indent = lighter + indented
      const rowBg = isHeader ? `background:${g.color}08` : '';
      const namePad = isIndent ? '7px 12px 7px 38px' : '7px 12px 7px 24px';
      const nameColor = isIndent ? '#777' : '#444';
      const nameFw = isHeader ? '700' : (isIndent ? '400' : '500');
      const nameFsize = isIndent ? '10.5px' : '11px';
      const dotColor = isIndent ? '#c4c4c0' : '#9ca3af';
      const dot = `<span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${dotColor};margin-right:6px;vertical-align:middle"></span>`;
      tbody += `<tr style="border-left:3px solid ${isIndent?g.color+'25':g.color+'40'};${rowBg}">
        <td style="padding:${namePad};border-bottom:1px solid #f4f4ef;font-size:${nameFsize};color:${nameColor};font-weight:${nameFw}">${dot}${a.geo}</td>
        ${dataCell(!isFollowers&&h, fC(ag.conv))}
        ${dataCell(!isFollowers&&h, fR(ag.roas))}
        ${dataCell(h, fS(ag.spend))}
        ${dataCell(ag.hasAtc, fC(ag.atc))}
        ${dataCell(!isFollowers&&h&&ag.cpo>0, fCPO(ag.cpo))}
        ${dataCell(!isFollowers&&h&&ag.avgPV>0, fSV(ag.avgPV))}
        ${dataCell(!isFollowers&&h, fSV(ag.sv))}
      </tr>`;
    });
  });

  const cols = ["Ad Set","Purchases","ROAS","Spent","ATC","CPO","AOV","Conversion Value"];
  const hdr = `<tr style="background:#f8f8f4">${cols.map((c,i)=>
    `<th style="padding:9px ${i===0?14:8}px;text-align:${i===0?'left':'center'};font-size:10px;font-weight:700;letter-spacing:.06em;color:#888;border-bottom:2px solid #ebebeb;white-space:nowrap">${c}</th>`
  ).join('')}</tr>`;

  return `<div class="cc" style="margin-bottom:16px">
    <div class="clbl">OVERALL PERFORMANCE BY AD SET — ${label}</div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-family:'DM Mono',monospace;font-size:12px">
      <thead>${hdr}</thead>
      <tbody style="color:#1a1a1a">${tbody}</tbody>
    </table>
    </div>
  </div>`;
}

// ── Market Performance Table
function buildMarketTable(datesArr, label){
  const ds = Array.isArray(datesArr) ? datesArr : [datesArr];

  function aggRecs(recs){
    let spend=0,sv=0,conv=0,wR=0;
    recs.forEach(r=>{
      if(!r||r.spend<=0) return;
      spend+=r.spend; sv+=r.sv||0; conv+=r.conv||0; wR+=(r.roas||0)*r.spend;
    });
    const roas=spend>0?wR/spend:0, cpo=conv>0?spend/conv:0, avgPV=conv>0?sv/conv:0;
    return {spend,sv,conv,roas,cpo,avgPV};
  }

  const tdC = "padding:8px;border-bottom:1px solid #f4f4ef;font-family:monospace;font-size:12px;text-align:center";

  // Markets: UAE, KSA, KU/QA/BH, GCC (catalogue/retargeting = no specific geo)
  const markets = [
    { label:'UAE',       geoKey:'uae',  color:'#2563eb' },
    { label:'KSA',       geoKey:'ksa',  color:'#16a34a' },
    { label:'KUW/QA',    geoKey:'ku',   color:'#9333ea' },
    { label:'GCC',       geoKey:'cat',  color:'#ea580c' },
  ];

  // Aggregate across all platforms per geo
  const platformKeys = ['meta','tiktok','snap','google'];

  const rows = markets.map(m => {
    let spend=0,sv=0,conv=0,atc=0,wR=0,hasAtc=false;

    platformKeys.forEach(pk => {
      const dayData = D[pk] || [];
      ds.forEach(d => {
        const r = dayData.find(x=>x.d===d);
        if(!r) return;
        const g = r[m.geoKey] || {};
        if(!g.spend||g.spend<=0) return;
        spend += g.spend||0;
        sv    += g.sv||0;
        conv  += g.conv||0;
        wR    += (g.roas||0)*(g.spend||0);
      });
      // ATC from GRANULAR adsets for this platform+geo
      const gran = GRANULAR[pk];
      if(gran?.adsets){
        Object.values(gran.adsets).forEach(arr => {
          arr.forEach(r => {
            if(ds.includes(r.d) && r.atc!=null){ atc+=r.atc; hasAtc=true; }
          });
        });
      }
    });

    const roas  = spend>0?wR/spend:0;
    const cpo   = conv>0?spend/conv:0;
    const avgPV = conv>0?sv/conv:0;
    const h = spend > 0;

    return `<tr>
      <td style="padding:8px 12px;border-bottom:1px solid #f4f4ef;font-size:12px;font-weight:600;color:#1a1a1a"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${m.color};margin-right:7px;vertical-align:middle"></span>${m.label}</td>
      <td style="${tdC}">${h ? fC(conv) : "—"}</td>
      <td style="${tdC}">${h ? fR(roas) : "—"}</td>
      <td style="${tdC}">${h ? fS(spend) : "—"}</td>
      <td style="${tdC}">${h&&avgPV>0 ? fSV(avgPV) : "—"}</td>
      <td style="${tdC}">${h&&cpo>0 ? fCPO(cpo) : "—"}</td>
      <td style="${tdC}">${h&&sv>0 ? fSV(sv) : "—"}</td>
    </tr>`;
  });

  // Total row
  let totSpend=0,totSV=0,totConv=0,totWR=0;
  markets.forEach(m => {
    platformKeys.forEach(pk => {
      const dayData = D[pk]||[];
      ds.forEach(d => {
        const r=dayData.find(x=>x.d===d);
        if(!r) return;
        const g=r[m.geoKey]||{};
        if(!g.spend||g.spend<=0) return;
        totSpend+=g.spend||0; totSV+=g.sv||0; totConv+=g.conv||0; totWR+=(g.roas||0)*(g.spend||0);
      });
    });
  });
  const totRoas  = totSpend>0?totWR/totSpend:0;
  const totCPO   = totConv>0?totSpend/totConv:0;
  const totAvgPV = totConv>0?totSV/totConv:0;
  const tS = "padding:9px 8px;border-bottom:1px solid #f4f4ef;font-family:monospace;font-size:12px;font-weight:700;background:#f4f4ef;text-align:center";
  const totRow = `<tr style="border-top:2px solid #1a1a1a">
    <td style="padding:9px 12px;background:#f4f4ef;font-size:12px;font-weight:700;color:#1a1a1a">Total</td>
    <td style="${tS}">${totConv>0?fC(totConv):"—"}</td>
    <td style="${tS}">${totRoas>0?fR(totRoas):"—"}</td>
    <td style="${tS}">${totSpend>0?fS(totSpend):"—"}</td>
    <td style="${tS}">${totAvgPV>0?fSV(totAvgPV):"—"}</td>
    <td style="${tS}">${totCPO>0?fCPO(totCPO):"—"}</td>
    <td style="${tS}">${totSV>0?fSV(totSV):"—"}</td>
  </tr>`;

  const cols = ["Market","Purchases","ROAS","Spent","Avg Purchase Value","CPO","Conversion Value"];
  const hdr = `<tr style="background:#f8f8f4">${cols.map((c,i)=>
    `<th style="padding:9px ${i===0?12:8}px;text-align:${i===0?"left":"center"};font-size:10px;font-weight:700;letter-spacing:.06em;color:#888;border-bottom:2px solid #ebebeb;white-space:nowrap">${c}</th>`
  ).join("")}</tr>`;

  return `<div class="cc" style="margin-bottom:16px">
    <div class="clbl">OVERALL PERFORMANCE BY MARKET — ${label}</div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-family:'DM Mono',monospace;font-size:12px">
      <thead>${hdr}</thead>
      <tbody style="color:#1a1a1a">${rows.join("")}${totRow}</tbody>
    </table>
    </div>
  </div>`;
}

// ── TOP PERFORMING ADS Table
// ── Top Ads state (for filters)
let _topAdsState = { market:'all', period:'all', baseDates:[], baseLabel:'' };

function buildTopAdsTable(datesArr, label, topN){
  // Store base dates for filter re-rendering
  const baseDates = Array.isArray(datesArr) ? datesArr : [datesArr];
  _topAdsState.baseDates = baseDates;
  _topAdsState.baseLabel = label;
  _topAdsState.market = 'all';
  _topAdsState.period = 'all';

  return renderTopAdsInner(baseDates, label, topN||10, 'all', 'all');
}

function renderTopAdsInner(baseDates, baseLabel, N, marketFilter, periodFilter){
  // Apply period filter — always use last N days from ALL_DATES
  let ds = baseDates;
  let periodLabel = '';
  if(periodFilter === '1d'){
    ds = ALL_DATES.slice(-1); // last available day
    periodLabel = ' · Last Day';
  } else if(periodFilter === '3d'){
    ds = ALL_DATES.slice(-3);
    periodLabel = ' · Last 3 days';
  } else if(periodFilter === '7d'){
    ds = ALL_DATES.slice(-7);
    periodLabel = ' · Last 7 days';
  }

  function aggRecs(recs){
    let spend=0,sv=0,conv=0,atc=0,wR=0,hasAtc=false;
    recs.forEach(r=>{
      if(!r||r.spend<=0) return;
      spend += r.spend;
      conv  += r.conv||0;
      if(typeof r.atc === 'number'){ atc += r.atc; hasAtc=true; }
      const roas = r.roas||0;
      const recordSV = (r.sv && r.sv>0) ? r.sv : (roas>0 ? r.spend*roas : 0);
      sv   += recordSV;
      wR   += roas * r.spend;
    });
    const roas=spend>0?wR/spend:0, cpo=conv>0?spend/conv:0, avgPV=conv>0?sv/conv:0;
    return {spend,sv,conv,atc,hasAtc,roas,cpo,avgPV};
  }

  // Market filter: detect which geo a key belongs to
  function detectMarket(name){
    // Catalogue: starts with EN_ or contains catalogue-related terms
    if(/^EN_/i.test(name) || /catalogue/i.test(name) || /Static-Carousel/i.test(name)) return 'cat';
    // UAE: contains _UAE_ (case insensitive)
    if(/_UAE[_\s]/i.test(name)) return 'uae';
    // KSA: contains _KSA_
    if(/_KSA[_\s]/i.test(name)) return 'ksa';
    // KU: contains _Ku_ or _Ku & or _KU_
    if(/_Ku[_\s&]/i.test(name) || /_KU[_\s]/i.test(name)) return 'ku';
    return 'other';
  }

  // Collect META ads — merge ALL keys that share the same base name
  const metaAds = GRANULAR.meta?.ads || {};
  const metaMerged = {}; // baseName → {recs:[], market:''}

  Object.entries(metaAds).forEach(([name, arr]) => {
    // Strip _marXX date suffixes and version suffixes first
    let baseName = name
      .replace(/_mar\d+(_v[12])?$/i, '')   // _mar13, _mar25, _mar30 etc
      .replace(/_v[12]$/i, '');            // trailing _v1/_v2
    // Strip platform+geo suffix: _Meta_UAE_Sales_ASC, _Meta_Ku & Qa_Sales_ASC etc
    baseName = baseName.replace(/_(Meta|Tiktok|Snapchat|Snap)_.*$/i, '');
    // Also strip trailing geo if no platform prefix: _UAE_Sales_ASC, _KSA_..., _Ku&Qat_...
    baseName = baseName.replace(/_(UAE|KSA|Ku[\s&]|KUW|GCC).*$/i, '').trim();

    // Detect market from ORIGINAL key name (before stripping) for accuracy
    const market = detectMarket(name);

    if(!metaMerged[baseName]){
      metaMerged[baseName] = { recs:[], market, markets: new Set([market]) };
    }
    // Track all markets this creative ran in
    metaMerged[baseName].markets.add(market);
    // If this key has a more specific market than 'other', upgrade primary market
    if(metaMerged[baseName].market === 'other' && market !== 'other'){
      metaMerged[baseName].market = market;
    }
    // Add records matching selected dates
    ds.forEach(d => {
      const r = arr.find(x => x.d === d);
      if(r) metaMerged[baseName].recs.push(r);
    });
  });

  const allAds = [];
  Object.entries(metaMerged).forEach(([displayName, {recs, market, markets}]) => {
    const a = aggRecs(recs);
    if(a.spend <= 0) return;
    // Apply market filter — show if ANY of the creative's markets match
    if(marketFilter !== 'all' && !markets.has(marketFilter)) return;
    allAds.push({ name: displayName, agg: a, market });
  });

  allAds.sort((a,b) => (b.agg.sv||0) - (a.agg.sv||0));
  const topAds = allAds.slice(0, N);

  const tdC = "padding:8px;border-bottom:1px solid #f4f4ef;font-family:monospace;font-size:11px;text-align:center";

  // ── Creative signal: decide row highlight based on ROAS + spend + conv
  const ROAS_GOOD = 3.0;  // target ROAS
  const CPO_GOOD  = 60;   // target CPO ($)

  function adSignal(a){
    if(!a || a.spend <= 0) return 'neutral';
    const noConv    = a.conv === 0 && a.spend > 80;
    const burned    = a.roas < ROAS_GOOD * 0.4 && a.spend > 100;
    const weak      = a.roas < ROAS_GOOD && a.spend > 50;
    const healthy   = a.roas >= ROAS_GOOD && a.roas < ROAS_GOOD * 1.8;
    const scaling   = a.roas >= ROAS_GOOD * 1.8;
    if(noConv || burned) return 'refresh';
    if(weak)             return 'watch';
    if(scaling)          return 'scale';
    if(healthy)          return 'good';
    return 'neutral';
  }

  const SIG = {
    refresh: { bg:'#fff1f2', border:'#f43f5e', tag:'🔄 Refresh Creative', tc:'#be123c', tb:'#ffe4e6' },
    watch:   { bg:'#fffbeb', border:'#f59e0b', tag:'👁 Watch',            tc:'#92400e', tb:'#fef3c7' },
    scale:   { bg:'#f0fdf4', border:'#22c55e', tag:'⚡ Scale Budget',    tc:'#15803d', tb:'#dcfce7' },
    good:    { bg:'#f9fafb', border:'#86efac', tag:'✅ Keep Running',     tc:'#166534', tb:'#f0fdf4' },
    neutral: { bg:'',        border:'transparent', tag:'', tc:'', tb:'' },
  };

  const rows = topAds.length > 0 ? topAds.map(ad => {
    const a = ad.agg, h = a.spend > 0;
    const s = SIG[adSignal(a)];
    const tag = s.tag ? `<span style="font-size:9px;font-weight:700;letter-spacing:.04em;padding:2px 8px;border-radius:20px;background:${s.tb};color:${s.tc};margin-left:7px;vertical-align:middle;white-space:nowrap">${s.tag}</span>` : '';
    const trStyle = `background:${s.bg};border-left:3px solid ${s.border}`;
    const tdFirst = `padding:9px 10px;border-bottom:1px solid #f4f4ef;font-size:11px;color:#333;max-width:260px;word-break:break-word;line-height:1.5;cursor:pointer`;
    return `<tr style="${trStyle}">
      <td style="${tdFirst}" data-adname="${ad.name.replace(/"/g,'&#39;')}" onmouseenter="showAdHoverChartByEl(event,this)" onmouseleave="hideAdHoverChart()">

        .replace(/_En_GLO.*$/i,'')
        .replace(/_(?:jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\d+(?:_v\d+)?$/i,'')
        .replace(/_v\d+$/i,'')
        .replace(/\s*[-–]\s*Copy\s*\d*$/i,'')
        .replace(/_Prospecting Catalogue$/i,'')
        .replace(/_Prospecting$/i,'')
        .replace(/_Catalogue$/i,'')
        .trim().substring(0,50);
      if(!platMerged[baseName]) platMerged[baseName]={recs:[],market:'other'};
      let mkt='other';
      for(const [pat,geo] of geoPatterns){ if(pat.test(name)){ mkt=geo; break; } }
      platMerged[baseName].market = mkt;
      const recs = ds.map(d=>(arr||[]).find(x=>x.d===d)).filter(r=>r&&r.spend>0);
      if(!recs.length) platMerged[baseName].recs.push(...arr.filter(r=>r&&r.spend>0));
      else platMerged[baseName].recs.push(...recs);
    });
    return Object.entries(platMerged)
      .map(([nm,{recs,market}])=>{
        const agg=aggRecs(recs); if(agg.spend<=0) return null;
        if(marketFilter!=='all'&&market!==marketFilter) return null;
        // Fix sv/conv if missing
        if(agg.sv<=0&&agg.roas>0) agg.sv=Math.round(agg.spend*agg.roas*100)/100;
        if(agg.conv===0&&agg.sv>0) agg.conv=Math.max(1,Math.round(agg.sv/170));
        if(agg.cpo<=0&&agg.conv>0) agg.cpo=Math.round(agg.spend/agg.conv*100)/100;
        if(agg.avgPV<=0&&agg.conv>0) agg.avgPV=Math.round(agg.sv/agg.conv*100)/100;
        return {name:nm,agg,market};
      })
      .filter(Boolean)
      .sort((a,b)=>(b.agg.sv||0)-(a.agg.sv||0))

          <td style="${tdC}">${h&&a.sv>0?fSV(a.sv):'—'}</td>
        </tr>`;
      }).join('');
  }

  const ttRows   = buildPlatAdsRows('tiktok', [[/Tiktok_UAE/i,'uae'],[/Tiktok_KSA/i,'ksa'],[/Tiktok_Ku|Tiktok_KW/i,'ku'],[/Tiktok_GCC|Retargeting/i,'cat']]);

let _atcCache = {};
function getAtcForPlatform(pk){
  // Sum ATC from GRANULAR adsets for current selected dates
  const gran = GRANULAR[pk];
  if(!gran) return null;
  const adsets = gran.adsets || {};
  const datesArr = Array.isArray(_atcDates) ? _atcDates : [_atcDates];
  let total = 0, found = false;
  Object.values(adsets).forEach(arr => {
    arr.forEach(r => {

let _spendChartInstance = null;
let _spendChartMetric = 'spend';
let _spendChartDates = null;
function buildSpendChart(){
  return `<div class="cc" style="margin-top:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px">

      </div>
    </div>
    <div class="cw" style="height:220px"><canvas id="spend-by-platform"></canvas></div>
  </div>`;

function renderSpendChart(dates, metric){
  const el = document.getElementById('spend-by-platform');
  if(!el) return;
  if(_spendChartInstance){ _spendChartInstance.destroy(); _spendChartInstance=null; }
  // Remember current metric so the toggle button can re-render
  metric = metric || _spendChartMetric || 'spend';
  _spendChartMetric = metric;
  _spendChartDates = (dates && dates.length>=2) ? dates.slice() : ALL_DATES.slice();
  dates = _spendChartDates;

  // Update the chart label based on metric
  const labelMap = {spend:"DAILY SPEND BY PLATFORM", sv:"DAILY SALES VALUE BY PLATFORM", roas:"DAILY ROAS BY PLATFORM"};
  const labelEl = document.getElementById('spend-chart-label');
  if(labelEl) labelEl.textContent = labelMap[metric] || labelMap.spend;
  // Sync toggle active state
  document.querySelectorAll('#spend-metric-toggle .mt-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.metric === metric);
  });

  const platforms = [
    {key:'meta',   label:'Meta',   color:'#1877F2'},
    {key:'tiktok', label:'TikTok', color:'#EE1D52'},
    {key:'snap',   label:'Snap',   color:'#FFCC00'},
    {key:'google', label:'Google', color:'#34A853'},
  ];

  function extract(r){
    if(!r || !(r.spend>0)) return null;
    if(metric==='sv')   return r.sv != null ? +r.sv.toFixed(2) : null;
    if(metric==='roas') return r.roas != null ? +(r.roas).toFixed(2) : null;
    return Math.round(r.spend); // default: spend
  }

  const datasets = platforms.map(p => {
    const data = dates.map(d => { const r=(D[p.key]||[]).find(x=>x.d===d); return extract(r); });
    const markers = metric==='spend'
      ? dates.map(d => BUDGET_MARKERS.find(m=>m.date===d&&m.platform===p.key)||null)
      : dates.map(()=>null);
    return {
      label: p.label,
      data,
      borderColor: p.color,
      backgroundColor: p.color+'18',
      borderWidth: 2,
      tension: 0.3,
      spanGaps: false,
      fill: false,
      pointRadius: markers.map(m => m ? 8 : 3),
      pointStyle: markers.map(m => m ? 'triangle' : 'circle'),
      rotation: markers.map(m => m ? (m.direction==='up' ? 0 : 180) : 0),
      pointBackgroundColor: markers.map(m => m ? (m.direction==='up' ? '#22c55e' : '#ef4444') : p.color),
      pointBorderColor: markers.map(m => m ? '#fff' : p.color),
      pointBorderWidth: markers.map(m => m ? 2 : 1),
      pointHoverRadius: markers.map(m => m ? 10 : 5),
    };
  });

  // Y-axis formatter
  const yFmt = metric==='roas'
    ? (v => v.toFixed(2)+'x')
    : (v => '$'+Math.round(v).toLocaleString());

  _spendChartInstance = new Chart(el, {
    type:'line',
    data:{labels:dates, datasets},
    options:{
      ...bc,
      plugins:{
        legend:{position:'top', labels:{boxWidth:8,font:{size:10}}},
        tooltip:{
          callbacks:{
            label: ctx => {
              const p = platforms[ctx.datasetIndex];
              const d = dates[ctx.dataIndex];
              const y = ctx.parsed.y;
              let valStr;
              if(metric==='roas')      valStr = y!=null ? y.toFixed(2)+'x' : '—';
              else                     valStr = y!=null ? '$'+y.toLocaleString() : '—';
              let str = p.label+': '+valStr;
              if(metric==='spend'){
                const m = BUDGET_MARKERS.find(x=>x.date===d&&x.platform===p.key);
                if(m) str += '  '+(m.direction==='up' ? '▲ Budget increased' : '▼ Budget decreased');
              }
              return str;
            }
          }
        }
      },
      onHover:(e, elements)=>{
        const chart=_spendChartInstance; if(!chart) return;
        if(elements && elements.length>0){
          const hovered=elements[0].datasetIndex;
          chart.data.datasets.forEach((ds,i)=>{
            ds.borderColor = i===hovered ? platforms[i].color : platforms[i].color+'38';
            ds.borderWidth = i===hovered ? 3 : 1.5;
          });
        } else {
          chart.data.datasets.forEach((ds,i)=>{
            ds.borderColor = platforms[i].color;
            ds.borderWidth = 2;
          });
        }
        chart.update('none');
      },
      scales:ax(yFmt)
    }
  });
}

// Switch the active metric and re-render with the same date window
function _switchSpendMetric(metric){
  if(_spendChartMetric === metric) return;
  _spendChartMetric = metric;
  renderSpendChart(_spendChartDates || ALL_DATES.slice(), metric);
}

// Resolve visible date window
function _btDates(pk){
  const all = ALL_DATES.slice();
  const range = _budgetTrend.range[pk] || 'all';
  const from = _budgetTrend.from[pk], to = _budgetTrend.to[pk];
  if(range === 'custom' && from && to){
    const i = all.indexOf(from), j = all.indexOf(to);
    if(i >= 0 && j >= 0 && i <= j) return all.slice(i, j+1);
    return all;
  }
  if(range === '7')  return all.slice(-7);
  if(range === '14') return all.slice(-14);
  if(range === '30') return all.slice(-30);
  return all;
}

// Get records for a platform/key based on source type
function _btGetRecords(pk, key){
  const gran = GRANULAR[pk]; if(!gran) return [];
  const source = BUDGET_TREND_CONFIG[pk].source;
  if(source === 'adsets')    return (gran.adsets && gran.adsets[key]) || [];
  if(source === 'campaigns') return (gran.campaigns && gran.campaigns[key] && gran.campaigns[key].days) || [];
  return [];
}

      ALL_DATES.forEach(d => {
        const o1 = document.createElement('option'); o1.value = d; o1.textContent = d; fromSel.appendChild(o1);
        const o2 = document.createElement('option'); o2.value = d; o2.textContent = d; toSel.appendChild(o2);
      });
      fromSel.value = ALL_DATES[Math.max(0, ALL_DATES.length - 14)];
      toSel.value   = ALL_DATES[ALL_DATES.length - 1];
    }
    if(range === 'custom' && _budgetTrend.from[pk] && _budgetTrend.to[pk]){
      fromSel.value = _budgetTrend.from[pk];
      toSel.value   = _budgetTrend.to[pk];
    }
  }
  const rangeLbl = document.getElementById(canvasId + '-range-label');
  if(rangeLbl) rangeLbl.textContent = dates.length > 0 ? (dates[0] + ' → ' + dates[dates.length-1] + '  ·  ' + dates.length + ' days') : '';

  // Extract value per metric
  function extract(r){
    if(!r || !(r.spend > 0)) return null;
    if(metric === 'sv')   return r.sv   != null ? +(+r.sv).toFixed(2)   : null;
    if(metric === 'roas') return r.roas != null ? +(+r.roas).toFixed(2) : null;
    return +(+r.spend).toFixed(2);
  }

  const datasets = cfg.series.map(s => {
    const recs = _btGetRecords(pk, s.key);
    const byDate = {};
    recs.forEach(r => { if(r && r.d != null) byDate[r.d] = r; });
    const data = dates.map(d => extract(byDate[d]));
    return {
      label: s.label,
      data,
      borderColor: s.color,
      backgroundColor: s.color + '18',
      borderWidth: 2,
      borderDash: s.dash,
      tension: 0.25,
      spanGaps: false,
      fill: false,
      pointRadius: 2.5,
      pointHoverRadius: 5,
      pointBackgroundColor: s.color,
      pointBorderColor: '#fff',
      pointBorderWidth: 1,
      _baseColor: s.color,
      _baseDash: s.dash,
    };
  });

  // Manual-shift annotation plugin — draws vertical dotted lines + pill labels
  const manualShifts = BUDGET_TREND_MANUAL_SHIFTS[pk] || [];
  // Also surface BUDGET_MARKERS for this platform as small up/down triangles at top
  const autoMarkers = (typeof BUDGET_MARKERS !== 'undefined' ? BUDGET_MARKERS : [])
    .filter(m => m.platform === pk);

  const annotPlugin = {
    id: 'btAnnotations-' + pk,
    afterDatasetsDraw(chart) {
      const { ctx, chartArea: { top, bottom, left, right }, scales: { x } } = chart;
      if(!x) return;
      ctx.save();
      ctx.font = '600 9px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';

      // Auto markers (triangles at very top)
      autoMarkers.forEach(m => {
        const idx = dates.indexOf(m.date);
        if(idx < 0) return;
        const xp = x.getPixelForValue(idx);
        const up = m.direction === 'up';
        ctx.fillStyle = up ? '#22c55e' : '#ef4444';
        ctx.beginPath();
        if(up){
          ctx.moveTo(xp, top - 6);
          ctx.lineTo(xp - 3.5, top - 1);
          ctx.lineTo(xp + 3.5, top - 1);
        } else {
          ctx.moveTo(xp, top - 1);
          ctx.lineTo(xp - 3.5, top - 6);
          ctx.lineTo(xp + 3.5, top - 6);
        }
        ctx.closePath();
        ctx.fill();
      });

      // Manual shifts (dotted line + pill)
      ctx.strokeStyle = '#2563eb';
      ctx.lineWidth = 1;
      manualShifts.forEach(shift => {
        const idx = dates.indexOf(shift.date);
        if(idx < 0) return;
        const xp = x.getPixelForValue(idx);
        ctx.setLineDash([3, 3]);
        ctx.beginPath();
        ctx.moveTo(xp, top);
        ctx.lineTo(xp, bottom);
        ctx.stroke();
        ctx.setLineDash([]);
        const labelText = shift.date + ' ' + shift.label;
        const textWidth = ctx.measureText(labelText).width;
        const padX = 5, padY = 2, pillH = 14;
        const pillW = textWidth + padX * 2;
        let pillX = xp - pillW / 2;
        pillX = Math.max(left, Math.min(pillX, right - pillW));
        const pillY = top + 2;
        ctx.fillStyle = '#dbeafe';
        ctx.beginPath();
        if(ctx.roundRect) ctx.roundRect(pillX, pillY, pillW, pillH, 7);
        else ctx.rect(pillX, pillY, pillW, pillH);
        ctx.fill();
        ctx.fillStyle = '#2563eb';
        ctx.fillText(labelText, pillX + pillW / 2, pillY + padY);
      });
      ctx.restore();
    }
  };

  const yFmt = metric === 'roas'
    ? (v => (+v).toFixed(2) + 'x')
    : (v => '$' + Math.round(v).toLocaleString());

  _budgetTrend.instance[pk] = new Chart(el, {
    type: 'line',
    data: { labels: dates, datasets },
    plugins: [annotPlugin],
    options: {
      ...bc,
      layout: { padding: { top: 22 } },
      plugins: {
        legend: {
          position: 'top',
          align: 'start',
          labels: { boxWidth: 10, boxHeight: 2, padding: 10, font: { size: 10 } }
        },
        tooltip: {
          callbacks: {
            label: ctx => {
              const y = ctx.parsed.y;
              let valStr;
              if(metric === 'roas')  valStr = y != null ? (+y).toFixed(2) + 'x' : '—';
              else                   valStr = y != null ? '$' + (+y).toLocaleString() : '—';
              return ctx.dataset.label + ': ' + valStr;
            }
          }
        }
      },
      interaction: { mode: 'index', intersect: false },
      onHover: (e, elements) => {
        const chart = _budgetTrend.instance[pk]; if(!chart) return;
        if(elements && elements.length > 0){
          const hovered = elements[0].datasetIndex;
          chart.data.datasets.forEach((ds, i) => {
            if(i === hovered){ ds.borderColor = ds._baseColor; ds.borderWidth = 3; }
            else              { ds.borderColor = ds._baseColor + '28'; ds.borderWidth = 1; }
          });
        } else {
          chart.data.datasets.forEach(ds => {
            ds.borderColor = ds._baseColor; ds.borderWidth = 2;
          });
        }
        chart.update('none');
      },
      scales: ax(yFmt)
    }
  });
}

function _switchBudgetTrendMetric(pk, canvasId, metric){
  if(_budgetTrend.metric[pk] === metric) return;
  renderBudgetTrendChart(pk, canvasId, metric, _budgetTrend.range[pk], _budgetTrend.from[pk], _budgetTrend.to[pk]);
}

function _switchBudgetTrendRange(pk, canvasId, range){
  const panel = document.getElementById(canvasId + '-custom-panel');
  if(panel) panel.style.display = (range === 'custom') ? 'flex' : 'none';
  if(range === 'custom'){
    const fromSel = document.getElementById(canvasId + '-from');
    const toSel   = document.getElementById(canvasId + '-to');
    const from = (fromSel && fromSel.value) || ALL_DATES[Math.max(0, ALL_DATES.length - 14)];
    const to   = (toSel   && toSel.value)   || ALL_DATES[ALL_DATES.length - 1];
    renderBudgetTrendChart(pk, canvasId, _budgetTrend.metric[pk], 'custom', from, to);
  } else {
    renderBudgetTrendChart(pk, canvasId, _budgetTrend.metric[pk], range, null, null);
  }
}

function _toggleBudgetTrendCustom(pk, canvasId, ev){
  if(ev) ev.stopPropagation();
  const panel = document.getElementById(canvasId + '-custom-panel');
  if(!panel) return;
  const opening = panel.style.display !== 'flex';
  panel.style.display = opening ? 'flex' : 'none';
  if(opening) _switchBudgetTrendRange(pk, canvasId, 'custom');
}

function _applyBudgetTrendCustom(pk, canvasId){
  const fromSel = document.getElementById(canvasId + '-from');
  const toSel   = document.getElementById(canvasId + '-to');
  if(!fromSel || !toSel) return;
  const iF = ALL_DATES.indexOf(fromSel.value), iT = ALL_DATES.indexOf(toSel.value);
  if(iF < 0 || iT < 0) return;
  if(iF > iT){ const tmp = fromSel.value; fromSel.value = toSel.value; toSel.value = tmp; }
  renderBudgetTrendChart(pk, canvasId, _budgetTrend.metric[pk], 'custom', fromSel.value, toSel.value);
}

// ── BUDGET BY PLATFORM & MARKET TABLE ───────────────────────────────
function buildBudgetByMarket(dateArg){
  // dateArg is either a single date string or an array of dates (MTD)
  const isMTD = Array.isArray(dateArg);
  const dates = isMTD ? dateArg : [dateArg];

  const PLATFORMS = [
    {key:'meta',   label:'Meta',   color:'#1877F2', geos:['uae','ksa','ku','cat']},
    {key:'tiktok', label:'TikTok', color:'#EE1D52', geos:['uae','ksa','ku','cat']},
    {key:'snap',   label:'Snap',   color:'#FFCC00', textColor:'#1a1a1a', geos:['uae','ksa','ku']},
    {key:'google', label:'Google', color:'#34A853', geos:['uae','ksa','ku']},
  ];
  const MARKETS = [
    {key:'uae', label:'UAE'},
    {key:'ksa', label:'KSA'},
    {key:'ku',  label:'KU/QA/BH'},
    {key:'cat', label:'Catalogue'},
  ];

  // Aggregate spend per platform per geo
  const agg = {};
  PLATFORMS.forEach(p => {
    agg[p.key] = {total:0};
    MARKETS.forEach(m => { agg[p.key][m.key] = 0; });
    const rows = D[p.key] || [];
    dates.forEach(d => {
      const r = rows.find(x => x.d === d);
      if (!r || !r.spend) return;
      agg[p.key].total += r.spend;
      MARKETS.forEach(m => {
        const geo = r[m.key];
        if (geo && geo.spend) agg[p.key][m.key] += geo.spend;
      });
    });
  });

  // Grand totals per market
  const mktTotals = {};
  MARKETS.forEach(m => {
    mktTotals[m.key] = PLATFORMS.reduce((s,p) => s + (agg[p.key][m.key]||0), 0);
  });
  const grandTotal = PLATFORMS.reduce((s,p) => s + agg[p.key].total, 0);

  // % share helper
  const pct = (v, tot) => tot > 0 ? (v/tot*100).toFixed(0)+'%' : '—';

  // Market columns — only show those with any spend
  const activeMkts = MARKETS.filter(m => PLATFORMS.some(p => agg[p.key][m.key] > 0));

  const headerCols = activeMkts.map(m => `<th>${m.label}</th>`).join('');
  const platformRows = PLATFORMS.map(p => {
    const platTotal = agg[p.key].total;
    if (platTotal === 0) return '';
    const textCol = p.textColor || '#fff';
    const mktCells = activeMkts.map(m => {
      const v = agg[p.key][m.key];
      return `<td>
        <div style="font-family:'DM Mono',monospace;font-size:12px;font-weight:600">${v>0?'$'+Math.round(v).toLocaleString():'—'}</div>
        ${v>0?`<div style="font-size:10px;color:#aaa;margin-top:1px">${pct(v,mktTotals[m.key])} of mkt</div>`:''}
      </td>`;
    }).join('');
    return `<tr>
      <td>
        <span style="display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:13px">
          <span style="width:8px;height:8px;border-radius:50%;background:${p.color};flex-shrink:0;display:inline-block"></span>
          ${p.label}
        </span>
      </td>
      ${mktCells}
      <td>
        <div style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700">${'$'+Math.round(platTotal).toLocaleString()}</div>
        <div style="font-size:10px;color:#aaa;margin-top:1px">${pct(platTotal,grandTotal)} of total</div>
      </td>
    </tr>`;
  }).join('');

  // Totals row
  const totCells = activeMkts.map(m => {
    const v = mktTotals[m.key];
    return `<td style="border-top:2px solid #f0f0ea;padding-top:10px">
      <div style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700">${v>0?'$'+Math.round(v).toLocaleString():'—'}</div>
      <div style="font-size:10px;color:#aaa;margin-top:1px">${pct(v,grandTotal)} of total</div>
    </td>`;
  }).join('');

  return `<div class="cc" style="margin-top:12px">
    <div class="clbl">SPEND BY PLATFORM &amp; MARKET</div>
    <div style="overflow-x:auto">
      <table class="gtbl" style="min-width:480px">
        <thead>
          <tr>
            <th style="min-width:90px">Platform</th>
            ${headerCols}
            <th>Total</th>
          </tr>
        </thead>
        <tbody>
          ${platformRows}
          <tr>
            <td style="border-top:2px solid #f0f0ea;padding-top:10px">
              <span style="font-weight:700;font-size:12px;color:#888;letter-spacing:.04em">TOTAL</span>
            </td>
            ${totCells}
            <td style="border-top:2px solid #f0f0ea;padding-top:10px">
              <div style="font-family:'DM Mono',monospace;font-size:12px;font-weight:700">${'$'+Math.round(grandTotal).toLocaleString()}</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>`;
}

function renderOverview(d){
  const rws=PL.map(p=>{const r=row(p.key,d);return{...p,r};});

  // Aggregates
  let allSpend=0,allSV=0,allConv=0,wRoas=0;
  rws.forEach(p=>{
    const r=p.r;
    if(r&&r.spend>0){allSpend+=r.spend;allSV+=r.sv||0;allConv+=r.conv||0;wRoas+=r.roas*r.spend;}
  });
  const blendedRoas=allSpend>0?wRoas/allSpend:0;
  const totalCPO=allConv>0?allSpend/allConv:0;

  // sorted helpers
  const sortedBy=(metric)=>[...rws].sort((a,b)=>{
    const av=a.r&&a.r.spend>0?(metric==="roas"?a.r.roas:metric==="spend"?a.r.spend:metric==="sv"?a.r.sv:metric==="cpo"?999999-(a.r.cpo||0):a.r.conv):-Infinity;
    const bv=b.r&&b.r.spend>0?(metric==="roas"?b.r.roas:metric==="spend"?b.r.spend:metric==="sv"?b.r.sv:metric==="cpo"?999999-(b.r.cpo||0):b.r.conv):-Infinity;
    return bv-av;
  });

  const dotRow=(p,valFn)=>{
    const r=p.r,h=r&&r.spend>0;
    return`<div class="orow">
      <span class="orow-lbl"><span style="width:8px;height:8px;border-radius:50%;background:${p.color};display:inline-block;flex-shrink:0"></span>${p.label}</span>
      <span class="orow-val">${h?valFn(r):"—"}</span>
    </div>`;
  };

  // KPI cards: ROAS, SPEND, SALES VALUE, SALES, CPO
  const bySpendD=sortedBy("spend");
  const cards=[
    {lbl:"ROAS",sub:"WEIGHTED AVG.",val:fR(blendedRoas),rows:bySpendD,fn:p=>fR(p.roas)},
    {lbl:"SALES",sub:"TOTAL",val:fC(allConv),rows:bySpendD,fn:p=>fC(p.conv)},
    {lbl:"SPEND",sub:"TOTAL",val:fS(allSpend),rows:bySpendD,fn:p=>fS(p.spend)},
    {lbl:"CPO",sub:"BLENDED",val:fCPO(totalCPO),rows:bySpendD,fn:p=>fCPO(p.cpo)},
    {lbl:"SALES VALUE",sub:"TOTAL",val:fSV(allSV),rows:bySpendD,fn:p=>fSV(p.sv)},
  ];

  const cardHTML=cards.map(c=>`
    <div class="card">
      <div class="klbl" style="margin-bottom:4px">${c.lbl}</div>
      <div class="klbl" style="margin-bottom:10px;font-size:9px;color:#ccc">${c.sub}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0 10px;border-bottom:2px solid #e6e6e0;margin-bottom:4px;">
        
        <span style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700">${c.val}</span>
      </div>
      ${c.rows.map(p=>dotRow(p,r=>c.fn(r))).join("")}
    </div>`).join("");

  // ROAS trend
  const allDates=dates();
  const trendDatasets=PL.map(p=>{
    const arr=D[p.key]||[];
    return{label:p.label,data:allDates.map(dd=>{const r=arr.find(x=>x.d===dd);return r&&r.spend>0?+(r.roas||0).toFixed(2):null;}),
      borderColor:p.color,backgroundColor:p.color+"22",borderWidth:2,
      pointRadius:allDates.map(dd=>dd===d?7:2.5),
      pointBackgroundColor:allDates.map(dd=>dd===d?p.color:"#fff"),
      pointBorderColor:p.color,pointBorderWidth:allDates.map(dd=>dd===d?2.5:1.5),
      tension:0.3,spanGaps:false};
  });

  _atcDates = [d];
  document.getElementById("view").innerHTML=`
    <div class="g6">${cardHTML}</div>
    ${buildSpendChart()}
    ${buildBudgetByMarket(d)}
    ${buildCampaignTable(d, d)}
    ${buildAdsetTable(d, d)}
    ${buildMarketTable(d, d)}
    `;

  requestAnimationFrame(()=>renderSpendChart(allDates));
}

function renderOverviewMTD(){
  const _allDs=dates(), last=_allDs[_allDs.length-1];
  const curMon=last.replace(/ \d+$/,'');  // e.g. "Apr"
  // MTD dates only — filter to current month
  const ds=_allDs.filter(d=>d.startsWith(curMon));

  const agg=(pk)=>{
    const all=D[pk]||[];
    let spend=0,sv=0,conv=0,wR=0;
    all.forEach(r=>{if(r.spend>0 && r.d.startsWith(curMon)){spend+=r.spend;sv+=(r.sv||0);conv+=(r.conv||0);wR+=r.roas*r.spend;}});
    return{spend,sv,conv,roas:spend>0?wR/spend:0,cpo:conv>0?spend/conv:0};
  };

  const rws=PL.map(p=>{const a=agg(p.key);return{...p,a};});
  let totSpend=0,totSV=0,totConv=0,wR=0;
  rws.forEach(p=>{totSpend+=p.a.spend;totSV+=p.a.sv;totConv+=p.a.conv;wR+=p.a.roas*p.a.spend;});
  const blended=totSpend>0?wR/totSpend:0;
  const totCPO=totConv>0?totSpend/totConv:0;

  const sorted=(fn)=>[...rws].sort((a,b)=>fn(b.a)-fn(a.a));
  const dotRow=(p,valFn)=>`<div class="orow">
    <span class="orow-lbl"><span style="width:8px;height:8px;border-radius:50%;background:${p.color};display:inline-block;flex-shrink:0"></span>${p.label}</span>
    <span class="orow-val">${p.a.spend>0?valFn(p.a):"—"}</span>
  </div>`;

  const bySpendM=sorted(a=>a.spend);
  const cards=[
    {lbl:"ROAS",sub:"WEIGHTED AVG.",val:fR(blended),rows:bySpendM,fn:a=>fR(a.roas)},
    {lbl:"SALES",sub:"TOTAL",val:fC(totConv),rows:bySpendM,fn:a=>fC(a.conv)},
    {lbl:"SPEND",sub:"TOTAL",val:fS(totSpend),rows:bySpendM,fn:a=>fS(a.spend)},
    {lbl:"CPO",sub:"BLENDED",val:fCPO(totCPO),rows:bySpendM,fn:a=>fCPO(a.cpo)},
    {lbl:"SALES VALUE",sub:"TOTAL",val:fSV(totSV),rows:bySpendM,fn:a=>fSV(a.sv)},
  ];

  const cardHTML=cards.map(c=>`
    <div class="card">
      <div class="klbl" style="margin-bottom:4px">${c.lbl}</div>
      <div class="klbl" style="margin-bottom:10px;font-size:9px;color:#ccc">${c.sub}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0 10px;border-bottom:2px solid #e6e6e0;margin-bottom:4px;">
        
        <span style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700">${c.val}</span>
      </div>
      ${c.rows.map(p=>dotRow(p,c.fn)).join("")}
    </div>`).join("");

  const trendDS=PL.map(p=>{
    const arr=(D[p.key]||[]).filter(r=>r.d.startsWith(curMon));
    // Cumulative ROAS: sum(sv)/sum(spend) up to each day (MTD only)

  });

  _atcDates = ds;

    ${buildBudgetByMarket(ds)}

}

// ── MTD Market Breakdown table (used in renderPlat single-day view) ──
function buildMTDMarketTable(pk, p) {
  if(pk==='google') return '';
  const all=D[pk]||[];
  const last=ALL_DATES[ALL_DATES.length-1];
  const curMon=last.replace(/ \d+$/,'');
  const mtdDates=ALL_DATES.filter(d=>d.startsWith(curMon));
  const geos=GK[pk], tS='padding:9px 0;border-bottom:1px solid #f4f4ef;font-family:monospace;font-size:12px;font-weight:700;background:#f4f4ef';

  // Aggregate geo totals for MTD
  const gr=geos.map((g,i)=>{
    let sp=0,sv=0,cv=0,wr=0;
    mtdDates.forEach(dt=>{const rr=all.find(x=>x.d===dt);if(rr&&rr.spend>0){const geo=rr[g]||{};sp+=geo.spend||0;sv+=geo.sv||0;cv+=geo.conv||0;wr+=(geo.roas||0)*(geo.spend||0);}});
    return{g,label:GL[g],color:GC[i],spend:sp,sv,conv:cv,roas:sp>0?wr/sp:0,cpo:cv>0?sp/cv:0};
  });

  // Total platform ATC for MTD
  const totAtcMTD=mtdDates.reduce((s,dt)=>{const rr=all.find(x=>x.d===dt);return s+(rr?+(rr.atc||0):0);},0);
  // Use platform-level totals for Total row (geo rows may not capture all spend)
  const _platMTD=mtdDates.reduce((acc,dt)=>{const rr=all.find(x=>x.d===dt);if(rr&&rr.spend>0){acc.sp+=rr.spend;acc.sv+=(rr.sv||0);acc.cv+=(rr.conv||0);acc.wr+=rr.roas*rr.spend;}return acc;},{sp:0,sv:0,cv:0,wr:0});
  const totSpendMTD=gr.reduce((s,g)=>s+g.spend,0);

  const rows=gr.map(g=>{
    const gAtc=totSpendMTD>0?Math.round(totAtcMTD*(g.spend/totSpendMTD)):0;
    return`<tr>
      <td><span class="gn"><span class="gs" style="background:${g.color}"></span>${g.label}</span></td>
      <td>${g.spend>0?fR(g.roas):'—'}</td>
      <td>${g.spend>0?fC(g.conv):'—'}</td>
      <td>${g.spend>0?fS(g.spend):'—'}</td>
      <td>${g.spend>0&&gAtc>0?fC(gAtc):'—'}</td>
      <td>${g.spend>0?fCPO(g.cpo):'—'}</td>
      <td>${g.spend>0?fSV(g.sv):'—'}</td>
    </tr>`;
  }).join('');

  // Meta followers row
  let folRow='';
  if(pk==='meta'){
    const folRecs=(GRANULAR.meta?.adsets?.[META_FOLLOWERS_KEY]||[]).filter(r=>mtdDates.includes(r.d));
    const fSp=folRecs.reduce((s,r)=>s+(r.spend||0),0);
    const fCv=folRecs.reduce((s,r)=>s+(r.purchase_conv||0),0);
    const fSv=folRecs.reduce((s,r)=>s+(r.sv||0),0);
    if(fSp>0) folRow=`<tr><td><span class="gn"><span class="gs" style="background:#94a3b8"></span>Followers / Brand</span></td><td>—</td><td>—</td><td>${fS(fSp)}</td><td>—</td><td>—</td><td>—</td></tr>`;
  }

  // Total row
  const folRecs2=pk==='meta'?(GRANULAR.meta?.adsets?.[META_FOLLOWERS_KEY]||[]).filter(r=>mtdDates.includes(r.d)):[];
  const fSp2=folRecs2.reduce((s,r)=>s+(r.spend||0),0);
  const fCv2=folRecs2.reduce((s,r)=>s+(r.purchase_conv||0),0);
  const fSv2=folRecs2.reduce((s,r)=>s+(r.sv||0),0);
  // Total row: use platform-level totals (matches KPI boxes)
  const tSp=_platMTD.sp+fSp2, tSv=_platMTD.sv+fSv2, tCv=_platMTD.cv+fCv2;
  const tRoas=tSp>0?(_platMTD.wr+fSp2*0)/tSp:0, tRoasW=tSp>0?(_platMTD.wr)/(_platMTD.sp||1):0;
  const tCpo=tCv>0?tSp/tCv:0;
  const totalRow=`<tr style="border-top:2px solid #1a1a1a"><td style="padding:9px 0;background:#f4f4ef;font-size:12px;font-weight:700;color:#1a1a1a">Total</td><td style="${tS}">${tRoasW>0?fR(tRoasW):'—'}</td><td style="${tS}">${tCv>0?fC(tCv):'—'}</td><td style="${tS}">${fS(tSp)}</td><td style="${tS}">${totAtcMTD>0?fC(totAtcMTD):'—'}</td><td style="${tS}">${tCpo>0?fCPO(tCpo):'—'}</td><td style="${tS}">${tSv>0?fSV(tSv):'—'}</td></tr>`;

  return`<div class="cc">
    <div class="clbl">MARKET BREAKDOWN — <strong class="cperiod">MTD ${curMon} 1–${last}</strong></div>
    <table class="gtbl">
      <thead><tr><th>Market</th><th>ROAS</th><th>Sales</th><th>Spend</th><th>ATC</th><th>CPO</th><th>Sales Value</th></tr></thead>
      <tbody>${rows}${folRow}${totalRow}</tbody>
    </table>
  </div>`;
}

          <button data-metric="sales" class="pt-mb" style="padding:4px 10px;font-size:10px;font-weight:600;background:#fff;color:#1a1a1a;border:none;border-left:1px solid #e5e5e0;cursor:pointer;letter-spacing:0.5px">SALES</button>
          <button data-metric="cpo" class="pt-mb" style="padding:4px 10px;font-size:10px;font-weight:600;background:#fff;color:#1a1a1a;border:none;border-left:1px solid #e5e5e0;cursor:pointer;letter-spacing:0.5px">CPO</button>
        </div>`:''}
      </div>
      <div class="cw" style="height:220px"><canvas id="pt"></canvas></div>
    </div>
    ${renderGranular(pk,d)}
    ${pk === 'google' ? buildGoogleBudgetWidget() : ''}`;
  if(pk==='meta') reRenderMetaAds();
  if(pk==='tiktok') reRenderTTAds();
  if(pk==='snap') reRenderSnapAds();

  // Unified trend chart — for non-Google: always ROAS. For Google: metric toggle (ROAS / SV / SALES / CPO).
  const ptMetrics = {
    roas:  { extract:x=>x.spend>0?+(x.roas||0).toFixed(2):null, fmt:v=>(v!=null?v.toFixed(2)+"x":"—"), axisFmt:v=>`${v}x`, title:`ROAS TREND — ${p.label}`, chartType:'line' },
    sv:    { extract:x=>x.spend>0?Math.round(x.sv||0):null,     fmt:v=>(v!=null?"$"+Math.round(v).toLocaleString():"—"), axisFmt:v=>"$"+(v/1000).toFixed(0)+"k", title:`SALES VALUE TREND — ${p.label}`, chartType:'line' },
    sales: { extract:x=>Math.round(x.conv||0),                  fmt:v=>(v!=null?v.toLocaleString():"—"), axisFmt:v=>v, title:`SALES TREND — ${p.label}`, chartType:'bar' },
    cpo:   { extract:x=>x.spend>0?+(x.cpo||0).toFixed(2):null,  fmt:v=>(v!=null?"$"+v.toFixed(2):"—"), axisFmt:v=>"$"+v, title:`CPO TREND — ${p.label}`, chartType:'line' },
  };
  function drawPtChart(metric){
    const m = ptMetrics[metric] || ptMetrics.roas;
    const titleEl = document.getElementById("pt-title");
    if(titleEl) titleEl.textContent = m.title;
    dc("pt");
    if(m.chartType === 'bar'){
      CR["pt"]=new Chart(document.getElementById("pt"),{type:"bar",
        data:{labels:chartAll.map(x=>x.d),datasets:[{data:chartAll.map(m.extract),
          backgroundColor:chartAll.map(x=>x.d===d?p.color:p.color+"40"),borderRadius:5,borderSkipped:false}]},
        options:{...bc,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>m.fmt(c.parsed.y)}}},scales:ax(m.axisFmt)}});
    } else {
      CR["pt"]=new Chart(document.getElementById("pt"),{type:"line",
        data:{labels:chartAll.map(x=>x.d),datasets:[{data:chartAll.map(m.extract),
          borderColor:p.color,backgroundColor:p.color+"14",borderWidth:2.5,
          pointRadius:chartAll.map(x=>x.d===d?7:2.5),
          pointBackgroundColor:chartAll.map(x=>x.d===d?p.color:"#fff"),
          pointBorderColor:p.color,pointBorderWidth:chartAll.map(x=>x.d===d?2.5:1.5),
          tension:0.3,spanGaps:false}]},
        options:{...bc,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>m.fmt(c.parsed.y)}}},scales:ax(m.axisFmt)}});
    }
  }
  drawPtChart('roas');

  // Google: wire up the metric toggle buttons
  if(pk==='google'){
    const tog = document.getElementById('pt-metric-toggle');
    if(tog){
      tog.querySelectorAll('button.pt-mb').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          tog.querySelectorAll('button.pt-mb').forEach(b=>{
            b.classList.remove('active');
            b.style.background='#fff'; b.style.color='#1a1a1a';
          });
          btn.classList.add('active');
          btn.style.background='#1a1a1a'; btn.style.color='#fff';
          drawPtChart(btn.dataset.metric);
        });
      });
    }
  }
}

function tblHdr(cols){ return `<thead><tr>${cols.map(c=>`<th>${c}</th>`).join("")}</tr></thead>`; }
function tblRow(cells){ return `<tr>${cells.map((c,i)=>`<td style="${i===0?"font-size:11px;color:#444;max-width:200px;word-break:break-word":"text-align:right;font-family:'DM Mono',monospace;font-size:12px"}">${c}</td>`).join("")}</tr>`; }
// Standard 5-col table header: Name | ROAS | Spend | Sales Value | Sales | ATC | CPO
const PERF_HDR = ["ROAS","Sales","Spend","ATC","CPO","Sales Value"];
const GOOGLE_HDR = ["ROAS","Spend","Sales Value","Sales","CPO"]; // Google has no ATC
function perfRow(name, r){
  const hasSpend = r && r.spend > 0;
  return tblRow([
    name,
    hasSpend ? fR(r.roas||0)  : "—",
    hasSpend ? fC(r.conv||0)  : "—",
    hasSpend ? fS(r.spend)    : "—",
    (r && r.atc > 0) ? fC(r.atc) : "—",
    hasSpend ? fCPO(r.cpo||0) : "—",
    hasSpend ? fSV(r.sv||0)   : "—",
  ]);
}

// Aggregate an array of day-records into one perf object
function aggRecords(records){
  let spend=0,sv=0,conv=0,atc=0,wR=0;
  records.forEach(r=>{
    if(r&&r.spend>0){
      spend+=r.spend;
      conv+=r.conv||0;
      atc+=r.atc||0;
      const roas=r.roas||0;
      // Use stored sv if available, otherwise derive from spend*roas
      const recordSV = (r.sv && r.sv>0) ? r.sv : (roas>0 ? r.spend*roas : 0);
      sv+=recordSV;
      wR+=roas*r.spend;
    }
  });
  const roas=spend>0?wR/spend:0, cpo=conv>0?spend/conv:0;
  return {spend,sv,conv,atc,roas,cpo};
}

// renderGranular — accepts single date string OR array of date strings
// ── Signal logic (same as TOP PERFORMING ADS)
const AD_ROAS_TARGET = 3.0, AD_CPO_TARGET = 60;
function isAdActive(fullName) {
  // Exact match first
  const status = META_AD_STATUS[fullName];
  if (status) return status !== 'inactive';
  // For EN_ catalogue keys: normalize suffix variants to find META_AD_STATUS match
  if (/^EN_/i.test(fullName)) {
    const normCat = fullName
      .replace(/[_ ]Prospecting[_ ]Catalogue$/i,'')
      .replace(/[_ ]Prospecting$/i,'')
      .replace(/[_ ]Catalogue$/i,'')
      .trim();
    const withSuffix = normCat + '_Catalogue';
    if (META_AD_STATUS[withSuffix] !== undefined) return META_AD_STATUS[withSuffix] !== 'inactive';
    const withSuffix2 = normCat + ' Catalogue';
    if (META_AD_STATUS[withSuffix2] !== undefined) return META_AD_STATUS[withSuffix2] !== 'inactive';
    const candidate = Object.keys(META_AD_STATUS).find(k => k.startsWith(normCat.substring(0,40)));
    if (candidate) return META_AD_STATUS[candidate] !== 'inactive';
    return true; // Default catalogue ads to active if not explicitly marked inactive
  }
  // Geo-aware prefix match: extract ad number AND geo from fullName,
  // then find a META_AD_STATUS key with the same ad number and same geo
  const numMatch = fullName.match(/^(\d+)_/);
  if (numMatch) {
    const num = numMatch[1];
    // Detect geo in fullName
    const n = fullName.toUpperCase();
    let geo = null;
    if (/_UAE/.test(n)) geo = 'UAE';
    else if (/_KSA/.test(n)) geo = 'KSA';
    else if (/KU[_&\s]|KU&QAT|QUAT|KUW|KWT/.test(n)) geo = 'KU';
    else if (/EN_ALL|EN_MEN|EN_WOMEN|CATALOGUE|CATALOG|RETARGET/.test(n)) geo = 'CAT';
    // Find STATUS key with same ad number — if geo known, require same geo
    const candidates = Object.keys(META_AD_STATUS).filter(k => k.startsWith(num + '_'));
    if (candidates.length) {
      if (geo) {
        // Prefer geo-specific match
        const geoKey = candidates.find(k => {
          const ku = k.toUpperCase();
          if (geo === 'UAE') return /_UAE/.test(ku);
          if (geo === 'KSA') return /_KSA/.test(ku);
          if (geo === 'KU')  return /KU[_&\s]|KU&QAT|QUAT|KUW|KWT/.test(ku);
          if (geo === 'CAT') return /EN_ALL|EN_MEN|EN_WOMEN|CATALOGUE|CATALOG/.test(ku);
          return false;
        });
        if (geoKey) return META_AD_STATUS[geoKey] !== 'inactive';
      }
      // No geo detected — fall back to any match (bare key with no geo suffix)
      const bareKey = candidates.find(k => !/_(UAE|KSA|Ku|KUW|KWT|GCC)/i.test(k.replace(num+'_','')));
      if (bareKey) return META_AD_STATUS[bareKey] !== 'inactive';
    }
  }
  // Unknown = inactive (don't show retired ads)
  return false;
}

function adRowSignal(agg){
  if(!agg || agg.spend <= 0) return 'neutral';
  if(agg.conv === 0 && agg.spend > 80)               return 'refresh';
  if(agg.roas < AD_ROAS_TARGET * 0.4 && agg.spend > 80) return 'refresh';
  if(agg.roas < AD_ROAS_TARGET && agg.spend > 50)    return 'watch';
  if(agg.roas >= AD_ROAS_TARGET * 1.8)               return 'scale';
  if(agg.roas >= AD_ROAS_TARGET)                     return 'good';
  return 'neutral';
}

// ── Global signal helpers (used by TikTok & other platform ad tables)
const _ROAS_T = 3.0;
function _adSig(agg){
  if(!agg||agg.spend<=0) return 'neutral';
  if(agg.conv===0&&agg.spend>80)         return 'refresh';
  if(agg.roas<_ROAS_T*0.4&&agg.spend>80) return 'refresh';
  if(agg.roas<_ROAS_T&&agg.spend>50)     return 'watch';
  if(agg.roas>=_ROAS_T*1.8)              return 'scale';
  if(agg.roas>=_ROAS_T)                  return 'good';
  return 'neutral';
}
const _SIG = {
  refresh:{bg:'#fff1f2',border:'#f43f5e',tag:'🔄 Refresh Creative',tc:'#be123c',tb:'#ffe4e6'},
  watch:  {bg:'#fffbeb',border:'#f59e0b',tag:'👁 Watch',           tc:'#92400e',tb:'#fef3c7'},
  scale:  {bg:'#f0fdf4',border:'#22c55e',tag:'⚡ Scale Budget',    tc:'#15803d',tb:'#dcfce7'},
  good:   {bg:'#f9fafb',border:'#86efac',tag:'✅ Keep Running',    tc:'#166534',tb:'#f0fdf4'},
  neutral:{bg:'',border:'transparent',tag:'',tc:'',tb:''},
};
function perfRowSignalOther(name, agg, useSignal=true, platform='', geo=''){
  const h = agg && agg.spend > 0;
  const sig = useSignal ? _SIG[_adSig(agg)] : {bg:'',border:'transparent',tag:'',tc:'',tb:''};
  const tag = sig.tag ? `<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;background:${sig.tb};color:${sig.tc};margin-left:6px;white-space:nowrap">${sig.tag}</span>` : '';
  const safeName = name.replace(/"/g,'&#39;');
  return `<tr style="background:${sig.bg};border-left:3px solid ${sig.border}">
    <td style="font-size:11px;color:#444;max-width:200px;word-break:break-word;padding-left:6px;cursor:pointer" data-adname="${safeName}" data-platform="${platform}" data-geo="${geo}" onmouseenter="showAdHoverChartByEl(event,this)" onmouseleave="hideAdHoverChart()"><span style="border-bottom:1px dashed #ccc">${name}</span>${tag}</td>
    <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px">${h?fR(agg.roas||0):'—'}</td>
    <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px">${h?fC(agg.conv||0):'—'}</td>
    <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px">${h?fS(agg.spend):'—'}</td>
    <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px">${(h&&(agg.atc||0)>0)?fC(agg.atc):'—'}</td>
    <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px">${h?fCPO(agg.cpo||0):'—'}</td>
    <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px">${h?fSV(agg.sv||0):'—'}</td>
  </tr>`;

// ═══════════════════════════════════════════════════════
// GOOGLE BUDGET SHIFT DETECTION
// Detects sustained spend-level changes (≥3 days, ≥15% shift)
// ═══════════════════════════════════════════════════════
function detectGoogleBudgetShifts() {
  const all = D.google || [];
  const active = all.filter(r => r.spend > 0);
  if (active.length < 4) return [];

  const shifts = [];
  for (let i = 3; i < active.length; i++) {
    const prevAvg = (active[i-3].spend + active[i-2].spend + active[i-1].spend) / 3;
    const curSpend = active[i].spend;
    const pct = (curSpend - prevAvg) / prevAvg;

    if (Math.abs(pct) < 0.15) continue;

    let holdDays = 1;
    for (let j = i + 1; j < active.length && j < i + 5; j++) {
      const followPct = (active[j].spend - prevAvg) / prevAvg;
      if (Math.sign(followPct) === Math.sign(pct) && Math.abs(followPct) >= 0.10) holdDays++;
      else break;
    }
    if (holdDays < 3) continue;

    const lastShiftIdx = shifts.length > 0 ? active.findIndex(r => r.d === shifts[shifts.length-1].d) : -99;
    if (i - lastShiftIdx < 3) continue;

    shifts.push({
      d: active[i].d,
      prevAvg: Math.round(prevAvg),
      newSpend: Math.round(curSpend),
      pct: pct,
      holdDays: Math.min(holdDays, active.length - i),
      dir: pct > 0 ? 'up' : 'down'
    });
  }
  return shifts;
}

function buildGoogleBudgetWidget() {
  const all = D.google || [];
  const active = all.filter(r => r.spend > 0);
  if (!active.length) return '';

  const shifts = detectGoogleBudgetShifts();
  const last3 = active.slice(-3);
  const currentLevel = last3.reduce((s,r) => s + r.spend, 0) / last3.length;

  const shiftRows = shifts.length === 0
    ? `<div style="color:#aaa;font-size:12px;padding:8px 0">No significant budget shifts detected across ${active.length} days of data.</div>`
    : [...shifts].reverse().map(s => {
        const arrow = s.dir === 'up' ? '▲' : '▼';
        const color = s.dir === 'up' ? '#16a34a' : '#dc2626';
        const pctStr = (s.pct > 0 ? '+' : '') + (s.pct * 100).toFixed(0) + '%';
        return `<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #f4f4ef">
          <div style="min-width:58px;font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:#1a1a1a">${s.d}</div>
          <div style="min-width:28px;font-size:15px;color:${color};font-weight:700">${arrow}</div>
          <div style="flex:1">
            <div style="font-size:12px;font-weight:600;color:${color}">${pctStr} spend shift</div>
            <div style="font-size:11px;color:#888;margin-top:2px">$${s.prevAvg}/day avg → ~$${s.newSpend}/day · held ${s.holdDays}+ days</div>
          </div>

            <div style="font-size:10px;font-weight:700;letter-spacing:.05em;color:#aaa">EST. MONTHLY</div>
            <div style="font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:#1a1a1a">~$${Math.round(s.newSpend * 30).toLocaleString()}</div>
          </div>
        </div>`;
      }).join('');

  return `<div class="cc" style="margin-top:4px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div class="clbl" style="margin-bottom:0">Budget Shift Detection — Google</div>
      <div style="font-size:11px;color:#888">Current level: <span style="font-family:'DM Mono',monospace;font-weight:600;color:#1a1a1a">~$${Math.round(currentLevel)}/day</span></div>
    </div>
    <div style="font-size:10px;color:#bbb;margin-bottom:10px;letter-spacing:.03em">AUTO-DETECTED · ≥15% sustained shift over ≥3 days</div>
    ${shiftRows}
  </div>`;
}
