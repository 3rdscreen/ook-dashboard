<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>One of a Kin — Ad Report</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:#f4f4ef;color:#1a1a1a;min-height:100vh}

/* ── Header */
.hdr{background:#fff;border-bottom:1px solid #e6e6e0;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr img{height:55px;object-fit:contain}
.badge{background:#1a1a1a;color:#fff;font-size:10px;font-weight:600;letter-spacing:.06em;padding:4px 10px;border-radius:20px}

/* ── Controls */
.ctrl{padding:16px 24px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ctrl select{font-family:inherit;font-size:13px;font-weight:500;background:#fff;border:1px solid #e0e0d8;border-radius:8px;padding:7px 12px;cursor:pointer;color:#1a1a1a;outline:none}
.mtd-btn{font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.04em;padding:7px 16px;border-radius:20px;border:1.5px solid #1a1a1a;background:transparent;cursor:pointer;color:#1a1a1a;transition:all .15s}
.mtd-btn.on{background:#1a1a1a;color:#fff}
.mtd-pill{background:#1a1a1a;color:#fff;font-size:11px;font-weight:600;padding:5px 14px;border-radius:20px;letter-spacing:.04em}

/* ── Tabs */
.tabs{padding:16px 24px 0;display:flex;gap:6px;flex-wrap:wrap}
.tab{font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.05em;padding:6px 16px;border-radius:20px;border:1.5px solid #e0e0d8;background:#fff;cursor:pointer;color:#888;transition:all .15s}
.tab.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

/* ── Layout */
.view{padding:20px 24px 60px}

/* ── Cards */
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.card{background:#fff;border-radius:12px;padding:18px;border:1px solid #ebebeb}
.klbl{font-size:10px;font-weight:700;letter-spacing:.1em;color:#aaa;margin-bottom:12px}
.kval{font-family:'DM Mono',monospace;font-size:24px;font-weight:700;color:#1a1a1a}
.kval.sm{font-size:18px}

/* ── Section card */
.cc{background:#fff;border-radius:12px;padding:18px;margin-bottom:12px;border:1px solid #ebebeb}
.clbl{font-size:11px;font-weight:700;letter-spacing:.07em;color:#aaa;margin-bottom:14px;text-transform:uppercase}

/* ── Geo table */
.gtbl{width:100%;border-collapse:collapse;font-size:13px}
.gtbl th{text-align:left;font-size:10px;font-weight:700;letter-spacing:.06em;color:#aaa;padding:0 0 10px;border-bottom:1px solid #f0f0ea}
.gtbl th:not(:first-child){text-align:right}
.gtbl td{padding:9px 0;border-bottom:1px solid #f8f8f4;vertical-align:middle}
.gtbl td:not(:first-child){text-align:right;font-family:'DM Mono',monospace;font-size:12px}
.gtbl tr:last-child td{border-bottom:none}
.gn{display:flex;align-items:center;gap:7px;font-weight:500;font-size:13px}
.gs{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── Charts grid */
.gg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.cw{position:relative}

/* ── Platform summary cards */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.pcard{background:#fff;border-radius:12px;padding:16px;border:1px solid #ebebeb;cursor:pointer;transition:box-shadow .15s}
.pcard:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.pcard-name{font-size:11px;font-weight:700;letter-spacing:.07em;color:#aaa;margin-bottom:8px}
.pcard-row{display:flex;justify-content:space-between;font-size:12px;color:#888;padding:3px 0}
.pcard-val{font-family:'DM Mono',monospace;font-weight:600;color:#1a1a1a}

/* ── Overview list rows */
.orow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f4f4ef}
.orow:last-child{border-bottom:none}
.orow-lbl{display:flex;align-items:center;gap:6px;font-size:11px;color:#888}
.orow-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:#1a1a1a}

/* ── No data */
.nodata{text-align:center;padding:60px 20px;color:#aaa;font-size:14px}

/* ── Responsive */
@media(max-width:600px){
  .g3,.g5{grid-template-columns:1fr 1fr}
  .gg,.g2{grid-template-columns:1fr}
}

/* ── Calendar Picker */
.cal-wrap{position:relative;display:inline-block}
.cal-btn{font-family:inherit;font-size:13px;font-weight:600;background:#fff;border:1px solid #e0e0d8;border-radius:8px;padding:7px 14px;cursor:pointer;color:#1a1a1a;display:flex;align-items:center;gap:8px;white-space:nowrap;min-width:180px;justify-content:space-between}
.cal-btn:hover{border-color:#1a1a1a}
.cal-btn .cal-icon{opacity:.5;font-size:14px}
.cal-dropdown{position:absolute;top:calc(100% + 6px);left:0;background:#fff;border:1px solid #e0e0d8;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.12);z-index:999;display:none;min-width:520px;overflow:hidden}
.cal-dropdown.open{display:flex}
.cal-presets{width:170px;border-right:1px solid #f0f0ea;padding:8px 0;flex-shrink:0}
.cal-preset{font-family:inherit;font-size:12px;font-weight:500;padding:8px 16px;cursor:pointer;color:#555;background:none;border:none;width:100%;text-align:left;transition:background .1s}
.cal-preset:hover{background:#f8f8f4;color:#1a1a1a}
.cal-preset.active{background:#1a1a1a;color:#fff;font-weight:600}
.cal-right{padding:16px;flex:1}
.cal-months{display:flex;gap:12px}
.cal-month{flex:1}
.cal-month-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month-nav{background:none;border:1px solid #e0e0d8;border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#555;flex-shrink:0}
.cal-month-nav:hover{background:#f0f0ea}
.cal-month-title{font-size:12px;font-weight:700;letter-spacing:.05em;color:#1a1a1a}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-size:9px;font-weight:700;letter-spacing:.06em;color:#aaa;text-align:center;padding:2px 0 6px}
.cal-day{font-size:11px;font-weight:500;text-align:center;padding:5px 2px;border-radius:5px;cursor:pointer;color:#1a1a1a;transition:all .1s;line-height:1}
.cal-day:hover:not(.empty):not(.disabled){background:#f0f0ea}
.cal-day.has-data{font-weight:700}
.cal-day.in-range{background:#dbeafe;border-radius:0;color:#1a1a1a}
.cal-day.range-start{background:#1a1a1a!important;color:#fff!important;border-radius:5px 0 0 5px!important}
.cal-day.range-end{background:#1a1a1a!important;color:#fff!important;border-radius:0 5px 5px 0!important}
.cal-day.range-start.range-end,.cal-day.selected{background:#1a1a1a!important;color:#fff!important;border-radius:5px!important}
.cal-day.has-data:hover:not(.range-start):not(.range-end):not(.selected){background:#f0f0ea;color:#1a1a1a}
.cal-day.today-marker{box-shadow:inset 0 0 0 1.5px #1877F2}
.cal-day.disabled{opacity:.3;cursor:default;pointer-events:none}
.cal-day.empty{cursor:default}
.cal-footer{border-top:1px solid #f0f0ea;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.cal-footer-info{font-size:11px;color:#888}
.cal-apply{font-family:inherit;font-size:12px;font-weight:600;background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:6px 18px;cursor:pointer}
.cal-apply:hover{background:#333}
.cal-apply:disabled{opacity:.4;cursor:default}

/* ── Ad Hover Chart */
#ad-hover-chart{position:fixed;background:#fff;border:1px solid #e0e0d8;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.18);padding:0;z-index:9999;display:none;pointer-events:none;width:340px;overflow:hidden}
#ahc-verdict{font-size:11px;font-weight:700;letter-spacing:.06em;padding:8px 14px;display:flex;align-items:center;gap:7px}
.ahc-keep{background:#f0fdf4;color:#166534}
.ahc-watch{background:#fffbeb;color:#92400e}
.ahc-off{background:#fef2f2;color:#991b1b}
#ad-hover-chart .ahc-title{font-size:10px;font-weight:700;letter-spacing:.04em;color:#555;padding:0 14px 8px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:312px}
#ahc-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid #f4f4ef;border-bottom:1px solid #f4f4ef;margin-bottom:0}
.ahc-kpi{padding:8px 10px;text-align:center;border-right:1px solid #f4f4ef}
.ahc-kpi:last-child{border-right:none}
.ahc-kpi-label{font-size:9px;font-weight:700;letter-spacing:.05em;color:#aaa;display:block;margin-bottom:3px}
.ahc-kpi-val{font-size:13px;font-weight:700;font-family:monospace;color:#1a1a1a;display:block}
.ahc-kpi-val.good{color:#16a34a}
.ahc-kpi-val.warn{color:#d97706}
.ahc-kpi-val.bad{color:#dc2626}
#ad-hover-chart canvas{display:block;padding:10px 14px 4px}
#ahc-insight{font-size:10px;color:#666;padding:6px 14px 10px;line-height:1.5;border-top:1px solid #f8f8f4}
</style>
</head>

function renderCalGrid(){
  const daysInMarch=31;
  const firstDOW=0; // March 1 2026 = Sunday
  const dataSet=new Set(ALL_DATES.map(d=>+d.replace("Mar ","")));

  const dow=["Su","Mo","Tu","We","Th","Fr","Sa"];
  let html=`<div class="cal-month">
    <div class="cal-month-hdr">
      <span style="width:26px"></span>
      <span class="cal-month-title">MARCH 2026</span>
      <span style="width:26px"></span>
    </div>
    <div class="cal-grid" id="cal-grid-inner">`;
  dow.forEach(d=>{ html+=`<div class="cal-dow">${d}</div>`; });
  for(let i=0;i<firstDOW;i++) html+=`<div class="cal-day empty"></div>`;
  for(let n=1;n<=daysInMarch;n++){
    const hasD=dataSet.has(n);
    const evts=hasD?`data-n="${n}"` : "";
    html+=`<div class="cal-day${hasD?" has-data":" disabled"}" ${evts}>${n}</div>`;
  }
  html+=`</div></div>`;
  document.getElementById("cal-months").innerHTML=html;

  // Attach events once via delegation on the grid
  const grid=document.getElementById("cal-grid-inner");
  grid.addEventListener("mouseover", e=>{
    const el=e.target.closest("[data-n]");
    if(!el) return;
    const n=+el.dataset.n;
    if(calPickStart && !calPickEnd){
      calHoverN=n; applyDayClasses();
    }
  });
  grid.addEventListener("mouseleave", ()=>{
    if(calPickStart && !calPickEnd){
      calHoverN=null; applyDayClasses();
    }
  });
  grid.addEventListener("click", e=>{
    const el=e.target.closest("[data-n]");
    if(!el) return;
    const n=+el.dataset.n;
    if(!calPickStart || (calPickStart && calPickEnd)){
      // Start fresh
      calPickStartN=n; calPickEndN=null; calHoverN=null;
      calPickStart="Mar "+n; calPickEnd=null;
    } else {
      // Lock in end
      let s=calPickStartN, en2=n;
      if(en2<s){[s,en2]=[en2,s];}
      calPickStartN=s; calPickEndN=en2;
      calPickStart="Mar "+s; calPickEnd="Mar "+en2;
      calHoverN=null;
    }
    document.querySelectorAll(".cal-preset").forEach(b=>b.classList.remove("active"));
    applyDayClasses();
    updateCalFooter();

let calPickStartN=null, calPickEndN=null, calHoverN=null;

function applyDayClasses(){
  const grid=document.getElementById("cal-grid-inner");
  if(!grid) return;
  const S=calPickStartN, E=calPickEndN, H=calHoverN;

  // Effective range
  let rA=null, rB=null;
  if(S!=null && E!=null){ rA=Math.min(S,E); rB=Math.max(S,E); }
  else if(S!=null && H!=null){ rA=Math.min(S,H); rB=Math.max(S,H); }

  grid.querySelectorAll("[data-n]").forEach(el=>{
    const n=+el.dataset.n;
    // Reset range classes
    el.classList.remove("selected","range-start","range-end","in-range","hover-preview");
    if(rA!==null && rB!==null){
      if(n===rA && n===rB)      el.classList.add("selected");
      else if(n===rA)           el.classList.add("range-start");
      else if(n===rB)           el.classList.add("range-end");
      else if(n>rA && n<rB)    el.classList.add("in-range");
    } else if(S!=null && n===S){
      el.classList.add("selected");
    }
  });
}

function applyPreset(p){
  const ds=ALL_DATES;
  const last=ds[ds.length-1];
  document.querySelectorAll(".cal-preset").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");

  if(p==="mtd"){
    calPickStart="Mar 1"; calPickEnd=last; calPickStartN=1; calPickEndN=+last.replace('Mar ',''); calHoverN=null; renderCalGrid();
    closeCal();
    mtdMode=true; rangeMode=false; sel=last;
    document.getElementById("mtd-pill").style.display="inline-block";
    document.getElementById("mtd-pill").textContent=`MTD Mar 1 – ${last}`;
    document.getElementById("cal-label").textContent=`Mar 1 – ${last}`;
    render(); return;
  }

  function applyRange(start, end, presetName){
    calPickStart=start; calPickEnd=end;
    calPickStartN=+start.replace('Mar ',''); calPickEndN=+end.replace('Mar ','');
    calHoverN=null;
    renderCalGrid();
    // Auto-apply and show label immediately
    selStart=start; selEnd=end;
    rangeMode=true; mtdMode=false;
    const labelText = `${presetName}: ${start} – ${end}`;
    document.getElementById("mtd-pill").style.display="inline-block";
    document.getElementById("mtd-pill").textContent=`${start} – ${end}`;
    document.getElementById("cal-label").textContent=labelText;
    closeCal();
    renderRangeView();
  }

  if(p==="last7"){   applyRange(ds[Math.max(0,ds.length-7)], last, "Last 7 days");   return; }
  if(p==="last14"){  applyRange(ds[Math.max(0,ds.length-14)], last, "Last 14 days");  return; }
  if(p==="last30"){  applyRange(ds[0], last, "Last 30 days");  return; }
  if(p==="thisweek"){
    // This week: Monday of current week → last available date
    const today=new Date(); const dow=today.getDay(); const diffToMon=dow===0?6:dow-1;
    const monDate=new Date(today); monDate.setDate(today.getDate()-diffToMon);
    const monDay=monDate.getDate();
    // Find closest available date >= Monday in ds
    const twStart = ds.find(d=>+d.replace('Mar ','')>=monDay) || ds[ds.length-7];
    applyRange(twStart, last, "This week"); return;
  }
  if(p==="lastweek"){
    // Last week: Monday–Sunday of previous week
    const today=new Date(); const dow=today.getDay(); const diffToMon=dow===0?6:dow-1;
    const lastSun=new Date(today); lastSun.setDate(today.getDate()-diffToMon-1);
    const lastMon=new Date(lastSun); lastMon.setDate(lastSun.getDate()-6);
    const lwStartN=lastMon.getDate(), lwEndN=lastSun.getDate();
    const lwStart=ds.find(d=>+d.replace('Mar ','')>=lwStartN) || ds[0];
    const lwEnd=[...ds].reverse().find(d=>+d.replace('Mar ','')<=lwEndN) || last;
    applyRange(lwStart, lwEnd, "Last week"); return;
  }

}

function buildGoogleCampsHTML(camps, ds){
  // Map each campaign to its geo
  let rows;

  if (ds && ds.length) {
    // Sum D.google daily entries for the selected dates
    const geoTotals = {uae:{spend:0,sv:0,conv:0},ksa:{spend:0,sv:0,conv:0},ku:{spend:0,sv:0,conv:0}};
    ds.forEach(d => {
      const r = (D.google||[]).find(x=>x.d===d);
      if(!r) return;
      ['uae','ksa','ku'].forEach(g => {
        const gd = r[g]||{};
        if(gd.spend>0){
          geoTotals[g].spend += gd.spend||0;
          geoTotals[g].sv    += gd.sv||0;
          geoTotals[g].conv  += gd.conv||0;
        }
      });
    });

    // For each campaign, take its proportion of the geo total (based on MTD spend ratio)
    rows = camps.map(c => {
      const geo = c.geo;
      if(!geo) return null;
      // MTD proportion of this campaign within its geo
      const geoMTD = camps.filter(x=>x.geo===geo).reduce((s,x)=>s+x.spend,0);
      const prop   = geoMTD>0 ? c.spend/geoMTD : 0;
      const sp   = Math.round(geoTotals[geo].spend * prop * 100)/100;
      const sv   = Math.round(geoTotals[geo].sv    * prop * 100)/100;
      const conv = Math.round(geoTotals[geo].conv  * prop);
      const roas = sp>0 ? Math.round(sv/sp*100)/100 : 0;
      const cpo  = conv>0 ? Math.round(sp/conv*100)/100 : 0;
      return {name:c.name, spend:sp, sv, conv, roas, cpo};
    }).filter(c=>c&&c.spend>0);
  } else {
    // MTD: use stored campaign totals directly
    rows = camps.map(c => ({name:c.name,spend:c.spend,sv:c.sv||0,conv:c.conv||0,roas:c.roas||0,cpo:c.cpo||0}));
  }

  if(!rows||!rows.length) return '<tr><td colspan="6" style="text-align:center;padding:14px;color:#aaa;font-size:12px">No data for this period</td></tr>';

  return rows.sort((a,b)=>b.spend-a.spend).map(c => {
    const sig = _SIG[_adSig({spend:c.spend,sv:c.sv,conv:c.conv,roas:c.roas,cpo:c.cpo})];
    const tag = sig.tag ? `<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;background:${sig.tb};color:${sig.tc};margin-left:6px;white-space:nowrap">${sig.tag}</span>` : '';
    return `<tr style="background:${sig.bg};border-left:3px solid ${sig.border}">
      <td style="font-size:11px;color:#444;max-width:220px;word-break:break-word;padding-left:6px;cursor:pointer" data-adname="${c.name.replace(/"/g,'&#39;')}" onmouseenter="showAdHoverChartByEl(event,this)" onmouseleave="hideAdHoverChart()"><span style="border-bottom:1px dashed #ccc">${c.name}</span>${tag}</td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;padding:8px">${fR(c.roas)}</td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;padding:8px">${fS(c.spend)}</td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;padding:8px">${c.sv>0?fSV(c.sv):'—'}</td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;padding:8px">${c.conv>0?fC(c.conv):'—'}</td>
      <td style="text-align:right;font-family:'DM Mono',monospace;font-size:12px;padding:8px">${c.cpo>0?fCPO(c.cpo):'—'}</td>
    </tr>`;
  }).join('');
}

function buildSnapAdsHTML(ads, adNames, ds, label){
  const SNAP_GEO = [
    { label:'UAE',               pattern:/Snap_UAE|Snapchat_UAE/i },
    { label:'KSA',               pattern:/Snap_KSA|Snapchat_KSA/i },
    { label:'KU / QA / BH',     pattern:/Snap_KU|Snap_KW/i },
    { label:'GCC / Retargeting', pattern:/Snap_GCC|GCC_Ret/i },
  ];
  const SNAP_GEO_KEY = {'UAE':'uae','KSA':'ksa','KU / QA / BH':'ku','GCC / Retargeting':'cat'};
  function detectSnapGeo(n){ for(const g of SNAP_GEO){ if(g.pattern.test(n)) return g.label; } return null; }

  // Compute period geo spend from D.snap daily data for scaling
  // All-time geo totals (from full daily array) used as baseline
  const allDays = D.snap || [];
  const geoAllTime = {uae:{spend:0,sv:0,conv:0}, ksa:{spend:0,sv:0,conv:0}, ku:{spend:0,sv:0,conv:0}};
  const geoPeriod  = {uae:{spend:0,sv:0,conv:0}, ksa:{spend:0,sv:0,conv:0}, ku:{spend:0,sv:0,conv:0}};
  allDays.forEach(r => {
    ['uae','ksa','ku'].forEach(gk => {
      const g = r[gk]||{};
      if(!g.spend) return;
      geoAllTime[gk].spend += g.spend||0;
      geoAllTime[gk].sv    += g.sv||0;
      geoAllTime[gk].conv  += g.conv||0;
      if(ds.includes(r.d)){
        geoPeriod[gk].spend += g.spend||0;
        geoPeriod[gk].sv    += g.sv||0;
        geoPeriod[gk].conv  += g.conv||0;
      }
    });
  });
  // Scale ratios per geo
  const scaleRatio = {};
  ['uae','ksa','ku'].forEach(gk => {
    scaleRatio[gk] = geoAllTime[gk].spend > 0 ? geoPeriod[gk].spend / geoAllTime[gk].spend : 1;
  });

  const merged = {};
  SNAP_GEO.forEach(g => merged[g.label] = {});

  adNames.forEach(name => {
    // Always use MTD snapshot as base, then scale by period ratio
    const mtdRecs = (ads[name]||[]).filter(r=>r&&r.spend>0);
    if(!mtdRecs.length) return;
    const mtdAgg = aggRecords(mtdRecs);
    if(!mtdAgg.spend) return;

    const geoLabel = detectSnapGeo(name);
    if (!geoLabel) return;
    const gk = SNAP_GEO_KEY[geoLabel] || 'uae';
    const ratio = scaleRatio[gk] !== undefined ? scaleRatio[gk] : 1;

    // Scale MTD values by period ratio
    const agg = {
      spend: Math.round(mtdAgg.spend * ratio * 100) / 100,
      sv:    Math.round((mtdAgg.sv||0) * ratio * 100) / 100,
      conv:  Math.round((mtdAgg.conv||0) * ratio),
      atc:   Math.round((mtdAgg.atc||0) * ratio),
      roas:  mtdAgg.roas || 0,
    };
    if(!agg.spend) return;

    // Derive conv from sv if still 0
    if (agg.sv > 0 && agg.conv === 0) {
      agg.conv = Math.max(1, Math.round(agg.sv / 170));
    }
    agg.cpo = agg.conv > 0 ? Math.round(agg.spend / agg.conv * 100) / 100 : 0;

    const geo = geoLabel;
    const dn = name
      .replace(/_En_GLO.*$/i,'')
      .replace(/_mar\d+(_v\d+)?$/i,'')
      .replace(/_v\d+$/i,'')
      .replace(/\s*[-–]\s*Copy\s*\d*$/i,'')
      .trim().substring(0,45);
    if (!merged[geo][dn]) merged[geo][dn]={spend:0,sv:0,conv:0,atc:0,wR:0};
    const m=merged[geo][dn];
    m.spend+=agg.spend||0; m.sv+=agg.sv||0; m.conv+=agg.conv||0;
    m.atc+=agg.atc||0; m.wR+=(agg.roas||0)*(agg.spend||0);
  });

  let html='';
  SNAP_GEO.forEach(g => {
    const rows = Object.entries(merged[g.label]).map(([dn,m])=>{
      const roas=m.spend>0?Math.round(m.sv/m.spend*100)/100:0;
      // Derive conv from sv if missing
      const conv = m.conv > 0 ? m.conv : (m.sv>0 ? Math.max(1,Math.round(m.sv/170)) : 0);
      const cpo=conv>0?Math.round(m.spend/conv*100)/100:0;
      return {displayName:dn, agg:{spend:m.spend,sv:m.sv,conv:conv,atc:m.atc,roas,cpo}};
    }).sort((a,b)=>b.agg.spend-a.agg.spend);
    if (!rows.length) return;
    html+=`<div style="margin-bottom:14px">
      <div style="font-size:10px;font-weight:700;letter-spacing:.06em;color:#888;margin-bottom:8px;padding:4px 8px;background:#f8f8f4;border-radius:6px">${g.label}</div>
      <table class="gtbl"><thead><tr><th>Ad</th>${PERF_HDR.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r=>perfRowSignalOther(r.displayName,r.agg,true,'snap')).join('')}</tbody></table>
    </div>`;
  });
  return html;
}

  // Determine which dates to use
  const allDs = dates();
  let adsDates;
  if(metaAdsPeriod==='7d')      adsDates = allDs.slice(-7);
  else if(metaAdsPeriod==='3d') adsDates = allDs.slice(-3);
  else {
    // Use current view dates
    if(mtdMode)        adsDates = allDs;
    else if(rangeMode) adsDates = (selStart&&selEnd) ? ALL_DATES.slice(dateIndex(selStart),dateIndex(selEnd)+1) : [allDs[allDs.length-1]];
    else               adsDates = [sel];
  }
  // Rebuild ads inner HTML
  const gran = GRANULAR.meta; if(!gran) return;
  const ads = gran.ads || {};
  const GEO_GROUPS2 = [
    { label:'UAE',          pattern:/_UAE_/i },
    { label:'KSA',          pattern:/_KSA_/i },
    { label:'KU / QA / BH',pattern:/_Ku[_&\s]|Ku\s*&\s*Qa|Ku\s*&\s*Q/i },
    { label:'Catalogue',    pattern:/^EN_|^en_/ },
  ];
  function detectGeo2(n, adset){ for(const g of GEO_GROUPS2){ if(g.pattern.test(n)) return g.label; } if(adset){ for(const g of GEO_GROUPS2){ if(g.pattern.test(adset)) return g.label; } } return null; }
  const adsByGeo2 = {}; GEO_GROUPS2.forEach(g=>adsByGeo2[g.label]=[]);
  // Group by stripped display name within each geo to merge duplicates
  const adsByGeoMerged = {};
  GEO_GROUPS2.forEach(g=>adsByGeoMerged[g.label]={});

  Object.keys(ads).forEach(name=>{
    const recs=adsDates.map(d=>(ads[name]||[]).find(x=>x.d===d)).filter(Boolean);
    const agg=aggRecords(recs); if(!agg.spend) return;
    const geo=detectGeo2(name); if(!geo) return;
    // Strip ALL date/version suffixes before grouping
    const dn=name
      .replace(/_mar\d+(_v\d+)?$/i,'')
      .replace(/_v\d+$/i,'')
      .replace(/\s*[-–]\s*Copy\s*\d*$/i,'')
      .trim()
      .substring(0,45);
    if(!adsByGeoMerged[geo][dn]){
      adsByGeoMerged[geo][dn]={spend:0,sv:0,conv:0,atc:0,wR:0};
    }
    const m=adsByGeoMerged[geo][dn];
    m.spend+=agg.spend||0;
    m.sv+=agg.sv||0;
    m.conv+=agg.conv||0;
    m.atc+=agg.atc||0;
    m.wR+=(agg.roas||0)*(agg.spend||0);
  });

  // Convert merged map to adsByGeo2 array format
  GEO_GROUPS2.forEach(g=>{
    adsByGeo2[g.label]=Object.entries(adsByGeoMerged[g.label]).map(([dn,m])=>{
      const roas=m.spend>0?Math.round(m.sv/m.spend*100)/100:0;
      const cpo=m.conv>0?Math.round(m.spend/m.conv*100)/100:0;
      return {displayName:dn, agg:{spend:m.spend,sv:m.sv,conv:m.conv,atc:m.atc,roas,cpo}};
    });
  });
  let adsHTML2='';
  GEO_GROUPS2.forEach(g=>{
    const rows=adsByGeo2[g.label].sort((a,b)=>b.agg.spend-a.agg.spend);
    if(!rows.length) return;
    adsHTML2+=`<div style="margin-bottom:14px">
      <div style="font-size:10px;font-weight:700;letter-spacing:.06em;color:#888;margin-bottom:8px;padding:4px 8px;background:#f8f8f4;border-radius:6px">${g.label}</div>
      <table class="gtbl"><thead><tr><th>Ad</th>${PERF_HDR.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r=>perfRowSignal(r.displayName,r.agg)).join('')}</tbody></table>
    </div>`;
  });
  // Update inner content
  document.getElementById('meta-ads-inner').innerHTML = adsHTML2 || '<p style="color:#aaa;font-size:12px">No ads data</p>';
  // Update button styles
  ['7d','3d'].forEach(p=>{
    const btn=document.getElementById('meta-ads-btn-'+p);
    if(!btn) return;
    const active=metaAdsPeriod===p;
    btn.style.background=active?'#1a1a1a':'#fff';
    btn.style.color=active?'#fff':'#444';
    btn.style.borderColor=active?'#1a1a1a':'#d0d0c8';
  });
  // Update label
  const lbl = card.querySelector('.clbl');
  if(lbl){
    const periodTxt = metaAdsPeriod==='7d' ? 'Last 7 Days' : metaAdsPeriod==='3d' ? 'Last 3 Days' : null;
    const baseLabel = adsDates.length===1 ? adsDates[0] : `${adsDates[0]} – ${adsDates[adsDates.length-1]}`;
    lbl.textContent = 'Ads — ' + (periodTxt || baseLabel);
  }
}

    return{...p,a:{spend,sv,conv,roas:spend>0?wR/spend:0,cpo:conv>0?spend/conv:0}};
  });
  let totSpend=0,totSV=0,totConv=0,wR=0;
  rws.forEach(p=>{totSpend+=p.a.spend;totSV+=p.a.sv;totConv+=p.a.conv;wR+=p.a.roas*p.a.spend;});
  const blended=totSpend>0?wR/totSpend:0;
  const totCPO=totConv>0?totSpend/totConv:0;
  const sorted=(fn)=>[...rws].sort((a,b)=>fn(b.a)-fn(a.a));
  const dotRow=(p,valFn)=>`<div class="orow"><span class="orow-lbl"><span style="width:8px;height:8px;border-radius:50%;background:${p.color};display:inline-block;flex-shrink:0"></span>${p.label}</span><span class="orow-val">${p.a.spend>0?valFn(p.a):"—"}</span></div>`;

  const allDatesAll=(D[PL[0].key]||[]).map(x=>x.d);

        borderColor:p.color+"44",backgroundColor:"transparent",borderWidth:1.5,
        pointRadius:allDatesAll.map(d=>rdSetOv.has(d)?0:2),pointBackgroundColor:"#ccc",
        tension:0.3,spanGaps:false},
      // Highlighted range
      {label:p.label,data:allDatesAll.map(d=>{if(!rdSetOv.has(d))return null;const r=arr.find(x=>x.d===d);return r&&r.spend>0?+(r.roas||0).toFixed(2):null;}),
        borderColor:p.color,backgroundColor:p.color+"22",borderWidth:2.5,
        pointRadius:4,pointBackgroundColor:p.color,tension:0.3,spanGaps:false}
    ];
  }).flat();
  _atcDates = rd;
  document.getElementById("view").innerHTML=`<div class="g5">${cardHTML}</div>${buildSpendChart()}${buildCampaignTable(rd, selStart+" – "+selEnd)}${buildMarketTable(rd, selStart+" – "+selEnd)}${buildTopAdsTable(rd, selStart+" – "+selEnd, 10)}<div class="cc"><div class="clbl">ROAS TREND — ALL PLATFORMS (${selStart} – ${selEnd} highlighted)</div><div class="cw" style="height:200px"><canvas id="rng-trend"></canvas></div></div>`;
  dc("rng-trend");CR["rng-trend"]=new Chart(document.getElementById("rng-trend"),{type:"line",data:{labels:allDatesAll,datasets:trendDS},options:{...bc,plugins:{legend:{position:"top",labels:{boxWidth:8,font:{size:10}}}},scales:ax(v=>`${v}x`)}});

// ── Platform Performance Table helper
function buildPlatformTable(rws, label){
  // rws: array of {key, label, color, r (day data) OR a (agg data)}
  const tdS = "text-align:center;padding:8px;border-bottom:1px solid #f4f4ef;font-family:monospace;font-size:12px";

  // Collect per-platform data for totals
  const platData = rws.map(p => {
    const d = p.r || p.a;
    const h = d && d.spend > 0;
    return { p, d, h, atcVal: getAtcForPlatform(p.key) };
  });

  const rows = platData.map(({p, d, h, atcVal}) => {
    const avgPV = (h && d.conv > 0) ? fSV((d.sv||0) / d.conv) : "—";
    return `<tr>
      <td style="font-size:12px;font-weight:600;color:#1a1a1a;padding:8px 12px;border-bottom:1px solid #f4f4ef"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${p.color};margin-right:7px;vertical-align:middle;flex-shrink:0"></span>${p.label}</td>
      <td style="${tdS}">${h ? fC(d.conv) : "—"}</td>
      <td style="${tdS}">${h ? fR(d.roas) : "—"}</td>
      <td style="${tdS}">${h ? fS(d.spend) : "—"}</td>
      <td style="${tdS}">${atcVal !== null ? fC(atcVal) : "—"}</td>
      <td style="${tdS}">${h ? fCPO(d.cpo) : "—"}</td>
      <td style="${tdS}">${avgPV}</td>
      <td style="${tdS}">${h ? fSV(d.sv||0) : "—"}</td>
    </tr>`;
  }).join("");

  // ── TOTALS row
  let totSpend=0, totSV=0, totConv=0, totAtc=0, wR=0, hasAtc=false;
  platData.forEach(({d,h,atcVal}) => {
    if(!h) return;
    totSpend += d.spend||0;
    totSV    += d.sv||0;
    totConv  += d.conv||0;
    wR       += (d.roas||0)*(d.spend||0);
    if(atcVal !== null){ totAtc += atcVal; hasAtc = true; }
  });
  const totRoas  = totSpend > 0 ? wR / totSpend : 0;           // weighted avg
  const totCPO   = totConv  > 0 ? totSpend / totConv : 0;      // blended CPO
  const totAvgPV = totConv  > 0 ? totSV / totConv : 0;         // avg purchase value
  const totTdS   = "text-align:center;padding:9px 8px;font-family:monospace;font-size:12px;font-weight:700;background:#f4f4ef";
  const totRow   = `<tr style="border-top:2px solid #1a1a1a">
    <td style="font-size:12px;font-weight:700;color:#1a1a1a;padding:9px 12px;background:#f4f4ef">Total</td>
    <td style="${totTdS}">${totConv > 0 ? fC(totConv) : "—"}</td>
    <td style="${totTdS}">${totRoas > 0 ? fR(totRoas) : "—"}</td>
    <td style="${totTdS}">${totSpend > 0 ? fS(totSpend) : "—"}</td>
    <td style="${totTdS}">${hasAtc ? fC(totAtc) : "—"}</td>
    <td style="${totTdS}">${totCPO > 0 ? fCPO(totCPO) : "—"}</td>
    <td style="${totTdS}">${totAvgPV > 0 ? fSV(totAvgPV) : "—"}</td>
    <td style="${totTdS}">${totSV > 0 ? fSV(totSV) : "—"}</td>
  </tr>`;

  const cols = ["Platform","Purchases","ROAS","Spent","ATC","CPO","Avg Purchase Value","Conversion Value"];
  const hdr = `<tr style="background:#f8f8f4">${cols.map((c,i)=>
    `<th style="padding:8px ${i===0?12:8}px;text-align:${i===0?"left":"center"};font-size:10px;font-weight:700;letter-spacing:.06em;color:#888;border-bottom:2px solid #ebebeb;white-space:nowrap">${c}</th>`
  ).join("")}</tr>`;
  return `<div class="cc" style="margin-bottom:16px">
    <div class="clbl">OVERALL PERFORMANCE BY PLATFORM — ${label}</div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-family:'DM Mono',monospace;font-size:12px">
      <thead>${hdr}</thead>
      <tbody style="color:#1a1a1a">${rows}${totRow}</tbody>
    </table>
    </div>
  </div>`;
}

// ── Campaign Performance Table
function buildCampaignTable(datesArr, label){
  const ds = Array.isArray(datesArr) ? datesArr : [datesArr];

  function aggRecs(recs){
    let spend=0,sv=0,conv=0,atc=0,wR=0,hasAtc=false;
    recs.forEach(r=>{
      if(!r||r.spend<=0) return;
      spend+=r.spend; sv+=r.sv||0; conv+=r.conv||0; wR+=(r.roas||0)*r.spend;
      if(r.atc!=null){atc+=r.atc; hasAtc=true;}
    });
    const roas=spend>0?wR/spend:0, cpo=conv>0?spend/conv:0, avgPV=conv>0?sv/conv:0;
    return {spend,sv,conv,atc,hasAtc,roas,cpo,avgPV};
  }

  const tdC = "padding:7px 8px;border-bottom:1px solid #f4f4ef;font-family:monospace;font-size:11px;text-align:center";
  const tdL = "padding:7px 8px 7px 14px;border-bottom:1px solid #f4f4ef;font-size:11px;color:#444;max-width:220px;word-break:break-word";

  function dataCell(h, val){ return `<td style="${tdC}">${h ? val : "—"}</td>`; }

  const gran = GRANULAR;

  // Build groups: [{platLabel, platColor, campaigns:[{name, agg}]}]
  const metaColor  = PL.find(p=>p.key==='meta')?.color    || '#1877F2';
  const ttColor    = PL.find(p=>p.key==='tiktok')?.color  || '#010101';
  const snapColor  = PL.find(p=>p.key==='snap')?.color    || '#FFFC00';
  const gColor     = PL.find(p=>p.key==='google')?.color  || '#4285F4';

  // ── META
  const metaAdsets = [
    { name:'UAE Sales - ASC',             key:'UAE Ongoing - ASC - En' },
    { name:'KSA Sales - ASC',             key:'KSA Ongoing - ASC - En' },
    { name:'KUW-QAT-BH Sales - ASC',      key:'Ku - Qa - BH Ongoing - ASC - En' },
    { name:'Catalogue Sales - GCC',       key:'Catalogue Retargeting / Prospecting - GCC' },
    { name:'Followers - GCC Brand',       key:META_FOLLOWERS_KEY },
  ];
  const metaCamps = metaAdsets.map(({name, key}) => {
    const recs = ds.map(d=>(gran.meta?.adsets?.[key]||[]).find(r=>r.d===d)).filter(Boolean);
    const a = aggRecs(recs);
    // Followers has no ROAS — override
    if(key === META_FOLLOWERS_KEY){
      return { name, agg:{ spend:a.spend, sv:0, conv:0, atc:0, hasAtc:false, roas:0, cpo:0, avgPV:0 }};
    }
    return { name, agg: a };
  }).filter(c => c.agg.spend > 0);

  // ── TIKTOK
  const ttData = D.tiktok || [];
  const ttRet = aggRecs(ds.map(d=>{
    const r=ttData.find(x=>x.d===d);
    if(!r||!r.cat||!r.cat.spend) return null;
    return {spend:r.cat.spend||0, sv:r.cat.sv||0, conv:r.cat.conv||0, roas:r.cat.roas||0, atc:null};
  }).filter(Boolean));
  const ttPros = aggRecs(ds.map(d=>{
    const r=ttData.find(x=>x.d===d);
    if(!r) return null;
    const s=(r.uae?.spend||0)+(r.ksa?.spend||0)+(r.ku?.spend||0);
    const sv=(r.uae?.sv||0)+(r.ksa?.sv||0)+(r.ku?.sv||0);
    const cv=(r.uae?.conv||0)+(r.ksa?.conv||0)+(r.ku?.conv||0);
    const wR=(r.uae?.roas||0)*(r.uae?.spend||0)+(r.ksa?.roas||0)*(r.ksa?.spend||0)+(r.ku?.roas||0)*(r.ku?.spend||0);
    return {spend:s, sv, conv:cv, roas:s>0?wR/s:0, atc:null};
  }).filter(Boolean));
  const ttCamps = [
    {name:'GCC - Sales (Retargeting)',  agg:ttRet},
    {name:'GCC - Sales (Prospecting)', agg:ttPros},
  ].filter(c=>c.agg.spend>0);

  // ── SNAPCHAT
  const snapData = D.snap || [];
  const snapAgg = aggRecs(ds.map(d=>snapData.find(x=>x.d===d)).filter(r=>r&&r.spend>0));
  const snapCamps = snapAgg.spend > 0
    ? [{name:'GCC - Sales (Retargeting + ASC)', agg:snapAgg}]
    : [];

  // ── GOOGLE — scale MTD campaign totals by selected date ratio
  const gAllData = D.google || [];
  const totGSpend = gAllData.reduce((s,r)=>s+(r.spend||0),0);
  const selGSpend = ds.reduce((s,d)=>{const r=gAllData.find(x=>x.d===d);return s+(r?.spend||0);},0);
  const gRatio = totGSpend > 0 ? selGSpend / totGSpend : 1;
  const gCamps = (gran.google?.campaigns||[]).map(c => ({
    name: c.name,
    agg: {
      spend:   c.spend   * gRatio,
      sv:      c.sv      * gRatio,
      conv:    Math.round(c.conv * gRatio),
      roas:    c.roas,
      cpo:     (Math.round(c.conv*gRatio)>0) ? (c.spend*gRatio)/Math.round(c.conv*gRatio) : 0,
      avgPV:   (Math.round(c.conv*gRatio)>0) ? (c.sv*gRatio)/Math.round(c.conv*gRatio) : 0,
      atc: null, hasAtc: false,
    }
  })).filter(c=>c.agg.spend>0);

  // ── Build HTML — group per platform with colored left border + header row
  const groups = [
    { label:'META',     color:metaColor,  camps:metaCamps  },
    { label:'TIKTOK',   color:ttColor,    camps:ttCamps    },
    { label:'SNAPCHAT', color:snapColor,  camps:snapCamps  },
    { label:'GOOGLE',   color:gColor,     camps:gCamps     },
  ];

  let tbody = '';
  groups.forEach(g => {
    if(!g.camps.length) return;
    // Platform header row spanning all columns
    tbody += `<tr>
      <td colspan="9" style="padding:6px 12px;background:${g.color}15;border-left:3px solid ${g.color};border-bottom:1px solid ${g.color}30;font-size:11px;font-weight:700;letter-spacing:.06em;color:#1a1a1a"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${g.color};margin-right:7px;vertical-align:middle"></span>${g.label}</td>
    </tr>`;
    // Campaign rows
    g.camps.forEach(c => {
      const a = c.agg, h = a.spend > 0;
      tbody += `<tr style="border-left:3px solid ${g.color}40">
        <td style="padding:7px 12px 7px 20px;border-bottom:1px solid #f4f4ef;font-size:11px;color:#333;font-weight:500">${c.name}</td>
        ${dataCell(h, fC(a.conv))}
        ${dataCell(h, fR(a.roas))}
        ${dataCell(h, fS(a.spend))}
        ${dataCell(a.hasAtc, fC(a.atc))}
        ${dataCell(h&&a.cpo>0, fCPO(a.cpo))}
        ${dataCell(h&&a.avgPV>0, fSV(a.avgPV))}
        ${dataCell(h, fSV(a.sv))}
      </tr>`;
    });
  });

  const cols = ["Campaign","Purchases","ROAS","Spent","ATC","CPO","Avg Conv. Value","Conversion Value"];
  const hdr = `<tr style="background:#f8f8f4">${cols.map((c,i)=>
    `<th style="padding:9px ${i===0?14:8}px;text-align:${i===0?"left":"center"};font-size:10px;font-weight:700;letter-spacing:.06em;color:#888;border-bottom:2px solid #ebebeb;white-space:nowrap">${c}</th>`
  ).join("")}</tr>`;

  return `<div class="cc" style="margin-bottom:16px">
    <div class="clbl">OVERALL PERFORMANCE BY CAMPAIGN — ${label}</div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-family:'DM Mono',monospace;font-size:12px">
      <thead>${hdr}</thead>
      <tbody style="color:#1a1a1a">${tbody}</tbody>
    </table>
    </div>
  </div>`;
}

// ── Market Performance Table
function buildMarketTable(datesArr, label){
  const ds = Array.isArray(datesArr) ? datesArr : [datesArr];

  function aggRecs(recs){
    let spend=0,sv=0,conv=0,wR=0;
    recs.forEach(r=>{
      if(!r||r.spend<=0) return;
      spend+=r.spend; sv+=r.sv||0; conv+=r.conv||0; wR+=(r.roas||0)*r.spend;
    });
    const roas=spend>0?wR/spend:0, cpo=conv>0?spend/conv:0, avgPV=conv>0?sv/conv:0;
    return {spend,sv,conv,roas,cpo,avgPV};
  }

  const tdC = "padding:8px;border-bottom:1px solid #f4f4ef;font-family:monospace;font-size:12px;text-align:center";

  // Markets: UAE, KSA, KU/QA/BH, GCC (catalogue/retargeting = no specific geo)
  const markets = [
    { label:'UAE',       geoKey:'uae',  color:'#2563eb' },
    { label:'KSA',       geoKey:'ksa',  color:'#16a34a' },
    { label:'KUW/QA',    geoKey:'ku',   color:'#9333ea' },
    { label:'GCC',       geoKey:'cat',  color:'#ea580c' },
  ];

  // Aggregate across all platforms per geo
  const platformKeys = ['meta','tiktok','snap','google'];

  const rows = markets.map(m => {
    let spend=0,sv=0,conv=0,atc=0,wR=0,hasAtc=false;

    platformKeys.forEach(pk => {
      const dayData = D[pk] || [];
      ds.forEach(d => {
        const r = dayData.find(x=>x.d===d);
        if(!r) return;
        const g = r[m.geoKey] || {};
        if(!g.spend||g.spend<=0) return;
        spend += g.spend||0;
        sv    += g.sv||0;
        conv  += g.conv||0;
        wR    += (g.roas||0)*(g.spend||0);
      });
      // ATC from GRANULAR adsets for this platform+geo
      const gran = GRANULAR[pk];
      if(gran?.adsets){
        Object.values(gran.adsets).forEach(arr => {
          arr.forEach(r => {
            if(ds.includes(r.d) && r.atc!=null){ atc+=r.atc; hasAtc=true; }
          });
        });
      }
    });

    const roas  = spend>0?wR/spend:0;
    const cpo   = conv>0?spend/conv:0;
    const avgPV = conv>0?sv/conv:0;
    const h = spend > 0;

    return `<tr>
      <td style="padding:8px 12px;border-bottom:1px solid #f4f4ef;font-size:12px;font-weight:600;color:#1a1a1a"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${m.color};margin-right:7px;vertical-align:middle"></span>${m.label}</td>
      <td style="${tdC}">${h ? fC(conv) : "—"}</td>
      <td style="${tdC}">${h ? fR(roas) : "—"}</td>
      <td style="${tdC}">${h ? fS(spend) : "—"}</td>
      <td style="${tdC}">${h&&avgPV>0 ? fSV(avgPV) : "—"}</td>
      <td style="${tdC}">${h&&cpo>0 ? fCPO(cpo) : "—"}</td>
      <td style="${tdC}">${h&&sv>0 ? fSV(sv) : "—"}</td>
    </tr>`;
  });

  // Total row
  let totSpend=0,totSV=0,totConv=0,totWR=0;
  markets.forEach(m => {
    platformKeys.forEach(pk => {
      const dayData = D[pk]||[];
      ds.forEach(d => {
        const r=dayData.find(x=>x.d===d);
        if(!r) return;
        const g=r[m.geoKey]||{};
        if(!g.spend||g.spend<=0) return;
        totSpend+=g.spend||0; totSV+=g.sv||0; totConv+=g.conv||0; totWR+=(g.roas||0)*(g.spend||0);
      });
    });
  });
  const totRoas  = totSpend>0?totWR/totSpend:0;
  const totCPO   = totConv>0?totSpend/totConv:0;
  const totAvgPV = totConv>0?totSV/totConv:0;
  const tS = "padding:9px 0;border-bottom:1px solid #f4f4ef;font-family:monospace;font-size:12px;font-weight:700;background:#f4f4ef";
  const totRow = `<tr style="border-top:2px solid #1a1a1a">
    <td style="padding:9px 0;background:#f4f4ef;font-size:12px;font-weight:700;color:#1a1a1a">Total</td>
    <td style="${tS}">${totConv>0?fC(totConv):"—"}</td>
    <td style="${tS}">${totRoas>0?fR(totRoas):"—"}</td>
    <td style="${tS}">${totSpend>0?fS(totSpend):"—"}</td>
    <td style="${tS}">${totAvgPV>0?fSV(totAvgPV):"—"}</td>
    <td style="${tS}">${totCPO>0?fCPO(totCPO):"—"}</td>
    <td style="${tS}">${totSV>0?fSV(totSV):"—"}</td>
  </tr>`;

  const cols = ["Market","Purchases","ROAS","Spent","Avg Purchase Value","CPO","Conversion Value"];
  const hdr = `<tr style="background:#f8f8f4">${cols.map((c,i)=>
    `<th style="padding:9px ${i===0?12:8}px;text-align:${i===0?"left":"center"};font-size:10px;font-weight:700;letter-spacing:.06em;color:#888;border-bottom:2px solid #ebebeb;white-space:nowrap">${c}</th>`
  ).join("")}</tr>`;

  return `<div class="cc" style="margin-bottom:16px">
    <div class="clbl">OVERALL PERFORMANCE BY MARKET — ${label}</div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-family:'DM Mono',monospace;font-size:12px">
      <thead>${hdr}</thead>
      <tbody style="color:#1a1a1a">${rows.join("")}${totRow}</tbody>
    </table>
    </div>
  </div>`;
}

// ── TOP PERFORMING ADS Table
// ── Top Ads state (for filters)
let _topAdsState = { market:'all', period:'all', baseDates:[], baseLabel:'' };

function buildTopAdsTable(datesArr, label, topN){
  // Store base dates for filter re-rendering
  const baseDates = Array.isArray(datesArr) ? datesArr : [datesArr];
  _topAdsState.baseDates = baseDates;
  _topAdsState.baseLabel = label;
  _topAdsState.market = 'all';
  _topAdsState.period = 'all';

  return renderTopAdsInner(baseDates, label, topN||10, 'all', 'all');
}

function renderTopAdsInner(baseDates, baseLabel, N, marketFilter, periodFilter){
  // Apply period filter — always use last N days from ALL_DATES
  let ds = baseDates;
  let periodLabel = '';
  if(periodFilter === '1d'){
    ds = ALL_DATES.slice(-1); // last available day
    periodLabel = ' · Last Day';
  } else if(periodFilter === '3d'){
    ds = ALL_DATES.slice(-3);
    periodLabel = ' · Last 3 days';
  } else if(periodFilter === '7d'){
    ds = ALL_DATES.slice(-7);
    periodLabel = ' · Last 7 days';
  }

  function aggRecs(recs){
    let spend=0,sv=0,conv=0,atc=0,wR=0,hasAtc=false;
    recs.forEach(r=>{
      if(!r||r.spend<=0) return;
      spend += r.spend;
      conv  += r.conv||0;
      if(typeof r.atc === 'number'){ atc += r.atc; hasAtc=true; }
      const roas = r.roas||0;
      const recordSV = (r.sv && r.sv>0) ? r.sv : (roas>0 ? r.spend*roas : 0);
      sv   += recordSV;
      wR   += roas * r.spend;
    });
    const roas=spend>0?wR/spend:0, cpo=conv>0?spend/conv:0, avgPV=conv>0?sv/conv:0;
    return {spend,sv,conv,atc,hasAtc,roas,cpo,avgPV};
  }

  // Market filter: detect which geo a key belongs to
  function detectMarket(name){
    // Catalogue: starts with EN_ or contains catalogue-related terms
    if(/^EN_/i.test(name) || /catalogue/i.test(name) || /Static-Carousel/i.test(name)) return 'cat';
    // UAE: contains _UAE_ (case insensitive)
    if(/_UAE[_\s]/i.test(name)) return 'uae';
    // KSA: contains _KSA_
    if(/_KSA[_\s]/i.test(name)) return 'ksa';
    // KU: contains _Ku_ or _Ku & or _KU_
    if(/_Ku[_\s&]/i.test(name) || /_KU[_\s]/i.test(name)) return 'ku';
    return 'other';
  }

  // Collect META ads — merge ALL keys that share the same base name
  const metaAds = GRANULAR.meta?.ads || {};
  const metaMerged = {}; // baseName → {recs:[], market:''}

  Object.entries(metaAds).forEach(([name, arr]) => {
    // Strip ALL suffixes: _mar13/_mar14/_mar15/_mar16/_v1/_v2
    const baseName = name
      .replace(/_mar1[3-9](_v[12])?$/, '')
      .replace(/_v[12]$/, '');
    
    if(!metaMerged[baseName]){
      metaMerged[baseName] = { recs:[], market: detectMarket(baseName) };
    }
    // Add records matching selected dates
    ds.forEach(d => {
      const r = arr.find(x => x.d === d);
      if(r) metaMerged[baseName].recs.push(r);
    });
  });

  const allAds = [];
  Object.entries(metaMerged).forEach(([displayName, {recs, market}]) => {
    const a = aggRecs(recs);
    if(a.spend <= 0) return;
    // Apply market filter
    if(marketFilter !== 'all' && market !== marketFilter) return;
    allAds.push({ name: displayName, agg: a, market });
  });

  allAds.sort((a,b) => (b.agg.sv||0) - (a.agg.sv||0));
  const topAds = allAds.slice(0, N);

  const tdC = "padding:8px;border-bottom:1px solid #f4f4ef;font-family:monospace;font-size:11px;text-align:center";

  // ── Creative signal: decide row highlight based on ROAS + spend + conv
  const ROAS_GOOD = 3.0;  // target ROAS
  const CPO_GOOD  = 60;   // target CPO ($)

  function adSignal(a){
    if(!a || a.spend <= 0) return 'neutral';
    const noConv    = a.conv === 0 && a.spend > 80;
    const burned    = a.roas < ROAS_GOOD * 0.4 && a.spend > 100;
    const weak      = a.roas < ROAS_GOOD && a.spend > 50;
    const healthy   = a.roas >= ROAS_GOOD && a.roas < ROAS_GOOD * 1.8;
    const scaling   = a.roas >= ROAS_GOOD * 1.8;
    if(noConv || burned) return 'refresh';
    if(weak)             return 'watch';
    if(scaling)          return 'scale';
    if(healthy)          return 'good';
    return 'neutral';
  }

  const SIG = {
    refresh: { bg:'#fff1f2', border:'#f43f5e', tag:'🔄 Refresh Creative', tc:'#be123c', tb:'#ffe4e6' },
    watch:   { bg:'#fffbeb', border:'#f59e0b', tag:'👁 Watch',            tc:'#92400e', tb:'#fef3c7' },
    scale:   { bg:'#f0fdf4', border:'#22c55e', tag:'⚡ Scale Budget',    tc:'#15803d', tb:'#dcfce7' },
    good:    { bg:'#f9fafb', border:'#86efac', tag:'✅ Keep Running',     tc:'#166534', tb:'#f0fdf4' },
    neutral: { bg:'',        border:'transparent', tag:'', tc:'', tb:'' },
  };

  const rows = topAds.length > 0 ? topAds.map(ad => {
    const a = ad.agg, h = a.spend > 0;
    const s = SIG[adSignal(a)];
    const tag = s.tag ? `<span style="font-size:9px;font-weight:700;letter-spacing:.04em;padding:2px 8px;border-radius:20px;background:${s.tb};color:${s.tc};margin-left:7px;vertical-align:middle;white-space:nowrap">${s.tag}</span>` : '';
    const trStyle = `background:${s.bg};border-left:3px solid ${s.border}`;
    const tdFirst = `padding:9px 10px;border-bottom:1px solid #f4f4ef;font-size:11px;color:#333;max-width:260px;word-break:break-word;line-height:1.5;cursor:pointer`;
    return `<tr style="${trStyle}">
      <td style="${tdFirst}" data-adname="${ad.name.replace(/"/g,'&#39;')}" onmouseenter="showAdHoverChartByEl(event,this)" onmouseleave="hideAdHoverChart()">
        <span style="color:#1a1a1a;border-bottom:1px dashed #ccc">${ad.name}</span>${tag}
      </td>
      <td style="${tdC}">${h ? fC(a.conv) : "—"}</td>
      <td style="${tdC}">${h ? fR(a.roas) : "—"}</td>
      <td style="${tdC}">${h ? fS(a.spend) : "—"}</td>
      <td style="${tdC}">${a.hasAtc ? fC(a.atc) : "—"}</td>
      <td style="${tdC}">${h&&a.cpo>0 ? fCPO(a.cpo) : "—"}</td>
      <td style="${tdC}">${h&&a.avgPV>0 ? fSV(a.avgPV) : "—"}</td>
      <td style="${tdC}">${h&&a.sv>0 ? fSV(a.sv) : "—"}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="8" style="text-align:center;padding:20px;color:#aaa;font-size:12px">No ads data for this selection</td></tr>`;

  const cols = ["Ad Name","Purchases","ROAS","Spent","ATC","CPO","Avg Purchase Value","Conversion Value"];
  const hdr = `<tr style="background:#f8f8f4">${cols.map((c,i)=>
    `<th style="padding:9px ${i===0?12:8}px;text-align:${i===0?"left":"center"};font-size:10px;font-weight:700;letter-spacing:.06em;color:#888;border-bottom:2px solid #ebebeb;white-space:nowrap">${c}</th>`
  ).join("")}</tr>`;

  // Filter button helper
  const fBtn = (val, label, current, action) =>
    `<button onclick="${action}('${val}')" style="font-family:inherit;font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;border:1.5px solid ${val===current?'#1a1a1a':'#e0e0d8'};background:${val===current?'#1a1a1a':'#fff'};color:${val===current?'#fff':'#666'};cursor:pointer;white-space:nowrap">${label}</button>`;

  const marketBtns = [
    fBtn('all',  'All Markets', marketFilter, 'topAdsSetMarket'),
    fBtn('uae',  'UAE',         marketFilter, 'topAdsSetMarket'),
    fBtn('ksa',  'KSA',         marketFilter, 'topAdsSetMarket'),
    fBtn('ku',   'KUW-QAT-BH', marketFilter, 'topAdsSetMarket'),
    fBtn('cat',  'Catalogue',   marketFilter, 'topAdsSetMarket'),
  ].join('');

  const periodBtns = [
    fBtn('7d',  'Last 7 days', periodFilter, 'topAdsSetPeriod'),
    fBtn('3d',  'Last 3 days', periodFilter, 'topAdsSetPeriod'),
  ].join('');

  // ── TikTok ads (MTD snapshot, merged by base name, grouped by geo)
  function buildPlatAdsRows(platKey, geoPatterns, nameStripRx){
    const tdFirst = `padding:9px 10px;border-bottom:1px solid #f4f4ef;font-size:11px;color:#333;max-width:260px;word-break:break-word;line-height:1.5`;
    const tdC = `padding:8px 10px;border-bottom:1px solid #f4f4ef;font-family:'DM Mono',monospace;font-size:12px;text-align:right`;
    const platAds = GRANULAR[platKey]?.ads || {};
    const platMerged = {};
    Object.entries(platAds).forEach(([name, arr]) => {
      const baseName = name
        .replace(/_En_GLO.*$/i,'')
        .replace(/_mar\d+(_v\d+)?$/i,'')
        .replace(/_v\d+$/i,'')
        .replace(/\s*[-–]\s*Copy\s*\d*$/i,'')
        .trim().substring(0,50);
      if(!platMerged[baseName]) platMerged[baseName]={recs:[],market:'other'};
      let mkt='other';
      for(const [pat,geo] of geoPatterns){ if(pat.test(name)){ mkt=geo; break; } }
      platMerged[baseName].market = mkt;
      const recs = ds.map(d=>(arr||[]).find(x=>x.d===d)).filter(r=>r&&r.spend>0);
      if(!recs.length) platMerged[baseName].recs.push(...arr.filter(r=>r&&r.spend>0));
      else platMerged[baseName].recs.push(...recs);
    });
    return Object.entries(platMerged)
      .map(([nm,{recs,market}])=>{
        const agg=aggRecs(recs); if(agg.spend<=0) return null;
        if(marketFilter!=='all'&&market!==marketFilter) return null;
        // Fix sv/conv if missing
        if(agg.sv<=0&&agg.roas>0) agg.sv=Math.round(agg.spend*agg.roas*100)/100;
        if(agg.conv===0&&agg.sv>0) agg.conv=Math.max(1,Math.round(agg.sv/170));
        if(agg.cpo<=0&&agg.conv>0) agg.cpo=Math.round(agg.spend/agg.conv*100)/100;
        if(agg.avgPV<=0&&agg.conv>0) agg.avgPV=Math.round(agg.sv/agg.conv*100)/100;
        return {name:nm,agg,market};
      })
      .filter(Boolean)
      .sort((a,b)=>(b.agg.sv||0)-(a.agg.sv||0))
      .slice(0,8)
      .map(ad=>{
        const a=ad.agg, h=a.spend>0;
        const s=SIG[adSignal(a)];
        const tag=s.tag?`<span style="font-size:9px;font-weight:700;letter-spacing:.04em;padding:2px 8px;border-radius:20px;background:${s.tb};color:${s.tc};margin-left:7px;vertical-align:middle;white-space:nowrap">${s.tag}</span>`:'';
        return `<tr style="background:${s.bg};border-left:3px solid ${s.border}">
          <td style="${tdFirst};cursor:pointer" data-adname="${ad.name.replace(/"/g,'&#39;')}" onmouseenter="showAdHoverChartByEl(event,this)" onmouseleave="hideAdHoverChart()"><span style="color:#1a1a1a;border-bottom:1px dashed #ccc">${ad.name}</span>${tag}</td>
          <td style="${tdC}">${h?fC(a.conv):'—'}</td>
          <td style="${tdC}">${h?fR(a.roas):'—'}</td>
          <td style="${tdC}">${h?fS(a.spend):'—'}</td>
          <td style="${tdC}">${a.hasAtc?fC(a.atc):'—'}</td>
          <td style="${tdC}">${h&&a.cpo>0?fCPO(a.cpo):'—'}</td>
          <td style="${tdC}">${h&&a.avgPV>0?fSV(a.avgPV):'—'}</td>
          <td style="${tdC}">${h&&a.sv>0?fSV(a.sv):'—'}</td>
        </tr>`;
      }).join('');
  }

  const ttRows   = buildPlatAdsRows('tiktok', [[/Tiktok_UAE/i,'uae'],[/Tiktok_KSA/i,'ksa'],[/Tiktok_Ku|Tiktok_KW/i,'ku'],[/Tiktok_GCC|Retargeting/i,'cat']]);
  const snapRows = buildPlatAdsRows('snap',   [[/Snap_UAE|Snapchat_UAE/i,'uae'],[/Snap_KSA|Snapchat_KSA/i,'ksa'],[/Snap_KU|Snap_KW/i,'ku'],[/Snap_GCC/i,'cat']]);

  function platSection(label, color, bodyRows){
    if(!bodyRows) return '';
    return `<div style="margin-bottom:2px">
      <div style="font-size:11px;font-weight:700;letter-spacing:.05em;color:#555;padding:6px 10px;background:#f5f5f0;border-radius:6px;margin-bottom:6px;display:flex;align-items:center;gap:7px">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color}"></span>${label}
      </div>
      <table style="width:100%;border-collapse:collapse;font-family:'DM Mono',monospace;font-size:12px;margin-bottom:10px">
        <thead>${hdr}</thead>
        <tbody style="color:#1a1a1a">${bodyRows||`<tr><td colspan="8" style="text-align:center;padding:14px;color:#aaa;font-size:12px">No data for this selection</td></tr>`}</tbody>
      </table>
    </div>`;
  }

  return `<div class="cc" style="margin-bottom:16px" id="top-ads-card">
    <div class="clbl">Overall — Top Performing ADS — ${periodLabel ? periodLabel.replace(" · ","") : baseLabel}</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center">
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        <span style="font-size:10px;font-weight:700;color:#aaa;letter-spacing:.05em;margin-right:2px">MARKET</span>
        ${marketBtns}
      </div>
      <div style="width:1px;height:20px;background:#e0e0d8;margin:0 4px"></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        <span style="font-size:10px;font-weight:700;color:#aaa;letter-spacing:.05em;margin-right:2px">PERIOD</span>
        ${periodBtns}
      </div>
    </div>
    <div style="overflow-x:auto" id="top-ads-table-wrap">
      ${platSection('META',    '#1877F2', rows)}

let _atcCache = {};
function getAtcForPlatform(pk){
  // Sum ATC from GRANULAR adsets for current selected dates
  const gran = GRANULAR[pk];
  if(!gran) return null;
  const adsets = gran.adsets || {};
  const datesArr = Array.isArray(_atcDates) ? _atcDates : [_atcDates];
  let total = 0, found = false;
  Object.values(adsets).forEach(arr => {
    arr.forEach(r => {

  });
  const blendedRoas=allSpend>0?wRoas/allSpend:0;

  // sorted helpers
  const sortedBy=(metric)=>[...rws].sort((a,b)=>{
    const av=a.r&&a.r.spend>0?(metric==="roas"?a.r.roas:metric==="spend"?a.r.spend:metric==="sv"?a.r.sv:metric==="cpo"?999999-(a.r.cpo||0):a.r.conv):-Infinity;

  return tblRow([
    name,
    hasSpend ? fR(r.roas||0)  : "—",
    hasSpend ? fS(r.spend)    : "—",
    hasSpend ? fSV(r.sv||0)   : "—",
    hasSpend ? fC(r.conv||0)  : "—",
    hasSpend ? fCPO(r.cpo||0) : "—",
  ]);
}

// Aggregate an array of day-records into one perf object
function aggRecords(records){
  let spend=0,sv=0,conv=0,wR=0;
  records.forEach(r=>{
    if(r&&r.spend>0){
      spend+=r.spend;
      conv+=r.conv||0;
      const roas=r.roas||0;
      // Use stored sv if available, otherwise derive from spend*roas
      const recordSV = (r.sv && r.sv>0) ? r.sv : (roas>0 ? r.spend*roas : 0);
      sv+=recordSV;
      wR+=roas*r.spend;
    }
  });
  const roas=spend>0?wR/spend:0, cpo=conv>0?spend/conv:0;
  return {spend,sv,conv,roas,cpo};
}

// ── Signal logic (same as TOP PERFORMING ADS)
const AD_ROAS_TARGET = 3.0, AD_CPO_TARGET = 60;
function adRowSignal(agg){
  if(!agg || agg.spend <= 0) return 'neutral';
  if(agg.conv === 0 && agg.spend > 80)               return 'refresh';
  if(agg.roas < AD_ROAS_TARGET * 0.4 && agg.spend > 80) return 'refresh';
  if(agg.roas < AD_ROAS_TARGET && agg.spend > 50)    return 'watch';
  if(agg.roas >= AD_ROAS_TARGET * 1.8)               return 'scale';
  if(agg.roas >= AD_ROAS_TARGET)                     return 'good';
  return 'neutral';
}

            <button onclick="snapAdsPeriod=snapAdsPeriod==='3d'?null:'3d';reRenderSnapAds()" id="snap-ads-btn-3d"

          </div>
        </div>
        <div id="snap-ads-inner">${snapAdsHTML}</div>
      </div>`;
    }

  } else if (pk !== 'tiktok' && pk !== 'snap') {
    // Other platforms: flat ad list by date
    const adRows = adNames.map(name => {
      const recs = ds.map(d=>(ads[name]||[]).find(x=>x.d===d)).filter(r=>r&&r.spend>0);
      const agg = aggRecords(recs);
      if (!agg.spend) return null;
      return perfRowSignalOther(name, agg, false);
    }).filter(Boolean);

    if (adRows.length) {
      html += `<div class="cc" style="margin-top:4px">
        <div class="clbl">ADS — ${label}</div>
        <table class="gtbl">${tblHdr(["Ad",...PERF_HDR])}<tbody>${adRows.join("")}</tbody></table>
      </div>`;
    }
  }

  return html;
}

// ── Ad Hover Chart
let _ahcChart = null;

function getAdDailyData(baseName){
  // ── Normalize helper — strips date/version suffixes
  const normalize = n => n
    .replace(/_mar\d+(_v\d+)?$/i,'')
    .replace(/_v\d+$/i,'')
    .replace(/\s*[-–]\s*Copy\s*\d*$/i,'')
    .replace(/_En_GLO.*$/i,'')
    .trim();

  // ── Google campaign: build daily from D.google geo data
  const googleCamps = GRANULAR.google?.campaigns || [];
  const gCamp = googleCamps.find(c => c.name === baseName || normalize(c.name) === baseName);
  if (gCamp) {
    const geo = gCamp.geo || 'uae';
    const geoCampsTotal = googleCamps.filter(c=>(c.geo||'uae')===geo).reduce((s,c)=>s+c.spend,0);
    const prop = geoCampsTotal > 0 ? gCamp.spend / geoCampsTotal : 1;
    return ALL_DATES.map(d => {
      const r = (D.google||[]).find(x => x.d === d);
      if (!r) return null;
      const g = r[geo] || {};
      if (!g.spend || g.spend <= 0) return null;
      const sp   = Math.round(g.spend * prop * 100) / 100;
      const sv   = Math.round((g.sv||0) * prop * 100) / 100;
      const conv = Math.round((g.conv||0) * prop);
      const roas = sp > 0 ? sv / sp : 0;
      const cpo  = conv > 0 ? Math.round(sp / conv * 100) / 100 : 0;
      return { d, spend: sp, sv, conv, roas, cpo, atc: 0 };
    });
  }

  // ── Search across ALL platform ad granular data (ads + adsets)
  const allSources = {};
  // Add all ads
  ['meta','tiktok','snap','google'].forEach(pk => {
    const ads = GRANULAR[pk]?.ads || {};
    Object.entries(ads).forEach(([k,v]) => { allSources[k] = v; });
    // Also add adsets so adset-level data shows in chart
    const adsets = GRANULAR[pk]?.adsets || {};
    Object.entries(adsets).forEach(([k,v]) => { allSources[k] = v; });
  });

  const dayMap = {};
  const mtdMap = {}; // for MTD-snapshot entries

  Object.entries(allSources).forEach(([name, arr]) => {
    const normName = normalize(name);
    const normBase = normalize(baseName);
    // Match: exact, normalized-exact, startsWith (handles 45-char truncated display names)
    const matches = normName === baseName
      || name === baseName
      || normName === normBase
      || (normBase.length >= 25 && normName.startsWith(normBase))
      || (normBase.length >= 25 && normalize(name).startsWith(normBase))
      || (baseName.length >= 30 && name.startsWith(baseName));
    if(!matches) return;
    arr.forEach(r => {
      if(!r || !r.d) return;
      const isMar = r.d.startsWith('Mar ');
      const target = isMar ? dayMap : mtdMap;
      const key = r.d;
      if(!target[key]) target[key] = {spend:0,sv:0,conv:0,atc:0,wR:0};
      const e = target[key];
      e.spend += r.spend||0;
      e.sv    += r.sv||0;
      e.conv  += r.conv||0;
      e.atc   += (r.atc||0);
      e.wR    += (r.roas||0)*(r.spend||0);
    });
  });

  // Finalize roas for dayMap entries
  Object.values(dayMap).forEach(e => { e.roas = e.spend>0 ? e.wR/e.spend : 0; e.cpo = e.conv>0 ? e.spend/e.conv : 0; });

  // If we have daily Mar data, return it directly
  if(Object.keys(dayMap).length > 0){
    return ALL_DATES.map(d => {
      const e = dayMap[d];
      if(!e || e.spend<=0) return null;
      return { d, spend:Math.round(e.spend*100)/100, sv:Math.round(e.sv*100)/100, conv:e.conv, atc:e.atc, roas:Math.round(e.roas*100)/100, cpo:Math.round(e.cpo*100)/100 };
    });
  }

  // MTD-only data: distribute proportionally using platform daily totals
  if(Object.keys(mtdMap).length > 0){
    const mtd = Object.values(mtdMap).reduce((acc,e)=>{
      acc.spend+=e.spend; acc.sv+=e.sv; acc.conv+=e.conv; acc.atc+=e.atc; acc.wR+=e.wR; return acc;
    },{spend:0,sv:0,conv:0,atc:0,wR:0});
    const mtdRoas = mtd.spend>0 ? mtd.wR/mtd.spend : 0;

    // Detect which platform this ad belongs to for proportional daily scaling
    let platKey = null;
    ['tiktok','snap','meta','google'].forEach(pk => {
      const ads = {...(GRANULAR[pk]?.ads||{}), ...(GRANULAR[pk]?.adsets||{})};
      if(Object.keys(ads).some(k => normalize(k)===baseName || k===baseName)) platKey = pk;
    });

    // Get platform daily spend totals for proportional distribution
    const platDaily = ALL_DATES.map(d => {
      if(!platKey) return 1;
      const r = (D[platKey]||[]).find(x=>x.d===d);
      return r && r.spend>0 ? r.spend : 0;
    });
    const platTotal = platDaily.reduce((s,v)=>s+v, 0);

    return ALL_DATES.map((d,i) => {
      if(platTotal<=0) return null;
      const prop = platDaily[i] / platTotal;
      const sp = Math.round(mtd.spend * prop * 100) / 100;
      if(sp <= 0) return null;
      const sv = Math.round(mtd.sv * prop * 100) / 100;
      const conv = Math.round(mtd.conv * prop);
      const roas = sp>0 ? sv/sp : mtdRoas;
      const cpo  = conv>0 ? sp/conv : 0;
      return { d, spend:sp, sv, conv, atc:Math.round(mtd.atc*prop), roas:Math.round(roas*100)/100, cpo:Math.round(cpo*100)/100 };
    });
  }

  return ALL_DATES.map(() => null);
}

function showAdHoverChart(event, baseName, period){
  period = period || null;
  const popup    = document.getElementById('ad-hover-chart');
  const titleEl  = document.getElementById('ahc-title');
  const canvas   = document.getElementById('ahc-canvas');
  const verdictEl= document.getElementById('ahc-verdict');
  const kpisEl   = document.getElementById('ahc-kpis');
  const insightEl= document.getElementById('ahc-insight');

  // Collect per-day data (indexed by ALL_DATES)
  const dailyData = getAdDailyData(baseName);

  // ── Determine which dates to aggregate for KPIs
  const periodDates = new Set(
    period==='7d' ? ALL_DATES.slice(-7) :
    period==='3d' ? ALL_DATES.slice(-3) : ALL_DATES
  );

  // ── Aggregate totals over the selected period
  let totSpend=0, totSV=0, totConv=0, totAtc=0, wR=0;
  dailyData.forEach((r, i) => {
    if(!r || r.spend<=0) return;
    if(!periodDates.has(ALL_DATES[i])) return;
    totSpend += r.spend;
    totSV    += (r.sv && r.sv>0) ? r.sv : (r.roas>0 ? r.spend*r.roas : 0);
    totConv  += r.conv||0;
    totAtc   += typeof r.atc==='number' ? r.atc : 0;
    wR       += (r.roas||0)*r.spend;
  });
  const avgRoas = totSpend>0 ? wR/totSpend : 0;
  const cpo     = totConv>0  ? totSpend/totConv : 0;
  const avgPV   = totConv>0  ? totSV/totConv : 0;
  const ctr     = totAtc>0 && totConv>0 ? (totConv/totAtc)*100 : 0;

  // ── Last 3 days trend (recent momentum within period)
  const last3 = dailyData.slice(-3).filter(r=>r&&r.spend>0);
  let r3Spend=0,r3SV=0,r3wR=0;
  last3.forEach(r=>{ r3Spend+=r.spend; r3SV+=(r.sv&&r.sv>0)?r.sv:(r.roas>0?r.spend*r.roas:0); r3wR+=(r.roas||0)*r.spend; });
  const recentRoas = r3Spend>0 ? r3wR/r3Spend : 0;

  // ── Decision logic
  // Benchmark: blended account ROAS target ~3x, CPO target ~$60
  const ROAS_TARGET = 3.0;
  const CPO_TARGET  = 60;
  let verdict, verdictClass, insight;

  const roasTrend = avgRoas > 0 ? (recentRoas - avgRoas) / avgRoas : 0; // % change recent vs avg
  const noConv    = totConv === 0;
  const lowSpend  = totSpend < 50;

  if(noConv && totSpend > 100){
    verdict      = '🔴 Consider Turning Off';
    verdictClass = 'ahc-off';
    insight      = `$${totSpend.toFixed(0)} spent with 0 purchases. High ATC (${totAtc}) but no conversions — checkout friction or audience mismatch.`;
  } else if(avgRoas >= ROAS_TARGET * 1.5 && recentRoas >= ROAS_TARGET){
    verdict      = '🟢 Keep Running — Strong';
    verdictClass = 'ahc-keep';
    insight      = `${avgRoas.toFixed(1)}x ROAS (${roasTrend>=0?'+':''}${(roasTrend*100).toFixed(0)}% recent trend). Scale budget or test new creatives.`;
  } else if(avgRoas >= ROAS_TARGET){
    verdict      = '🟢 Keep Running';
    verdictClass = 'ahc-keep';
    insight      = `${avgRoas.toFixed(1)}x ROAS above target. ${recentRoas < avgRoas ? 'Recent days slightly weaker — monitor.' : 'Momentum holding.'}`;
  } else if(avgRoas >= ROAS_TARGET * 0.6 && recentRoas >= ROAS_TARGET){
    verdict      = '🟡 Watch — Recovering';
    verdictClass = 'ahc-watch';
    insight      = `Overall ${avgRoas.toFixed(1)}x but recent 3 days hit ${recentRoas.toFixed(1)}x. Give it 2–3 more days before deciding.`;
  } else if(avgRoas < ROAS_TARGET * 0.5 && totSpend > 150){
    verdict      = '🔴 Turn Off / Pause';
    verdictClass = 'ahc-off';
    insight      = `${avgRoas.toFixed(1)}x ROAS well below ${ROAS_TARGET}x target. CPO $${cpo.toFixed(0)} vs $${CPO_TARGET} target. Redirect budget to top performers.`;
  } else if(lowSpend){
    verdict      = '⚪ Too Early to Judge';
    verdictClass = 'ahc-watch';
    insight      = `Only $${totSpend.toFixed(0)} spent. Need more data — check back after $100+ spend.`;
  } else {
    verdict      = '🟡 Watch Closely';
    verdictClass = 'ahc-watch';
    insight      = `${avgRoas.toFixed(1)}x ROAS below ${ROAS_TARGET}x target. CPO $${cpo.toFixed(0)}. ${recentRoas<avgRoas?'Declining recently.':'No recent improvement.'} Consider creative refresh.`;
  }

  // ── KPI colors
  const roasColor = avgRoas >= ROAS_TARGET ? 'good' : avgRoas >= ROAS_TARGET*0.6 ? 'warn' : 'bad';
  const cpoColor  = cpo === 0 ? '' : cpo <= CPO_TARGET ? 'good' : cpo <= CPO_TARGET*1.5 ? 'warn' : 'bad';

  // ── Render verdict + KPIs
  verdictEl.className = verdictClass;
  verdictEl.textContent = verdict;
  titleEl.textContent = baseName.length > 48 ? baseName.substring(0,48)+'…' : baseName;

  kpisEl.innerHTML = [
    ['ROAS', avgRoas>0 ? avgRoas.toFixed(1)+'x' : '—', roasColor],
    ['SPEND', '$'+Math.round(totSpend).toLocaleString(), ''],
    ['CPO', cpo>0 ? '$'+cpo.toFixed(0) : '—', cpoColor],
    ['SALES', totConv||'0', totConv>0?'good':'bad'],
  ].map(([l,v,cls]) => `<div class="ahc-kpi"><span class="ahc-kpi-label">${l}</span><span class="ahc-kpi-val ${cls}">${v}</span></div>`).join('');

  insightEl.textContent = insight;

  // ── Chart: daily ROAS trend
  if(_ahcChart){ _ahcChart.destroy(); _ahcChart = null; }

  const highlightSet = new Set(
    period==='7d' ? ALL_DATES.slice(-7) :
    period==='3d' ? ALL_DATES.slice(-3) : ALL_DATES
  );

  const roasData = ALL_DATES.map((d,i) => {
    const r = dailyData[i];
    return (r && r.spend > 0) ? +(r.roas||0).toFixed(2) : null;
  });

  // Draw target line
  const targetLine = ALL_DATES.map(() => ROAS_TARGET);

  _ahcChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels: ALL_DATES.map(d => d.replace('Mar ','')),
      datasets: [
        {
          label: 'ROAS',
          data: roasData,
          borderColor: '#1877F2',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: ALL_DATES.map((d,i) => roasData[i]!==null ? (highlightSet.has(d)?4:2) : 0),
          pointBackgroundColor: ALL_DATES.map((d,i) => roasData[i]!==null ? (highlightSet.has(d)?'#1877F2':'#ccc') : 'transparent'),

function positionAdHoverChart(event){
  const popup = document.getElementById('ad-hover-chart');
  if(!popup || popup.style.display === 'none') return;
  const pw = 340, ph = 320;
  let x = event.clientX + 18;
  let y = event.clientY - 80;
  if(x + pw > window.innerWidth - 10) x = event.clientX - pw - 18;
  if(y + ph > window.innerHeight - 10) y = window.innerHeight - ph - 10;
  if(y < 10) y = 10;
  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
}

function hideAdHoverChart(){
  const popup = document.getElementById('ad-hover-chart');
  if(popup) popup.style.display = 'none';
  if(_ahcChart){ _ahcChart.destroy(); _ahcChart = null; }
}

document.addEventListener('mousemove', e => {
  const popup = document.getElementById('ad-hover-chart');
  if(popup && popup.style.display !== 'none'){
    positionAdHoverChart(e);
  }
});
